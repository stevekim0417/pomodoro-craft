<style>
:root {
  --sky-top: #7EC8E3; --sky-bottom: #B8E4F0;
  --accent: #5B8731; --accent-light: #8DB360;
  --ui-bg: #C6C6C6; --ui-inner: #8B8B8B;
  --ui-light: #FEFEFE; --ui-dark: #373737;
  --text: #3F3F3F; --transition-speed: 1.2s;
}
[data-mode="break"] {
  --sky-top: #0B1026; --sky-bottom: #1B2838;
  --accent: #2C5AA0; --accent-light: #4488CC;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh; display: flex; justify-content: center; align-items: center;
  background: linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
  transition: background var(--transition-speed);
  font-family: 'Press Start 2P', monospace; image-rendering: pixelated; overflow-x: hidden;
}
.stars { position: fixed; inset: 0; pointer-events: none; opacity: 0; transition: opacity var(--transition-speed); z-index: 0; }
[data-mode="break"] .stars { opacity: 1; }
.star { position: absolute; width: 4px; height: 4px; background: #FFF; animation: twinkle 2s infinite alternate; }
@keyframes twinkle { 0%{opacity:.3} 100%{opacity:1} }
@keyframes flicker1 { 0%{opacity:1} 100%{opacity:.4} }
@keyframes flicker2 { 0%{opacity:.4} 100%{opacity:1} }

.app { position: relative; z-index: 1; width: 520px; max-width: 95vw; }
.title { text-align: center; margin-bottom: 20px; color: #FFF; }
.title h1 { font-size: 28px; letter-spacing: 4px; margin-bottom: 10px; text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 0 0 12px rgba(255,215,0,0.3); }
.title .subtitle { font-size: 13px; color: #FFD700; transition: color var(--transition-speed); letter-spacing: 3px; text-shadow: 2px 2px 0 #000, 0 0 8px rgba(255,215,0,0.4); }
[data-mode="break"] .title .subtitle { color: #88BBFF; text-shadow: 2px 2px 0 #000, 0 0 8px rgba(100,160,255,0.4); }
.container { background: var(--ui-bg); border: 4px solid; border-color: var(--ui-light) var(--ui-dark) var(--ui-dark) var(--ui-light); padding: 8px; }
.inner { background: var(--ui-inner); border: 3px solid; border-color: #555 #AAA #AAA #555; padding: 12px; }
.scene-wrap {
  position: relative; width: 100%; aspect-ratio: 4/3; margin-bottom: 12px; overflow: hidden;
  border: 3px solid; border-color: #555 #AAA #AAA #555;
  background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 60%, #6B8E3A 60.1%, #5B8731 62%, #866043 62.1%, #866043 100%);
  transition: background var(--transition-speed);
}
.scene-wrap svg { width: 100%; height: 100%; display: block; }
.timer-section { text-align: center; padding: 8px 0; }
.mode-label { font-size: 10px; color: var(--accent-light); margin-bottom: 8px; letter-spacing: 2px; transition: color var(--transition-speed); }
.timer-display { font-size: 48px; color: #FFF; text-shadow: 4px 4px 0 #000; letter-spacing: 4px; margin: 4px 0; font-variant-numeric: tabular-nums; }
.progress-bar { display: flex; gap: 3px; margin: 12px 0; justify-content: center; }
.progress-block { width: 20px; height: 20px; border: 2px solid; border-color: #AAA #555 #555 #AAA; background: #6B6B6B; transition: background .3s, border-color .3s; }
.progress-block.filled { background: var(--accent); border-color: var(--accent-light) #3A5A1A #3A5A1A var(--accent-light); }
.progress-block.active { animation: blockPulse .6s infinite alternate; }
@keyframes blockPulse { 0%{background:var(--accent)} 100%{background:var(--accent-light)} }
/* Task Input */
.task-input-wrap { display: flex; justify-content: center; margin: 6px 0 8px; }
.task-input {
  font-family: 'Press Start 2P', monospace; font-size: 8px;
  padding: 7px 12px; background: #555; color: #FFF;
  border: 2px solid; border-color: #2A2A2A #7A7A7A #7A7A7A #2A2A2A;
  width: 85%; outline: none; text-align: center;
  text-shadow: 1px 1px 0 #000;
}
.task-input::placeholder { color: #999; }
.task-input:focus { border-color: #4488CC #2A5A8A #2A5A8A #4488CC; background: #4A4A4A; }

/* Session Log */
.session-log {
  margin-top: 6px; max-height: 0; overflow: hidden;
  transition: max-height .35s ease;
}
.session-log.open { max-height: 300px; }
.session-log-inner {
  max-height: 140px; overflow-y: auto; padding: 4px;
  scrollbar-width: thin; scrollbar-color: #666 #444;
}
.session-log-inner::-webkit-scrollbar { width: 6px; }
.session-log-inner::-webkit-scrollbar-track { background: #444; }
.session-log-inner::-webkit-scrollbar-thumb { background: #888; }
.log-entry {
  display: flex; gap: 8px; padding: 3px 6px; font-size: 6px;
  color: #CCC; text-shadow: 1px 1px 0 #000; align-items: center;
}
.log-entry:nth-child(even) { background: rgba(0,0,0,0.15); }
.log-time { color: #999; min-width: 40px; }
.log-type { min-width: 45px; font-weight: bold; }
.log-type.focus { color: #8DB360; }
.log-type.break { color: #4488CC; }
.log-type.longbreak { color: #CC88FF; }
.log-task { color: #FFF; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.log-dur { color: #AAA; min-width: 30px; text-align: right; }
.log-toggle {
  text-align: center; padding: 4px; margin-top: 4px;
  font-family: 'Press Start 2P', monospace; font-size: 6px;
  color: #999; cursor: pointer; text-shadow: 1px 1px 0 #000;
}
.log-toggle:hover { color: #FFF; }
.log-empty { text-align: center; padding: 8px; font-size: 6px; color: #888; }

.controls { display: flex; gap: 8px; justify-content: center; margin: 12px 0; }
.mc-btn {
  font-family: 'Press Start 2P', monospace; font-size: 11px; padding: 10px 20px;
  background: #8B8B8B; border: 3px solid; border-color: #C6C6C6 #555 #555 #C6C6C6;
  color: var(--text); cursor: pointer; text-shadow: 1px 1px 0 #C6C6C6;
  letter-spacing: 1px; transition: filter .1s; white-space: nowrap;
}
.mc-btn:hover { filter: brightness(1.15); }
.mc-btn:active { border-color: #555 #C6C6C6 #C6C6C6 #555; padding: 11px 19px 9px 21px; }
.mc-btn.primary { background: #5A8B3A; border-color: #8DB360 #2D5A1A #2D5A1A #8DB360; color: #FFF; text-shadow: 1px 1px 0 #2D5A1A; }
.mc-btn.primary:active { border-color: #2D5A1A #8DB360 #8DB360 #2D5A1A; }
.mc-btn.danger { background: #8B3A3A; border-color: #B36060 #5A1A1A #5A1A1A #B36060; color: #FFF; text-shadow: 1px 1px 0 #5A1A1A; }
.settings { display: flex; justify-content: center; gap: 20px; margin: 12px 0; flex-wrap: wrap; }
.setting { flex-direction: column; align-items: center; gap: 4px; }
.setting-label { font-size: 8px; color: #DDD; text-shadow: 1px 1px 0 #000; letter-spacing: 1px; }
.setting-controls { display: flex; align-items: center; gap: 4px; }
.session-indicator { font-size: 9px; color: #FFD700; letter-spacing: 1px; text-shadow: 1px 1px 0 #000; margin-bottom: 4px; }
[data-mode="break"] .session-indicator { color: #88BBFF; }
.setting { display: flex; align-items: center; gap: 6px; }
.setting label { font-size: 8px; color: #DDD; text-shadow: 1px 1px 0 #000; }
.setting .value { font-size: 14px; color: #FFF; text-shadow: 2px 2px 0 #000; min-width: 36px; text-align: center; }
.mc-btn-sm {
  font-family: 'Press Start 2P', monospace; font-size: 10px; width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  background: #8B8B8B; border: 2px solid; border-color: #C6C6C6 #555 #555 #C6C6C6;
  color: var(--text); cursor: pointer; padding: 0;
}
.mc-btn-sm:active { border-color: #555 #C6C6C6 #C6C6C6 #555; }
.hotbar { display: flex; justify-content: center; gap: 4px; margin-top: 12px; }
.hotbar-slot {
  width: 36px; height: 36px; background: #555; border: 2px solid;
  border-color: #2A2A2A #7A7A7A #7A7A7A #2A2A2A;
  display: flex; align-items: center; justify-content: center;
}
.hotbar-slot.active { border-color: #FFF #AAA #AAA #FFF; background: #666; }
.hotbar-slot svg { width: 24px; height: 24px; }

/* Daily Stats */
.daily-stats {
  margin-top: 10px; padding: 8px 12px;
  background: #555; border: 2px solid; border-color: #2A2A2A #7A7A7A #7A7A7A #2A2A2A;
  display: flex; flex-wrap: wrap; gap: 6px 16px; justify-content: center; align-items: center;
}
.daily-stats .stat-date { font-size: 7px; color: #AAA; text-shadow: 1px 1px 0 #000; width: 100%; text-align: center; margin-bottom: 2px; }
.daily-stats .stat { font-size: 7px; color: #DDD; text-shadow: 1px 1px 0 #000; white-space: nowrap; }
.daily-stats .stat b { color: #FFF; }
.daily-stats .harvest-row {
  width: 100%; margin-top: 6px; padding-top: 6px;
  border-top: 1px dashed #777;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-size: 7px; color: #DDD; text-shadow: 1px 1px 0 #000;
  letter-spacing: 1px;
}
.daily-stats .harvest-icons {
  font-size: 14px; letter-spacing: 2px;
  filter: drop-shadow(1px 1px 0 #000);
}
.daily-stats .harvest-empty { font-size: 6px; color: #888; letter-spacing: 1px; }
.daily-stats .streak-row {
  width: 100%; margin-top: 4px; display: flex; justify-content: center;
}
.streak-badge {
  font-size: 8px; padding: 5px 10px; color: #AAA;
  border: 2px solid; border-color: #555 #222 #222 #555;
  background: #3A3A3A; text-shadow: 1px 1px 0 #000;
  letter-spacing: 1px;
}
.streak-badge.active {
  color: #FFC040; border-color: #B87020 #5C2A00 #5C2A00 #B87020;
  background: #7A3A0A;
  animation: streakPulse 2s infinite alternate;
}
@keyframes streakPulse {
  0%   { box-shadow: 0 0 0 0 rgba(255,192,64,0.3); }
  100% { box-shadow: 0 0 6px 2px rgba(255,192,64,0.5); }
}
.daily-stats .lifetime-row {
  width: 100%; margin-top: 6px; padding-top: 4px;
  border-top: 1px dashed #555;
  font-size: 6px; color: #BBB; text-shadow: 1px 1px 0 #000;
  letter-spacing: 1px; text-align: center;
}
.daily-stats .lifetime-row b { color: #FFF; }

/* Share button — kicks off the viral loop */
.share-wrap { display: flex; justify-content: center; margin: 8px 0 4px; }
.share-btn {
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  padding: 7px 14px; background: #3A6B8B;
  border: 2px solid; border-color: #6090B0 #1A3A5A #1A3A5A #6090B0;
  color: #FFF; cursor: pointer; letter-spacing: 1px;
  text-shadow: 1px 1px 0 #000; transition: filter .1s;
}
.share-btn:hover { filter: brightness(1.15); }
.share-btn:active { border-color: #1A3A5A #6090B0 #6090B0 #1A3A5A; }
.share-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Social proof — "X focusing now" line below the progress bar */
.social-proof {
  text-align: center;
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  color: #8DB360; text-shadow: 1px 1px 0 #000;
  letter-spacing: 1px; margin: 2px 0 6px;
  transition: color .3s;
}
[data-mode="break"] .social-proof { color: #88BBFF; }
.social-proof.live { color: #FFD700; } /* gold-tint when real data is flowing */

/* Collective Mountain status badge — sits below social-proof */
.mountain-badge {
  text-align: center;
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  color: #E8D080;
  text-shadow: 1px 1px 0 #000;
  letter-spacing: 1px;
  padding: 4px 0 2px;
  background: rgba(0, 0, 0, 0.2);
  border-top: 1px dashed rgba(255, 255, 255, 0.2);
  border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
  margin: 4px 0;
}
.mountain-badge b { color: #FFD700; }
.mountain-badge .my-contrib { color: #8DB360; }
.social-proof.alone {
  color: #FFA500;  /* warm "first mover" orange */
  animation: aloneGlow 3s infinite alternate;
}
@keyframes aloneGlow {
  0%   { text-shadow: 1px 1px 0 #000; }
  100% { text-shadow: 1px 1px 0 #000, 0 0 4px rgba(255, 165, 0, 0.6); }
}

/* Live feed ticker — last N sessions from other users */
.live-feed {
  max-height: 0; overflow: hidden;
  transition: max-height .4s ease;
  margin: 0 12px;
}
.live-feed:not(:empty) {
  max-height: 120px; margin: 4px 12px 8px;
  padding: 6px 10px;
  background: rgba(0,0,0,0.25);
  border: 2px solid; border-color: #555 #222 #222 #555;
}
.feed-item {
  font-family: 'Press Start 2P', monospace; font-size: 6px;
  color: #DDD; text-shadow: 1px 1px 0 #000;
  padding: 3px 0; letter-spacing: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  animation: feedSlide .4s ease-out;
}
.feed-item b { color: #FFD700; }
.feed-item .feed-time { color: #888; }
.feed-empty {
  display: block; text-align: center;
  font-family: 'Press Start 2P', monospace; font-size: 6px;
  color: #666; padding: 6px 0;
}
@keyframes feedSlide {
  from { opacity: 0; transform: translateX(-10px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* Sound Settings */
.sound-settings {
  display: flex; justify-content: center; gap: 6px; margin: 10px 0 4px;
  flex-wrap: wrap; align-items: center;
}
.mc-toggle {
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  padding: 5px 10px; background: #6B3A3A;
  border: 2px solid; border-color: #996060 #4A1A1A #4A1A1A #996060;
  color: #CCC; cursor: pointer; white-space: nowrap;
  text-shadow: 1px 1px 0 #000; transition: filter .1s;
}
.mc-toggle.on {
  background: #3A6B3A; border-color: #60996D #1A4A1A #1A4A1A #60996D; color: #FFF;
}
.mc-toggle:hover { filter: brightness(1.15); }
.mc-toggle:active { border-color: #555 #AAA #AAA #555; }
.lofi-url-wrap {
  display: none; justify-content: center; gap: 4px; margin: 4px 0;
}
.lofi-url-wrap.show { display: flex; }
.lofi-url-input {
  font-family: 'Press Start 2P', monospace; font-size: 6px;
  padding: 4px 6px; background: #444; color: #DDD;
  border: 2px solid; border-color: #2A2A2A #7A7A7A #7A7A7A #2A2A2A;
  width: 200px; outline: none;
}
.lofi-url-input::placeholder { color: #888; }

/* Lofi Player */
.lofi-player { display: none; margin: 8px 0; }
.lofi-player.active { display: block; }
.lofi-player iframe {
  width: 100%; height: 80px;
  border: 2px solid; border-color: #555 #AAA #AAA #555;
}
.lofi-link {
  display: block; text-align: center; margin-top: 4px;
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  color: var(--accent-light); text-decoration: none;
  text-shadow: 1px 1px 0 #000;
}
.lofi-link:hover { color: #FFF; }

/* Footer Links */
.footer-links {
  display: flex; justify-content: center; align-items: center;
  gap: 8px; margin-top: 12px; flex-wrap: wrap;
}
.footer-links a {
  font-family: 'Press Start 2P', monospace; font-size: 8px;
  color: #FFF; text-decoration: none; letter-spacing: 1px;
  text-shadow: 1px 1px 0 #000;
  opacity: 0.85; transition: opacity .3s;
}
.footer-links a:hover { opacity: 1; }
.footer-dot { color: #FFF; opacity: 0.4; text-shadow: 1px 1px 0 #000; }

/* Settings Drawer */
.settings-drawer-tab {
  text-align: center; padding: 6px; margin-top: 8px;
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  color: #BBB; cursor: pointer; letter-spacing: 1px;
  text-shadow: 1px 1px 0 #000;
  transition: color .2s;
}
.settings-drawer-tab:hover { color: #FFF; }
.settings-drawer-tab .arrow {
  display: inline-block; transition: transform .3s;
  font-size: 6px; margin-left: 4px;
}
.settings-drawer-tab.open .arrow { transform: rotate(180deg); }
.settings-drawer {
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease, padding .35s ease;
  padding: 0 8px;
}
.settings-drawer.open {
  max-height: 320px;
  padding: 8px;
}
.drawer-toggles {
  display: flex; justify-content: center; gap: 6px;
  flex-wrap: wrap;
}
.drawer-section-label {
  text-align: center; margin: 12px 0 6px;
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  color: #AAA; letter-spacing: 2px; text-shadow: 1px 1px 0 #000;
}
.drawer-theme-picker {
  display: flex; justify-content: center; gap: 5px; flex-wrap: wrap;
}
.mc-theme-btn {
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  padding: 5px 8px; background: #6B3A3A;
  border: 2px solid; border-color: #996060 #4A1A1A #4A1A1A #996060;
  color: #CCC; cursor: pointer; white-space: nowrap;
  text-shadow: 1px 1px 0 #000; transition: filter .1s;
  display: inline-flex; align-items: center; gap: 5px;
}
.mc-theme-btn.on {
  background: #3A6B3A; border-color: #60996D #1A4A1A #1A4A1A #60996D; color: #FFF;
}
.mc-theme-btn:hover { filter: brightness(1.15); }
.mc-theme-btn:active { border-color: #555 #AAA #AAA #555; }
.mc-theme-btn .swatch {
  width: 10px; height: 10px; display: inline-block;
  border: 1px solid #000;
}

/* Nickname input in the settings drawer */
.drawer-nick-wrap {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; margin-top: 4px;
}
.drawer-nick-input {
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  padding: 6px 10px; background: #555; color: #FFF;
  border: 2px solid; border-color: #2A2A2A #7A7A7A #7A7A7A #2A2A2A;
  width: 200px; max-width: 80%; outline: none; text-align: center;
  text-shadow: 1px 1px 0 #000; letter-spacing: 1px;
}
.drawer-nick-input::placeholder { color: #999; }
.drawer-nick-input:focus {
  border-color: #4488CC #2A5A8A #2A5A8A #4488CC; background: #4A4A4A;
}
.drawer-nick-hint {
  font-family: 'Press Start 2P', monospace; font-size: 6px;
  color: #888; text-shadow: 1px 1px 0 #000;
}
.drawer-nick-hint.saved { color: #8DB360; }

/* ══════════════════════════════════════════════
   Focus Companion Mode — stream/overlay layout.
   Activated by ?mode=companion URL param.
   Hides controls/settings/stats, keeps only the
   scene + a subtle timer overlay. Perfect as an
   OBS browser source or a YouTube live background.

<script>
// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const P = 6;
// ═══════════════════════════════════════════
// "Collective Mountain Village" layout — 800x600 viewBox (4:3)
// ─────────────────────────────────────────
// Design philosophy (see CP-005):
//   - Central shared mountain that grows with global focus time
//   - Characters arranged in depth-sorted rows around the mountain base
//   - Main Steve sits front-and-center at the largest scale
//   - Neighbors fill the back row (smallest, behind the mountain edge),
//     mid row (flanking the sides), and front row (close to viewer)
//   - "Fake isometric" achieved via row-based scaling + shaded mountain
//
// Coordinate system:
//   x=0..800     : left to right of the scene
//   y=0..180     : sky zone (sun, clouds, mountain peak area)
//   y=180..420   : mountain body (peak at ~180, base at ~420)
//   y=380..540   : character zone (back row → front row)
//   y=540..600   : front ground strip
// ═══════════════════════════════════════════
const SVG_W = 800, SVG_H = 600, GROUND_Y = 540;

// ── Collective Mountain geometry ──
const MOUNTAIN_CENTER_X = 400;    // horizontal center of the pyramid
const MOUNTAIN_BASE_Y = 420;      // y of the mountain's base row
const MOUNTAIN_LAYER_H = 32;      // px per vertical layer (taller for grandeur)
const MOUNTAIN_BLOCK_W = 24;      // px per horizontal block in a layer
const MOUNTAIN_MAX_LAYERS = 13;   // visual cap; 13 layers × 32 = 416px tall

// ── Character rows (front = larger, back = smaller) ──
// Each row has fixed slot positions. When a user joins, they fill
// the lowest-index empty slot, preferring back→mid→front so the main
// stays front-center and new users populate the scene gradually.
const CHAR_SLOTS = [
  // Back row — 5 slots, small scale, behind mountain base line
  { id: 'back-1',  x: 120, y: 390, scale: 3, row: 'back' },
  { id: 'back-2',  x: 250, y: 400, scale: 3, row: 'back' },
  { id: 'back-3',  x: 550, y: 400, scale: 3, row: 'back' },
  { id: 'back-4',  x: 680, y: 390, scale: 3, row: 'back' },
  // Mid row — 2 slots, medium scale, flanking the mountain sides
  { id: 'mid-1',   x:  80, y: 470, scale: 4, row: 'mid' },
  { id: 'mid-2',   x: 720, y: 470, scale: 4, row: 'mid' },
  // Front row — 2 slots, larger scale, next to main
  { id: 'front-1', x: 220, y: 520, scale: 5, row: 'front' },
  { id: 'front-2', x: 580, y: 520, scale: 5, row: 'front' },
  // (main Steve takes the center front spot, rendered separately)
];
// MAIN Steve position (center-front, largest)
const MAIN_STEVE_X = 376;   // center 400 - body/2
const MAIN_STEVE_BASE_Y = GROUND_Y;  // feet on the ground line
const TOTAL_SESSIONS = 8, HITS_TO_BREAK = 4;
const LONG_BREAK_INTERVAL = 4; // long break every N sessions

// ═══════════════════════════════════════════
// URL PARAMETERS
// ─────────────────────────────────────────
// Supported params (all optional):
//   ?theme=tomato|diamond|emerald|gold|ruby   — initial theme
//   ?mode=companion                           — stream/overlay layout
//   ?focus=25 &break=5 &long=15               — timer preset in minutes
//   ?autostart=1                              — start the focus timer on load
// These let creators embed links with presets in videos/descriptions.
// ═══════════════════════════════════════════
const urlParams = new URLSearchParams(window.location.search);
const urlParam = (k) => urlParams.get(k);
const urlInt = (k, min, max) => {
  const n = parseInt(urlParam(k), 10);
  return (Number.isFinite(n) && n >= min && n <= max) ? n : null;
};

// ═══════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════
const saved = JSON.parse(localStorage.getItem('pomodocraft') || '{}');
let focusMin = urlInt('focus', 1, 180) || saved.focusMin || 25;
let breakMin = urlInt('break', 1, 60) || saved.breakMin || 5;
let longBreakMin = urlInt('long', 1, 120) || saved.longBreakMin || 15;
let completedSessions = saved.sessions || 0;
let blocksMined = 0;
let alarmEnabled = saved.alarmEnabled !== false;
let lofiEnabled = saved.lofiEnabled !== false;
const lofiUrl = 'https://youtu.be/BrG_9l_fD-I';
let autoBreak = saved.autoBreak !== false;
let autoFocus = saved.autoFocus !== false;
// Theme always resets to tomato on page load — tomato is the app's identity.
// Mid-session switches still work, but a fresh load always starts fresh.
// URL ?theme=X overrides for creator-embedded links.
const urlTheme = urlParam('theme');
let currentThemeId = (urlTheme && ['tomato','diamond','emerald','gold','ruby'].includes(urlTheme))
  ? urlTheme : 'tomato';
const isCompanionMode = urlParam('mode') === 'companion';
const shouldAutoStart = urlParam('autostart') === '1' || urlParam('autostart') === 'true';

// ═══════════════════════════════════════════
// NICKNAME — anonymous identity for multiplayer
// ─────────────────────────────────────────
// First visit: generate guest_XXXX (4 hex chars). Persisted in
// localStorage. User can change it via the settings drawer. It's
// sent to the Worker on every hello / state update so other users
// see a human-readable label above each mini Steve.
// ═══════════════════════════════════════════
function loadNick() {
  const stored = localStorage.getItem('pomodocraft_nick');
  if (stored) return stored;
  const rand = Math.random().toString(16).slice(2, 6);
  const fresh = `guest_${rand}`;
  localStorage.setItem('pomodocraft_nick', fresh);
  return fresh;
}
function saveNick(nick) {
  const clean = (nick || '').trim().replace(/[^\w가-힣.-]/g, '').slice(0, 20);
  const final = clean || `guest_${Math.random().toString(16).slice(2, 6)}`;
  localStorage.setItem('pomodocraft_nick', final);
  return final;
}
let currentNick = loadNick();

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function loadDaily() {
  const d = JSON.parse(localStorage.getItem('pomodocraft_daily') || '{}');
  if (d.date !== todayKey()) return { date: todayKey(), sessions: 0, focusMin: 0, breakMin: 0, blocks: 0, log: [] };
  if (!d.log) d.log = [];
  return d;
}
function saveDaily(data) {
  data.date = todayKey();
  localStorage.setItem('pomodocraft_daily', JSON.stringify(data));
}
let daily = loadDaily();

// ═══════════════════════════════════════════
// STREAK SYSTEM — "me vs yesterday me"
// ─────────────────────────────────────────
// Tracks consecutive days with at least one completed focus session.
// Stored in its own localStorage key so daily stats reset doesn't wipe
// streak history. Broken streaks start over from 1 (no grace / freeze
// in v1 — can add Streak Freeze item later).
// ═══════════════════════════════════════════
function loadStreak() {
  return JSON.parse(localStorage.getItem('pomodocraft_streak') || '{}');
}
function saveStreak(data) {
  localStorage.setItem('pomodocraft_streak', JSON.stringify(data));
}
function yesterdayKey() {
  const d = new Date(Date.now() - 86400000);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function updateStreakOnSession() {
  const s = loadStreak();
  const today = todayKey();
  // Already counted today — nothing to do.
  if (s.lastDate === today) return;

  let newCurrent;
  if (!s.lastDate) {
    newCurrent = 1;                      // first ever session
  } else if (s.lastDate === yesterdayKey()) {
    newCurrent = (s.current || 0) + 1;   // continuing streak
  } else {
    newCurrent = 1;                      // broken streak restart
  }
  const newBest = Math.max(s.best || 0, newCurrent);

  saveStreak({ lastDate: today, current: newCurrent, best: newBest });
}
function getStreak() {
  const s = loadStreak();
  // If last session was neither today nor yesterday, the streak is
  // technically broken. Display 0 for "current" in that case, but keep
  // the stored value so tomorrow's first session can see "broken" vs
  // "never started".
  const today = todayKey();
  const yest = yesterdayKey();
  const isAlive = s.lastDate === today || s.lastDate === yest;
  return {
    current: isAlive ? (s.current || 0) : 0,
    best: s.best || 0,
    lastDate: s.lastDate || null,
  };
}

// ═══════════════════════════════════════════
// LIFETIME STATS — "me vs my all-time best"
// ─────────────────────────────────────────
// Totals that never reset. Feeds the share card ("42 day journey").
// ═══════════════════════════════════════════
function loadLifetime() {
  return JSON.parse(localStorage.getItem('pomodocraft_lifetime') || '{}');
}
function saveLifetime(data) {
  localStorage.setItem('pomodocraft_lifetime', JSON.stringify(data));
}
function updateLifetimeOnSession(minutes) {
  const L = loadLifetime();
  const today = todayKey();
  const newTotal = (L.totalMinutes || 0) + minutes;
  const newSessions = (L.totalSessions || 0) + 1;

  // Track best single day
  const d = loadDaily();
  let bestDay = L.bestDay || { date: null, minutes: 0 };
  if (d.focusMin > bestDay.minutes) {
    bestDay = { date: today, minutes: d.focusMin };
  }

  saveLifetime({
    firstDay: L.firstDay || today,
    totalMinutes: newTotal,
    totalSessions: newSessions,
    bestDay,
  });
}
function getLifetime() {
  const L = loadLifetime();
  // Days since first session
  let daysSinceStart = 0;
  if (L.firstDay) {
    const start = new Date(L.firstDay);
    const now = new Date(todayKey());
    daysSinceStart = Math.max(1, Math.floor((now - start) / 86400000) + 1);
  }
  return {
    firstDay: L.firstDay || null,
    totalMinutes: L.totalMinutes || 0,
    totalSessions: L.totalSessions || 0,
    bestDay: L.bestDay || { date: null, minutes: 0 },
    daysSinceStart,
  };
}

function recordSession(type, minutes) {
  daily = loadDaily();
  if (type === 'focus') {
    daily.sessions++;
    daily.focusMin += minutes;
  } else {
    daily.breakMin += minutes;
  }
  // Add to session log
  const now = new Date();
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const task = document.getElementById('taskInput').value.trim();
  daily.log.push({ time: timeStr, type, duration: minutes, task: task || '' });
  saveDaily(daily);

  // Streak + lifetime tracking (focus sessions only)
  if (type === 'focus') {
    updateStreakOnSession();
    updateLifetimeOnSession(minutes);
    // Fire-and-forget: push to multiplayer backend if configured.
    // This is what makes "other users see this session in their feed".
    recordGlobalSession(minutes, currentThemeId, currentNick);

    // Add blocks to the mountain locally so the animation plays
    // immediately, even without a backend. If the backend is connected,
    // it'll sync the authoritative value shortly after.
    const earned = 1 + Math.floor(minutes / 10);
    globalMountainBlocks += earned;
    myMountainContribution += earned;
    renderMountain();
    renderMountainBadge();
    // Play the contribution animation from the main Steve's position
    flyContributionBlock({
      nick: currentNick,
      theme: currentThemeId,
    });
  }

  renderDailyStats();
  renderSessionLog();
}
function recordBlocks(count) {
  daily = loadDaily();
  daily.blocks += count;
  saveDaily(daily);
  renderDailyStats();
}

function renderDailyStats() {
  const el = document.getElementById('dailyStats');
  const d = loadDaily();
  const dateStr = d.date.replace(/-/g, '.');
  const emoji = (THEMES[currentThemeId] && THEMES[currentThemeId].harvestEmoji) || '🍅';
  const streak = getStreak();
  const life = getLifetime();

  // Render up to 10 harvest icons inline, then "× N" if more.
  const iconsToShow = Math.min(d.sessions, 10);
  const harvestIcons = iconsToShow > 0
    ? emoji.repeat(iconsToShow) + (d.sessions > 10 ? ` ×${d.sessions}` : '')
    : '<span class="harvest-empty">— no harvest yet —</span>';

  // Streak badge — 🔥 N DAY STREAK (highlights when active)
  const streakBadge = streak.current > 0
    ? `<span class="streak-badge active">🔥 ${streak.current} DAY STREAK</span>`
    : `<span class="streak-badge">🌱 START YOUR STREAK</span>`;

  // Lifetime line (only show if at least one session ever)
  const lifetimeLine = life.totalSessions > 0
    ? `<div class="lifetime-row">
         ALL-TIME <b>${life.totalSessions}</b> ${emoji} ·
         <b>${life.totalMinutes}</b>M FOCUSED ·
         BEST STREAK <b>${streak.best}</b>D ·
         BEST DAY <b>${life.bestDay.minutes}</b>M
       </div>`
    : '';

  el.innerHTML = `
    <div class="stat-date">TODAY ${dateStr}</div>
    <div class="stat">SESSIONS <b>${d.sessions}</b></div>
    <div class="stat">FOCUS <b>${d.focusMin}</b>M</div>
    <div class="stat">BREAK <b>${d.breakMin}</b>M</div>
    <div class="stat">BLOCKS <b>${d.blocks}</b></div>
    <div class="harvest-row">HARVEST <span class="harvest-icons">${harvestIcons}</span></div>
    <div class="streak-row">${streakBadge}</div>
    ${lifetimeLine}
  `;
}

function saveState() {
  localStorage.setItem('pomodocraft', JSON.stringify({
    focusMin, breakMin, longBreakMin, sessions: completedSessions,
    alarmEnabled, lofiEnabled,
    autoBreak, autoFocus,
    // themeId intentionally NOT persisted — always resets to tomato on load.
  }));
}

// ═══════════════════════════════════════════
// COLORS
// ═══════════════════════════════════════════
const C = {
  hair: '#5A3A12', hairLight: '#8A5A28',
  skin: '#F4C28E', skinShadow: '#D9A06F', eyes: '#2A1A08', mouth: '#8A3A2A', blush: '#EFA088',
  hat: '#D83030', hatDark: '#7A1515', hatBand: '#FFFFFF',
  shirt: '#00AAAA', shirtDark: '#007878',
  pants: '#1B1BB3', pantsDark: '#00007B', shoe: '#444',
  grassTop: '#5B8731', grassSide: '#8DB360',

  moss: '#4A7A3A', mossLight: '#6BA04A', mossDark: '#2D5A1F',

// ═══════════════════════════════════════════
// SVG HELPERS
// ═══════════════════════════════════════════
const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs={}) { const e = document.createElementNS(NS, tag); for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v); return e; }
function rect(x,y,w,h,fill,parent) { const r = el('rect',{x,y,width:w,height:h,fill}); if(parent) parent.appendChild(r); return r; }
function renderSprite(data, colorMap, ox, oy, scale, parent) {
  const g = el('g', { transform:`translate(${ox},${oy})` });
  data.forEach((row,ry) => [...row].forEach((ch,rx) => {
    if (ch==='.' || !colorMap[ch]) return;
    rect(rx*scale, ry*scale, scale, scale, colorMap[ch], g);
  }));
  if (parent) parent.appendChild(g);
  return g;
}

// ═══════════════════════════════════════════

// PROCEDURAL HILL GROWTH SYSTEM
// ═══════════════════════════════════════════
const HILL_SLOPE = 0.55;      // pyramid angle (lower = wider)
const HILL_MAX_HEIGHT = 25;
const DIG_BLOCK_INTERVAL = 2.0; // seconds between hill block additions
let digBlockAccumulator = 0;

const hillGrid = {};
let hillCurrentLayer = 0;
let hillLayerQueue = [];

function hillKey(c,r) { return `${c},${r}`; }
function hillHas(c,r) { return hillGrid[hillKey(c,r)] === true; }
function hillSupport(c,r) { return r === 0 || hillHas(c, r-1); }

function hillMaxWidthAt(row, baseHW) {
  return Math.max(1, Math.floor(baseHW - row * HILL_SLOPE));
}

function hillTargetBaseHW() {
  return Math.floor(2 + hillCurrentLayer / HILL_SLOPE);
}

function hillGenPositions() {
  const hw = hillTargetBaseHW();
  const pos = [];
  for (let row = 0; row <= hillCurrentLayer; row++) {
    const maxW = hillMaxWidthAt(row, hw);
    for (let dist = 0; dist <= maxW; dist++) {
      const cols = dist === 0 ? [0] : [-dist, dist];
      for (const col of cols) {
        const px = HILL_BASE_X + col * P;
        if (px >= 0 && px < SVG_W && !hillHas(col, row) && hillSupport(col, row)) {
          pos.push([col, row]);
        }
      }
    }
  }
  return pos;
}

// Delegate to the active theme so each biome paints its hill differently.
function hillBlockColor(col, row) {
  return THEMES[currentThemeId].hillBlockColor(col, row, hillCurrentLayer);
}

function addHillBlock() {
  if (hillLayerQueue.length === 0) {
    hillLayerQueue = hillGenPositions();
    if (hillLayerQueue.length === 0) {
      hillCurrentLayer = Math.min(hillCurrentLayer + 1, HILL_MAX_HEIGHT);
      hillLayerQueue = hillGenPositions();
    }
  }
  if (hillLayerQueue.length === 0) return;

  const [col, row] = hillLayerQueue.shift();
  const bx = HILL_BASE_X + col * P;
  const by = HILL_BASE_Y - (row + 1) * P;

  // Fling dirt from Steve to hill target
  flingDirt(steveX + 5*P, GROUND_Y - 6*P, bx, by, col, row);
}

function flingDirt(sx, sy, ex, ey, col, row) {
  const theme = THEMES[currentThemeId];
  const [mainColor, topColor] = theme.chunkColors;
  const chunk = el('g');
  // Small themed chunk (e.g. dirt, tomato-leaf, cave rock, sand, etc.)
  rect(0, 0, P, P, Math.random() > .5 ? mainColor : topColor, chunk);
  rect(0, 0, P, 2, topColor, chunk);
  svg.appendChild(chunk);

  // Parabolic arc: midpoint high above
  const mx = (sx + ex) / 2;
  const my = Math.min(sy, ey) - 40 - Math.random() * 30;
  const dur = 500 + Math.random() * 200;

  chunk.animate([
    { transform: `translate(${sx}px,${sy}px) scale(0.8)`, opacity: 1 },
    { transform: `translate(${mx}px,${my}px) scale(1.1) rotate(180deg)`, opacity: 1 },
    { transform: `translate(${ex}px,${ey}px) scale(1) rotate(360deg)`, opacity: 1 },
  ], { duration: dur, easing: 'ease-in', fill: 'forwards' });

  // Place actual hill block when dirt lands
  setTimeout(() => {
    chunk.remove();
    hillGrid[hillKey(col, row)] = true;
    hillBlockCount++;
    rect(ex, ey, P, P, hillBlockColor(col, row), hillG);
    if (!hillHas(col, row + 1)) {
      rect(ex, ey, P, 2, topColor, hillG);
    }
    // Landing particles (themed)
    spawnParticles(ex + P/2, ey + P/2, theme.landParticles, 3);
  }, dur);
}

function resetHill() {
  for (const k in hillGrid) delete hillGrid[k];
  hillBlockCount = 0;
  hillCurrentLayer = 0;
  hillLayerQueue = [];
  digBlockAccumulator = 0;
  if (hillG) hillG.innerHTML = '';
}

  //        Drawn BEFORE the remote users so characters can stand on
  //        its lower slopes (back-row users appear on the grass zone).
  mountainG = el('g');
  svg.appendChild(mountainG);

  // ── 7. Remote users layer — drawn AFTER the mountain so back-row
  //        characters sit on the mountain slope instead of being hidden
  //        behind it. Front-row / main Steve are below the mountain
  //        base anyway so they're unaffected.
  remoteUsersG = el('g');
  svg.appendChild(remoteUsersG);

  // ── 8. Front grass strip under the main area ──
  const groundG = el('g');
  for (let x = 0; x < SVG_W; x += P) {
    // Grass top layer
    rect(x, GROUND_Y, P, P, (x/P)%5===0 ? C.grassSide : C.grassTop, groundG);
    rect(x, GROUND_Y + P, P, P, (x/P)%7===0 ? C.grassSide : C.grassTop, groundG);
    // Dirt rows below
    for (let row = 2; row < 10; row++) {
      rect(x, GROUND_Y + row*P, P, P, (x+row*3)%5===0 ? C.dirtDark : C.dirt, groundG);
    }
  }
  svg.appendChild(groundG);

  // ── 9. Main Steve trees (close to main Steve, on either side) ──
  const mainTreesG = el('g');
  buildTree(mainTreesG, 240);
  buildTree(mainTreesG, 540);
  svg.appendChild(mainTreesG);

  // ── 10. Focus layer (legacy — ore block hidden, only kept for
  //        crack overlay compatibility with updateMining fallback path) ──
  focusLayerG = el('g');
  svg.appendChild(focusLayerG);
  blockShakeG = el('g');
  oreBlockG = renderSprite(ORE_BLOCK, ORE_COLORS, ORE_X, ORE_Y, P, blockShakeG);
  oreBlockG.setAttribute('opacity', 0);  // never visible in new layout
  crackOverlayG = el('g');
  blockShakeG.appendChild(crackOverlayG);
  focusLayerG.appendChild(blockShakeG);

  // Hill layer (legacy — now repurposed for small visual flourishes
  // but does NOT hold the main mountain, which is mountainG instead).
  hillG = el('g');
  focusLayerG.appendChild(hillG);

  // ── 11. Creeper (random appearance during focus) ──
  creeperG = el('g', {opacity:0});
  renderSprite(CREEPER, CREEPER_COLORS, 560, GROUND_Y-8*P, 5, creeperG);
  focusLayerG.appendChild(creeperG);

  // ── 12. Break layer (night overlay) ──
  breakLayerG = el('g', {opacity:0});
  svg.appendChild(breakLayerG);
  campfireG = el('g');
  buildCampfire(campfireG, MAIN_STEVE_X + 60, GROUND_Y-4*P);
  breakLayerG.appendChild(campfireG);

  // Wolf — sits on the other side of main Steve during break
  wolfG = el('g');
  renderSprite(WOLF1, WOLF_COLORS, 0, 0, 6, wolfG);
  wolfG.setAttribute('transform', `translate(${MAIN_STEVE_X - 80},${GROUND_Y-7*P})`);
  breakLayerG.appendChild(wolfG);

  // ── 13. Contribution FX layer (blocks flying to mountain) ──
  contribFxG = el('g');
  svg.appendChild(contribFxG);

  // ── Initial mountain render (before any live data arrives) ──
  renderMountain();

  // Chicken
  chickenG = el('g', {opacity:0});
  renderSprite(CHICKEN_R, CHICKEN_COLORS, 0, 0, 5, chickenG);
  breakLayerG.appendChild(chickenG);

  // Steve (composite) — uses myCharMap so the main user's hat color
  // matches their nick-derived palette entry.
  if (!myCharMap) myCharMap = buildMyCharMap();
  steveGroup = el('g');
  svg.appendChild(steveGroup);
  steveBodyG = el('g');
  renderSprite(STEVE_BODY, myCharMap, 0, 0, P, steveBodyG);
  steveGroup.appendChild(steveBodyG);
  steveLegsG = el('g');
  renderSprite(LEG_STAND, myCharMap, 0, STEVE_BODY.length*P, P, steveLegsG);
  steveGroup.appendChild(steveLegsG);
  steveArmG = el('g', {opacity:0});
  renderSprite(PICK_HANDLE, PICK_COLORS, 0, 0, P, steveArmG);
  steveGroup.appendChild(steveArmG);

  positionSteve();

  // Effect layers
  itemLayer = el('g'); svg.appendChild(itemLayer);
  particleLayer = el('g'); svg.appendChild(particleLayer);

  updateSceneMode(sceneMode);
}

function buildCloud(parent, x, y, w) {
  const g = el('g', {opacity:'0.85'});
  [[Math.floor(w*.2),w*.6],[0,w],[Math.floor(w*.1),w*.8]].forEach(([ox,rw],i) =>
    rect(x+ox, y+i*6, rw, 6, '#FFF', g));
  g.appendChild(el('animateTransform', {
    attributeName:'transform', type:'translate', from:'0,0', to:`-${SVG_W},0`,
    dur:`${120+x*.15}s`, repeatCount:'indefinite'
  }));
  parent.appendChild(g);
}

function buildTree(parent, x) {
  const g = el('g');
  // Taller trunk (5 blocks)
  for (let i=0;i<5;i++) rect(x+P, GROUND_Y-(i+1)*P, P, P, i%2===0?C.wood:C.woodLight, g);
  // Fuller, rounder canopy
  const leafRows = [[1,3],[0,5],[0,5],[-1,6],[0,5],[0,5],[1,3]];
  leafRows.forEach(([s,cnt],row) => {
    for (let i=0;i<cnt;i++) {
      const lx = x + (s+i-1)*P;
      const ly = GROUND_Y - (12-row)*P;
      const bright = (row+i)%4===0 || (row===0&&i>0&&i<cnt-1);
      rect(lx, ly, P, P, bright?C.leavesBright:C.leaves, g);
    }
  });
  parent.appendChild(g);
}

function buildCampfire(parent, x, y) {
  [[0,0,C.wood],[1,0,C.woodLight],[2,0,C.wood],[3,0,C.woodDark],
   [0,1,C.woodLight],[1,1,C.wood],[2,1,C.woodDark],[3,1,C.wood]].forEach(([bx,by,c]) =>
    rect(x+bx*P, y+by*P, P, P, c, parent));
  // Base flames
  [[0.5,-1,C.fire1],[1.5,-1,C.fire3],[2.5,-1,C.fire1],
   [1,-2,C.fire2],[2,-2,C.fire2],[1.5,-3,C.fire3]].forEach(([fx,fy,fc]) => {
    const f = rect(x+fx*P, y+fy*P, P, P, fc, parent);
    f.style.animation = `${Math.random()>.5?'flicker1':'flicker2'} ${.3+Math.random()*.3}s infinite alternate`;
  });
}

// ═══════════════════════════════════════════
// BIRD — animated M-silhouette flying across the sky
// Uses SVG SMIL animateTransform for smooth horizontal travel +
// a subtle vertical bob so it doesn't feel like a sliding sticker.
// ═══════════════════════════════════════════
function drawBird(parent, startX, y, size = 2, durationSec = 30, direction = 1) {
  // Outer group handles the SMIL position; inner group holds pixels
  const g = el('g', { transform: `translate(${startX},${y})` });
  const c = '#1A2840';
  const s = size;
  // M-shaped silhouette at local (0,0)
  rect(0,         0,     s * 2, s, c, g);
  rect(s * 2,     s,     s * 2, s, c, g);
  rect(s * 4,     s * 2, s * 2, s, c, g);
  rect(s * 5,     s * 3, s * 2, s, c, g);
  rect(s * 6,     s * 2, s * 2, s, c, g);
  rect(s * 8,     s,     s * 2, s, c, g);
  rect(s * 10,    0,     s * 2, s, c, g);

  // Horizontal travel — additive so it composes with the base translate
  const travel = direction > 0 ? (SVG_W + 120) : -(SVG_W + 120);
  const moveX = el('animateTransform', {
    attributeName: 'transform',
    type: 'translate',
    additive: 'sum',
    from: '0 0',
    to: `${travel} 0`,
    dur: `${durationSec}s`,
    repeatCount: 'indefinite',
  });
  g.appendChild(moveX);

  // Subtle vertical bob — sine-like via 5 keyframes
  const bobAmp = s * 2;
  const bobY = el('animateTransform', {
    attributeName: 'transform',
    type: 'translate',
    additive: 'sum',
    values: `0 0; 0 -${bobAmp}; 0 0; 0 ${bobAmp}; 0 0`,
    dur: `${2 + size}s`,
    repeatCount: 'indefinite',
  });
  g.appendChild(bobY);

  parent.appendChild(g);
}

// ═══════════════════════════════════════════
// DISTANT MOUNTAINS — parallax silhouettes behind the main one
// Draws a jagged triangular pixel mountain at (x, y) with the given
// width/height and fill color. Simple parallax depth cue.
// ═══════════════════════════════════════════
function drawDistantMountain(parent, x, baseY, width, height, color) {
  const steps = 8;
  const halfW = width / 2;
  const peakX = x + halfW;
  const peakY = baseY - height;
  // Left slope
  for (let i = 0; i < steps; i++) {
    const lx = x + (halfW * i / steps);
    const ly = baseY - (height * i / steps);
    const stepW = halfW / steps + 3;
    rect(lx, ly, stepW, baseY - ly, color, parent);
  }
  // Right slope
  for (let i = 0; i < steps; i++) {
    const rx = peakX + (halfW * i / steps);
    const ry = peakY + (height * i / steps);
    const stepW = halfW / steps + 3;
    rect(rx, ry, stepW, baseY - ry, color, parent);
  }
  // Small snow cap
  const snowH = 6;
  rect(peakX - 4, peakY, 8, snowH, '#FFFFFF', parent);
}

// ═══════════════════════════════════════════
// COLLECTIVE MOUNTAIN RENDERER
// ─────────────────────────────────────────
// Draws a central pyramid mountain whose layer count = f(globalBlocks).
// Layers are drawn as horizontal bands, narrowing as they go up, with
// simple left/right face shading to suggest isometric 3D depth.
//
// Color zones (bottom → top):
//   Bottom third: grass / dirt
//   Middle third: stone gray
//   Top third:    snow white-blue
//
// Called by:
//   - buildScene() on initial load
//   - renderMountain() on every globalMountainBlocks update
//   - applyTheme() so the mountain respects the active theme's palette
// ═══════════════════════════════════════════

// Computes how many visual layers to show from a global block count.
// Logarithmic so early contributions feel rewarding and later ones
// don't explode the mountain off the canvas.
function computeMountainLayers(globalBlocks) {
  const b = Math.max(0, globalBlocks || 0);
  if (b < 10)   return 3;
  if (b < 30)   return 5;
  if (b < 60)   return 7;
  if (b < 120)  return 9;
  if (b < 250)  return 11;
  if (b < 500)  return 13;
  return MOUNTAIN_MAX_LAYERS;
}

// Three-zone mountain palette — Townscaper-inspired vibrant but soft.
// Each zone has: main body, dark shadow (right/sun-away side), and
// highlight (left/sun-facing side + top edges).
function mountainLayerColors(layerIndex, totalLayers) {
  const ratio = layerIndex / Math.max(1, totalLayers - 1);
  if (ratio > 0.75) {
    // Snow zone — cool white-blue
    return {
      main:      '#EEF4FB',
      shade:     '#B8CEE0',
      darkShade: '#8FA5BC',
      highlight: '#FFFFFF',
      topEdge:   '#FFFFFF',
    };
  }
  if (ratio > 0.42) {
    // Stone zone — warm brownish gray (not plain gray)
    return {
      main:      '#8A7A68',
      shade:     '#685A4A',
      darkShade: '#4A3E32',
      highlight: '#A89880',
      topEdge:   '#B0A090',
    };
  }
  // Grass zone — vibrant cozy green
  return {
    main:      '#6CA83E',
    shade:     '#446B22',
    darkShade: '#2D4A13',
    highlight: '#8BD04C',
    topEdge:   '#A4E466',
  };
}

function renderMountain() {
  if (!mountainG) return;
  mountainG.innerHTML = '';

  const layers = computeMountainLayers(globalMountainBlocks);
  const baseBlocks = layers * 2 + 3;  // odd number for symmetry

  // ── 1. Draw main mountain body (back to front = top to bottom) ──
  for (let i = 0; i < layers; i++) {
    const blocksThisLayer = baseBlocks - (i * 2);
    if (blocksThisLayer <= 0) break;

    const layerW = blocksThisLayer * MOUNTAIN_BLOCK_W;
    const layerX = MOUNTAIN_CENTER_X - layerW / 2;
    const layerY = MOUNTAIN_BASE_Y - (i + 1) * MOUNTAIN_LAYER_H;

    const c = mountainLayerColors(i, layers);

    // Main body fill
    rect(layerX, layerY, layerW, MOUNTAIN_LAYER_H, c.main, mountainG);

    // Sun-facing (LEFT) highlight — soft lighter gradient
    rect(layerX, layerY, 6, MOUNTAIN_LAYER_H, c.highlight, mountainG);
    rect(layerX + 6, layerY, 2, MOUNTAIN_LAYER_H - 2, c.highlight, mountainG);

    // Sun-away (RIGHT) shadow — gradient darker
    rect(layerX + layerW - 6, layerY, 6, MOUNTAIN_LAYER_H, c.shade, mountainG);
    rect(layerX + layerW - 3, layerY, 3, MOUNTAIN_LAYER_H, c.darkShade, mountainG);

    // Top highlight edge — gives volume
    rect(layerX, layerY, layerW, 2, c.topEdge, mountainG);

    // ── Texture dots — scattered shadow + highlight pixels ──
    const dotSeed = i * 7;
    for (let bx = 0; bx < blocksThisLayer; bx++) {
      const cx = layerX + bx * MOUNTAIN_BLOCK_W;
      // Shadow dot (pseudo-random via hash)
      if ((bx * 3 + dotSeed) % 5 === 0) {
        rect(cx + 8, layerY + 9, 2, 2, c.shade, mountainG);
      }
      if ((bx * 5 + dotSeed) % 7 === 0) {
        rect(cx + 14, layerY + 6, 2, 2, c.darkShade, mountainG);
      }
      // Highlight dot
      if ((bx + dotSeed) % 4 === 0) {
        rect(cx + 4, layerY + 5, 2, 2, c.highlight, mountainG);
      }
    }
  }

  // ── 2. Trees at the bottom 1-2 layers (grass zone) ──
  if (layers >= 3) {
    // Bottom layer trees
    const bottomBlocks = baseBlocks;
    const bottomW = bottomBlocks * MOUNTAIN_BLOCK_W;
    const bottomX = MOUNTAIN_CENTER_X - bottomW / 2;
    const bottomY = MOUNTAIN_BASE_Y - MOUNTAIN_LAYER_H;

    // Scatter small pine trees on the bottom layer
    for (let t = 1; t < bottomBlocks - 1; t += 2) {
      if ((t + layers) % 3 === 1) continue;  // some gaps
      const tx = bottomX + t * MOUNTAIN_BLOCK_W + 6;
      const ty = bottomY - 2;
      drawMountainTree(mountainG, tx, ty);
    }

    // Second layer trees (sparse)
    if (layers >= 4) {
      const secondBlocks = baseBlocks - 2;
      const secondW = secondBlocks * MOUNTAIN_BLOCK_W;
      const secondX = MOUNTAIN_CENTER_X - secondW / 2;
      const secondY = MOUNTAIN_BASE_Y - 2 * MOUNTAIN_LAYER_H;
      for (let t = 2; t < secondBlocks - 2; t += 4) {
        const tx = secondX + t * MOUNTAIN_BLOCK_W + 6;
        drawMountainTree(mountainG, tx, secondY - 2);
      }
    }
  }

  // ── 3. Snow cap on the top layer(s) — wavy drift shape ──
  if (layers >= 4) {
    const topIdx = layers - 1;
    const topBlocks = baseBlocks - topIdx * 2;
    const topW = topBlocks * MOUNTAIN_BLOCK_W;
    const topX = MOUNTAIN_CENTER_X - topW / 2;
    const topY = MOUNTAIN_BASE_Y - (topIdx + 1) * MOUNTAIN_LAYER_H;

    // Wavy snow drift — 4 or 5 undulations
    for (let x = 0; x < topW; x += 4) {
      const waveH = Math.round(3 + Math.sin(x * 0.18) * 3 + Math.cos(x * 0.4) * 1.5);
      // White snow body
      rect(topX + x, topY - waveH, 4, waveH + 2, '#FFFFFF', mountainG);
      // Blue shadow under the peaks
      rect(topX + x + 2, topY - waveH + 1, 2, 2, '#E0EAF5', mountainG);
    }
  }

  // ── 4. Rocky details on stone layers (middle zone) ──
  if (layers >= 6) {
    const stoneStartLayer = Math.floor(layers * 0.42);
    const stoneEndLayer   = Math.floor(layers * 0.75);
    for (let i = stoneStartLayer; i < stoneEndLayer; i++) {
      const blocksThisLayer = baseBlocks - (i * 2);
      if (blocksThisLayer <= 0) break;
      const layerW = blocksThisLayer * MOUNTAIN_BLOCK_W;
      const layerX = MOUNTAIN_CENTER_X - layerW / 2;
      const layerY = MOUNTAIN_BASE_Y - (i + 1) * MOUNTAIN_LAYER_H;
      // A few rocky chunks
      for (let r = 0; r < 2; r++) {
        const rx = layerX + 8 + ((i * 13 + r * 37) % Math.max(1, layerW - 20));
        const ry = layerY + 3;
        // Small 3x3 rock
        rect(rx,     ry,     4, 3, '#6B5A48', mountainG);
        rect(rx + 1, ry + 3, 4, 2, '#8A7A68', mountainG);
        rect(rx,     ry + 3, 1, 2, '#4A3E32', mountainG);
      }
    }
  }

  // ── 5. Peak flag — red triumphant banner when big enough ──
  if (layers >= 8) {
    const topY = MOUNTAIN_BASE_Y - layers * MOUNTAIN_LAYER_H - 22;
    const flagX = MOUNTAIN_CENTER_X;
    // Pole
    rect(flagX, topY, 2, 22, '#6B4423', mountainG);
    rect(flagX + 1, topY, 1, 22, '#8B5A2B', mountainG);
    // Flag body
    rect(flagX + 2, topY, 18, 11, '#E63946', mountainG);
    rect(flagX + 2, topY + 1, 2, 9, '#B02A37', mountainG);
    rect(flagX + 2, topY, 18, 1, '#FF6B6B', mountainG);   // top highlight
    // Tiny white star on flag
    rect(flagX + 9, topY + 4, 2, 1, '#FFFFFF', mountainG);
    rect(flagX + 8, topY + 5, 4, 1, '#FFFFFF', mountainG);
    rect(flagX + 9, topY + 6, 2, 1, '#FFFFFF', mountainG);
  }

  // ── 6. Atmospheric cloud ring near the peak (very tall mountains) ──
  if (layers >= 12) {
    const cloudY = MOUNTAIN_BASE_Y - (layers - 2) * MOUNTAIN_LAYER_H;
    // Soft white puffs floating near the upper third
    [-60, -30, 40, 70].forEach((dx, i) => {
      const cx = MOUNTAIN_CENTER_X + dx;
      rect(cx, cloudY + (i % 2) * 4, 14, 3, '#FFFFFF', mountainG);
      rect(cx + 2, cloudY + 3 + (i % 2) * 4, 10, 2, '#E8F0FA', mountainG);
    });
  }
}

// Small pine tree on the mountain slopes — 6x10 pixel
function drawMountainTree(parent, x, baseY) {
  // Trunk
  rect(x + 2, baseY - 3, 2, 3, '#5A3A10', parent);
  // Leaves — layered triangles
  rect(x,     baseY - 6, 6, 2, '#2D5A27', parent);
  rect(x + 1, baseY - 8, 4, 2, '#3C6A33', parent);
  rect(x + 2, baseY - 10, 2, 2, '#4A8A3A', parent);
  // Highlight on top
  rect(x + 2, baseY - 10, 1, 1, '#6EA038', parent);
}

// Format a big number with comma separators
function fmtNum(n) {
  return String(n || 0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

function renderMountainBadge() {
  const el = document.getElementById('mountainBadge');
  if (!el) return;
  const total = fmtNum(globalMountainBlocks);
  const mine = myMountainContribution;
  const layers = computeMountainLayers(globalMountainBlocks);
  if (mine > 0) {
    el.innerHTML = `🏔️ <b>${total}</b> blocks · ${layers} layers · <span class="my-contrib">+${mine} from you</span>`;
  } else {
    el.innerHTML = `🏔️ <b>${total}</b> blocks · ${layers} layers · focus to contribute`;
  }
}

// ═══════════════════════════════════════════
// CONTRIBUTION BLOCK ANIMATION
// ─────────────────────────────────────────
// When a focus session completes (local OR broadcast from another
// user), a colored block flies from the contributor's character slot
// in a parabolic arc to the mountain peak, then lands with a small
// particle burst. Pure visual feedback — no state changes.
// ═══════════════════════════════════════════
function flyContributionBlock(session) {
  if (!contribFxG) return;

  // Decide origin point: if the session's nick matches one of our
  // visible remote users, start from that user's slot. Otherwise,
  // start from a generic off-screen point.
  let startX = MAIN_STEVE_X + 24;
  let startY = GROUND_Y - 40;
  if (session && session.nick) {
    const others = (liveUsers || []).filter(u => u.id !== myUserId);
    const idx = others.findIndex(u => u.nick === session.nick);
    if (idx >= 0 && idx < CHAR_SLOTS.length) {
      const slot = CHAR_SLOTS[idx];
      startX = slot.x;
      startY = slot.y - 20;
    }
  }

  // Mountain peak as the destination
  const layers = computeMountainLayers(globalMountainBlocks);
  const endX = MOUNTAIN_CENTER_X + (Math.random() - 0.5) * 20;
  const endY = MOUNTAIN_BASE_Y - layers * MOUNTAIN_LAYER_H + 10;

  // Pick a color based on the session's theme
  const themeKey = (session && session.theme) || 'tomato';
  const theme = THEMES[themeKey] || THEMES.tomato;
  const blockColor = theme.oreColor;

  // Create the flying block
  const block = el('g');
  rect(0, 0, 8, 8, blockColor, block);
  rect(0, 0, 8, 2, '#FFFFFF', block);  // top highlight
  rect(0, 6, 8, 2, '#000000', block);  // bottom shadow
  contribFxG.appendChild(block);

  // Parabolic arc via Web Animations API — 3 keyframes
  const midX = (startX + endX) / 2;
  const midY = Math.min(startY, endY) - 80 - Math.random() * 30;
  block.animate([
    { transform: `translate(${startX}px, ${startY}px) scale(1) rotate(0deg)`, opacity: 1 },
    { transform: `translate(${midX}px, ${midY}px) scale(1.3) rotate(180deg)`, opacity: 1 },
    { transform: `translate(${endX}px, ${endY}px) scale(0.8) rotate(360deg)`, opacity: 1 },
  ], { duration: 900, easing: 'ease-in', fill: 'forwards' });

  // After landing, sparkle + remove
  setTimeout(() => {
    // Spawn small particles at the landing point
    for (let i = 0; i < 6; i++) {
      const p = el('rect', {
        x: endX, y: endY, width: 3, height: 3, fill: blockColor,
      });
      const dx = (Math.random() - 0.5) * 40;
      const dy = -10 - Math.random() * 20;
      p.animate([
        { transform: 'translate(0,0)', opacity: 1 },
        { transform: `translate(${dx}px, ${dy}px)`, opacity: 0 },
      ], { duration: 500, fill: 'forwards' });
      contribFxG.appendChild(p);
      setTimeout(() => p.remove(), 550);
    }
    block.remove();
  }, 900);
}

// ═══════════════════════════════════════════
// SCENE MODE
// ═══════════════════════════════════════════
function updateSceneMode(mode) {
  sceneMode = mode;
  if (mode === 'break') {
    sunG.setAttribute('opacity', 0);
    moonG.setAttribute('opacity', 1);
    focusLayerG.setAttribute('opacity', 0);
    breakLayerG.setAttribute('opacity', 1);
    steveArmG.setAttribute('opacity', 0);
    steveX = 556;  // main plot, left of campfire at 590
    updateSteveSprite('sit');
    chickenX = -40; chickenVisible = false;
    wolfFrame = 0; fireflyList = [];
    startAnimLoop();
  } else {
    sunG.setAttribute('opacity', 1);
    moonG.setAttribute('opacity', 0);
    focusLayerG.setAttribute('opacity', 1);
    breakLayerG.setAttribute('opacity', 0);
    if (mode === 'focus') {
      // Digging mode
      steveX = STEVE_DIG_X;
      steveArmG.setAttribute('opacity', 1);
      oreBlockG.setAttribute('opacity', 0);
      crackOverlayG.innerHTML = '';
      resetHill();
      swingActive = true;
      sessionBlocksMined = 0;
      updateSteveSprite('stand');
    } else {
      steveX = STEVE_IDLE_X;
      steveArmG.setAttribute('opacity', 0);
      oreBlockG.setAttribute('opacity', 0);
      resetHill();
      swingActive = false;
      stopAnimLoop();
      updateSteveSprite('stand');
    }
  }
  positionSteve();
}

// ═══════════════════════════════════════════
// STEVE RENDERING
// ═══════════════════════════════════════════
let currentPose = 'stand';

function updateSteveSprite(pose) {
  currentPose = pose;
  steveBodyG.innerHTML = '';
  steveLegsG.innerHTML = '';
  const myMap = myCharMap || CHAR;
  if (pose === 'sit' || pose === 'stretch') {
    const body = pose === 'stretch' ? [
      '..hHHHh.', '.HHHHHHH', '.HSSSSsH', '..SESES.',
      '..SSSSS.', '..SSSSS.', // arms raised
      'S.TTTTT.S', '.STTTTS.',
      '..TTTT..', '..tTTt..',
    ] : STEVE_SIT_BODY;
    renderSprite(body, myMap, 0, 0, P, steveBodyG);
    renderSprite(STEVE_SIT_LEGS, myMap, 0, body.length*P, P, steveLegsG);
  } else if (pose === 'blink') {
    renderSprite(STEVE_BLINK_BODY, myMap, 0, 0, P, steveBodyG);
    renderSprite(LEG_STAND, myMap, 0, STEVE_BODY.length*P, P, steveLegsG);
  } else {
    renderSprite(STEVE_BODY, myMap, 0, 0, P, steveBodyG);
    const legData = pose==='walk1'?LEG_WALK1:pose==='walk2'?LEG_WALK2:LEG_STAND;
    renderSprite(legData, myMap, 0, STEVE_BODY.length*P, P, steveLegsG);
  }
}

function positionSteve() {
  const bodyH = (currentPose==='sit'||currentPose==='stretch') ? 13 : (STEVE_BODY.length+2);
  steveGroup.setAttribute('transform', `translate(${steveX},${GROUND_Y - bodyH*P - steveJumpY})`);
}

// ═══════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════
function startAnimLoop() { if (animRunning) return; animRunning = true; lastFrameTime = performance.now(); requestAnimationFrame(animTick); }
function stopAnimLoop() { animRunning = false; }

function animTick(now) {
  if (!animRunning) return;
  const dt = Math.min((now - lastFrameTime) / 1000, 0.1);
  lastFrameTime = now;

  if (sceneMode === 'focus') {
    updateDigging(dt);
    updateCreeper(dt);
    updateSteveJump(dt);
    updateSteveBlink(dt);
  } else if (sceneMode === 'break') {
    updateBreakScene(dt);
    updateRain(dt);
    updateSteveBlink(dt);
  }
  requestAnimationFrame(animTick);
}

// ═══════════════════════════════════════════
// STEVE: BLINK
// ═══════════════════════════════════════════
function updateSteveBlink(dt) {
  blinkTimer += dt;
  if (!isBlinking && blinkTimer > 3 + Math.random() * 4) {
    isBlinking = true;
    blinkTimer = 0;
    if (currentPose === 'stand' || currentPose === 'walk1' || currentPose === 'walk2') {
      updateSteveSprite('blink');
    }
  }
  if (isBlinking && blinkTimer > 0.15) {
    isBlinking = false;
    blinkTimer = 0;
    if (currentPose === 'blink') updateSteveSprite('stand');
  }
}

// ═══════════════════════════════════════════
// STEVE: JUMP (during mining)
// ═══════════════════════════════════════════
function triggerJump(force = 120) {
  if (isJumping) return;
  isJumping = true;
  jumpVelocity = force;
}

function updateSteveJump(dt) {
  jumpTimer += dt;

  // Randomly jump every ~7 seconds during mining
  if (!isJumping && swingActive && jumpTimer > 6 + Math.random() * 4) {
    triggerJump(100);
    jumpTimer = 0;
  }

  if (isJumping) {
    steveJumpY += jumpVelocity * dt;
    jumpVelocity -= 400 * dt; // gravity
    if (steveJumpY <= 0) {
      steveJumpY = 0;
      isJumping = false;
      jumpVelocity = 0;
      // Land particles
      spawnParticles(steveX + 28, GROUND_Y - 4, [C.grassTop, C.dirt, C.grassSide], 4);
    }
    positionSteve();
  }
}

// ═══════════════════════════════════════════
// STUDYING SYSTEM
// ═══════════════════════════════════════════
function updateDigging(dt) {
  if (!swingActive) return;
  if (celebrateTimer > 0) { celebrateTimer -= dt; return; }

  swingTime += dt;

  // Digging swing: arm goes from raised (-40°) to ground impact (+70°)
  const cycle = swingTime * swingSpeed;
  const sinVal = Math.sin(cycle * Math.PI * 2);
  const angle = 15 + sinVal * 55; // -40 (raised) to +70 (ground hit)

  const currentHalf = sinVal > 0 ? 1 : 0;
  if (currentHalf === 1 && prevSwingHalf === 0) onPickaxeHit();
  prevSwingHalf = currentHalf;

  // Arm pivot at shoulder
  const pivotX = 6*P, pivotY = 7*P;
  steveArmG.setAttribute('transform', `translate(${pivotX},${pivotY}) rotate(${angle})`);

  // Body lean forward on downswing (max ~8° tilt)
  const lean = Math.max(0, sinVal) * 8;
  const bounce = Math.abs(sinVal) * 4;
  if (!isJumping) {
    steveJumpY = bounce;
    // Apply lean rotation from feet (bottom-center pivot)
    const bodyH = (STEVE_BODY.length + 2) * P;
    steveGroup.setAttribute('transform',
      `translate(${steveX},${GROUND_Y - bodyH - steveJumpY}) rotate(${lean},${4*P},${bodyH})`);
  }

  // Leg animation
  walkTime += dt;
  const newPhase = Math.floor(walkTime * 3) % 2;
  if (newPhase !== walkPhase && !isBlinking) {
    walkPhase = newPhase;
    steveLegsG.innerHTML = '';
    renderSprite(walkPhase===0 ? LEG_WALK1 : LEG_WALK2, CHAR, 0, STEVE_BODY.length*P, P, steveLegsG);
  }
}

// ═══════════════════════════════════════════
// RAIN EFFECT (break mode)
// ═══════════════════════════════════════════
function updateRain(dt) {
  if (Math.random() < dt * 25) {
    const x = Math.random() * SVG_W;
    const drop = el('rect', {x, y: -8, width: 2, height: 8, fill: C.rain, rx: 1});
    svg.insertBefore(drop, particleLayer);
    drop.animate([
      {transform: 'translateY(0)'},
      {transform: `translateY(${GROUND_Y + 20}px)`}
    ], {duration: 500 + Math.random() * 300, fill: 'forwards'});
    setTimeout(() => drop.remove(), 900);
  }
}

// ═══════════════════════════════════════════
// MINING SYSTEM (legacy)
// ═══════════════════════════════════════════
function updateMining(dt) {
  if (!swingActive) return;

  // Celebration pause after block break
  if (celebrateTimer > 0) {
    celebrateTimer -= dt;
    if (celebrateTimer <= 0) {
      celebrateTimer = -1;
      blockHP = HITS_TO_BREAK;
      oreBlockG.setAttribute('opacity', 1);
      updateCrack();
    }
    return;
  }

  swingTime += dt;
  const cycle = swingTime * swingSpeed;
  const sinVal = Math.sin(cycle * Math.PI * 2);
  const angle = -27.5 + sinVal * 42.5;
  const currentHalf = sinVal > 0 ? 1 : 0;

  if (currentHalf === 1 && prevSwingHalf === 0) onPickaxeHit();
  prevSwingHalf = currentHalf;

  // Arm rotation
  const pivotX = 6*P, pivotY = 7*P;
  steveArmG.setAttribute('transform', `translate(${pivotX},${pivotY}) rotate(${angle})`);

  // Body bounce
  const bounce = Math.abs(sinVal) * 3;
  if (!isJumping) {
    steveJumpY = bounce;
    positionSteve();
  }

  // Leg animation
  walkTime += dt;
  const newPhase = Math.floor(walkTime * 3) % 2;
  if (newPhase !== walkPhase && !isBlinking) {
    walkPhase = newPhase;
    steveLegsG.innerHTML = '';
    renderSprite(walkPhase===0 ? LEG_WALK1 : LEG_WALK2, CHAR, 0, STEVE_BODY.length*P, P, steveLegsG);
  }
}

function onPickaxeHit() {
  // Per-theme particles every swing (visual feedback)
  spawnParticles(steveX+4*P, GROUND_Y-P, THEMES[currentThemeId].digParticles, 4);

  // Accumulate time — add hill block every DIG_BLOCK_INTERVAL seconds
  digBlockAccumulator += 1.0 / swingSpeed;
  if (digBlockAccumulator >= DIG_BLOCK_INTERVAL) {
    digBlockAccumulator -= DIG_BLOCK_INTERVAL;
    addHillBlock();

    // Increment counters on block placement
    blocksMined++;
    sessionBlocksMined++;
    if (sessionBlocksMined % 10 === 0) recordBlocks(10);
  }
}

function onBlockBreak() {
  // Big explosion
  spawnParticles(ORE_X+32, ORE_Y+32, THEMES[currentThemeId].particleColors, 20);
  dropItem(ORE_X+24, ORE_Y);

  oreBlockG.setAttribute('opacity', 0);
  crackOverlayG.innerHTML = '';

  blocksMined++;
  sessionBlocksMined++;

  // Update daily record every 10 blocks
  if (sessionBlocksMined % 10 === 0) recordBlocks(10);

  // Celebration: Steve jumps!
  triggerJump(150);
  // Star sparkles around Steve
  spawnStars(steveX + 30, GROUND_Y - 80, 6);

  celebrateTimer = 1.2;
}

function updateCrack() {
  crackOverlayG.innerHTML = '';
  const stage = HITS_TO_BREAK - blockHP;
  if (stage > 0 && stage <= CRACK_STAGES.length)
    renderSprite(CRACK_STAGES[stage-1], CRACK_COLORS, ORE_X, ORE_Y, P, crackOverlayG);
}

// ═══════════════════════════════════════════
// PARTICLES & ITEMS
// ═══════════════════════════════════════════
function spawnParticles(cx, cy, colors, count) {
  for (let i = 0; i < count; i++) {
    const p = el('rect', { x:cx, y:cy, width:5, height:5, fill:colors[i%colors.length] });
    const dx = (Math.random()-.5) * 80, dy = -Math.random()*50 - 10;
    p.animate([
      {transform:'translate(0,0)',opacity:1},
      {transform:`translate(${dx}px,${dy}px)`,opacity:0}
    ], {duration:600+Math.random()*300, fill:'forwards'});
    particleLayer.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

function spawnStars(cx, cy, count) {
  for (let i = 0; i < count; i++) {
    const s = el('text', {
      x: cx + (Math.random()-.5)*50, y: cy + (Math.random()-.5)*40,
      fill: C.star, 'font-size': 8 + Math.random()*6, 'font-family':'Press Start 2P'
    });
    s.textContent = '✦';
    const dx = (Math.random()-.5)*30, dy = -20 - Math.random()*30;
    s.animate([
      {transform:'translate(0,0) scale(1)',opacity:1},
      {transform:`translate(${dx}px,${dy}px) scale(0.3)`,opacity:0}
    ], {duration:800+Math.random()*400, fill:'forwards'});
    particleLayer.appendChild(s);
    setTimeout(() => s.remove(), 1300);
  }
}

function dropItem(x, y) {
  const item = el('g');
  const theme = THEMES[currentThemeId];
  renderSprite(theme.dropSprite, theme.dropColors, 0, 0, 5, item);
  itemLayer.appendChild(item);
  const endY = GROUND_Y - 20;
  let t = 0;
  const anim = () => {
    t += 0.03;
    if (t > 3) { item.animate([{opacity:1},{opacity:0}],{duration:300,fill:'forwards'}); setTimeout(()=>item.remove(),400); return; }
    if (t > 1.5) {
      item.setAttribute('transform',`translate(${x},${endY+Math.sin(t*4)*5-5})`);
    } else {
      const p = Math.min(t,1);
      const by = y + (endY-y)*p - Math.abs(Math.sin(p*Math.PI*2))*30*(1-p);
      item.setAttribute('transform',`translate(${x},${by})`);
    }
    requestAnimationFrame(anim);
  };
  anim();
}

// ═══════════════════════════════════════════
// CREEPER
// ═══════════════════════════════════════════
function updateCreeper(dt) {
  creeperPeekTime += dt;
  if (!creeperVisible && creeperPeekTime > 10 + Math.random()*15) {
    creeperVisible = true; creeperPeekTime = 0;
    creeperG.setAttribute('opacity', 1);
    creeperG.animate([{transform:'translateX(20px)'},{transform:'translateX(0)'}], {duration:500});
  }
  if (creeperVisible && creeperPeekTime > 2 + Math.random()*2) {
    creeperVisible = false; creeperPeekTime = 0;
    creeperG.animate([{transform:'translateX(0)',opacity:1},{transform:'translateX(20px)',opacity:0}], {duration:400,fill:'forwards'});
    setTimeout(() => creeperG.setAttribute('opacity',0), 500);
  }
}

// ═══════════════════════════════════════════
// BREAK MODE ANIMATIONS
// ═══════════════════════════════════════════
function updateBreakScene(dt) {
  updateCampfireEffects(dt);
  updateZzz(dt);
  updateChicken(dt);
  updateWolf(dt);
  updateFireflies(dt);
  updateStretch(dt);
}

function updateCampfireEffects(dt) {
  if (Math.random() < dt*8) {
    const flame = rect(590+Math.random()*4*P, GROUND_Y-4*P, P, P,
      [C.fire1,C.fire2,C.fire3][Math.floor(Math.random()*3)], breakLayerG);
    flame.animate([
      {transform:'translateY(0)',opacity:1},
      {transform:`translateY(-${20+Math.random()*20}px)`,opacity:0}
    ],{duration:400+Math.random()*400,fill:'forwards'});
    setTimeout(()=>flame.remove(),900);
  }
  if (Math.random() < dt*2) {
    const ember = rect(592+Math.random()*3*P, GROUND_Y-5*P, 3, 3,
      Math.random()>.5?C.fire3:C.fire2, breakLayerG);
    ember.animate([
      {transform:'translate(0,0)',opacity:.8},
      {transform:`translate(${(Math.random()-.5)*30}px,-60px)`,opacity:0}
    ],{duration:1500,fill:'forwards'});
    setTimeout(()=>ember.remove(),1600);
  }
}

function updateZzz(dt) {
  zzzTime += dt;
  if (zzzTime > 2.5) {
    zzzTime = 0;
    const t = el('text', {
      x:steveX+8*P, y:GROUND_Y-14*P, fill:'#AAF',
      'font-size':'12', 'font-family':'Press Start 2P', opacity:.8
    });
    t.textContent = 'z';
    svg.appendChild(t);
    t.animate([
      {transform:'translate(0,0) scale(1)',opacity:.8},
      {transform:`translate(${10+Math.random()*15}px,-40px) scale(1.5)`,opacity:0}
    ],{duration:2000,fill:'forwards'});
    setTimeout(()=>t.remove(),2100);
  }
}

function updateChicken(dt) {
  if (!chickenVisible) {
    if (Math.random() < dt*.12) {
      chickenVisible = true;
      chickenDir = Math.random()>.5 ? 1 : -1;
      chickenX = chickenDir>0 ? -30 : SVG_W+30;
      chickenG.setAttribute('opacity',1);
    }
    return;
  }
  chickenX += chickenDir * 35 * dt;
  const bob = Math.sin(chickenX*.3) * 3;
  chickenG.setAttribute('transform',`translate(${chickenX},${GROUND_Y-5*P+bob}) scale(${chickenDir>0?1:-1},1)`);
  if ((chickenDir>0 && chickenX>SVG_W+40) || (chickenDir<0 && chickenX<-40)) {
    chickenVisible = false; chickenG.setAttribute('opacity',0);
  }
}

function updateWolf(dt) {
  wolfTimer += dt;
  if (wolfTimer > 0.8) {
    wolfTimer = 0;
    wolfFrame = 1 - wolfFrame;
    wolfG.innerHTML = '';
    renderSprite(wolfFrame===0 ? WOLF1 : WOLF2, WOLF_COLORS, 0, 0, 6, wolfG);
    wolfG.setAttribute('transform', `translate(650,${GROUND_Y-7*P})`);
  }
}

function updateFireflies(dt) {
  // Spawn fireflies
  if (fireflyList.length < 5 && Math.random() < dt * 0.5) {
    const ff = {
      x: 460 + Math.random() * 300,  // fireflies hover around main plot
      y: 40 + Math.random() * 100,
      vx: (Math.random()-.5) * 20,
      vy: (Math.random()-.5) * 15,
      life: 3 + Math.random() * 4,
      el: null,
    };
    ff.el = rect(ff.x, ff.y, 4, 4, C.firefly, svg);
    ff.el.style.opacity = 0.7;
    fireflyList.push(ff);
  }
  // Update
  for (let i = fireflyList.length-1; i >= 0; i--) {
    const ff = fireflyList[i];
    ff.life -= dt;
    ff.vx += (Math.random()-.5) * 40 * dt;
    ff.vy += (Math.random()-.5) * 30 * dt;
    ff.x += ff.vx * dt;
    ff.y += ff.vy * dt;
    // Flicker
    ff.el.style.opacity = 0.3 + Math.sin(ff.life * 8) * 0.4;
    ff.el.setAttribute('x', ff.x);
    ff.el.setAttribute('y', ff.y);
    if (ff.life <= 0 || ff.x < 0 || ff.x > SVG_W || ff.y < 0 || ff.y > GROUND_Y) {
      ff.el.remove();
      fireflyList.splice(i, 1);
    }
  }
}

function updateStretch(dt) {
  stretchTimer += dt;
  if (!isStretching && stretchTimer > 8 + Math.random()*6) {
    isStretching = true;
    stretchTimer = 0;
    // Steve stretches: briefly change body
    steveBodyG.innerHTML = '';
    steveLegsG.innerHTML = '';
    const stretchBody = [
      '..hHHHh.', '.HHHHHHH', '.HSSSSsH', '..SESES.',
      '..SSSSS.', 'S.SSS..S', 'S.TTTTT.S', '.STTTTS.',
      '..TTTT..', '..tTTt..',
    ];
    renderSprite(stretchBody, {...CHAR}, 0, 0, P, steveBodyG);
    renderSprite(STEVE_SIT_LEGS, CHAR, 0, stretchBody.length*P, P, steveLegsG);
  }
  if (isStretching && stretchTimer > 1.5) {
    isStretching = false;
    stretchTimer = 0;
    updateSteveSprite('sit');
  }
}

// STARS (background)
// ═══════════════════════════════════════════
function createStars() {
  const c = document.getElementById('stars');
  for (let i=0;i<60;i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*60+'%';
    s.style.animationDelay = Math.random()*2+'s';
    s.style.width = s.style.height = (Math.random()>.7?6:4)+'px';
    c.appendChild(s);
  }
}

// ═══════════════════════════════════════════
// UI: PROGRESS, HOTBAR
// ═══════════════════════════════════════════
const PROGRESS_BLOCKS = 20;
const progressBar = document.getElementById('progressBar');
function buildProgressBar() {
  progressBar.innerHTML = '';
  for (let i=0;i<PROGRESS_BLOCKS;i++) { const b=document.createElement('div'); b.className='progress-block'; progressBar.appendChild(b); }
}
function updateProgress(fraction) {
  [...progressBar.children].forEach((b,i) => {
    const filled = Math.floor(fraction*PROGRESS_BLOCKS);
    b.classList.toggle('filled', i<filled);
    b.classList.toggle('active', i===filled && fraction<1);
  });
}

const hotbar = document.getElementById('hotbar');
function buildHotbar() {
  hotbar.innerHTML = '';
  for (let i=0;i<TOTAL_SESSIONS;i++) {
    const slot = document.createElement('div');
    slot.className = 'hotbar-slot'+(i<completedSessions?' active':'');
    if (i<completedSessions)
      slot.innerHTML = THEMES[currentThemeId].hotbarSVG;
    hotbar.appendChild(slot);
  }
}

function buildThemePicker() {
  const picker = document.getElementById('themePicker');
  if (!picker) return;
  picker.innerHTML = '';
  THEME_ORDER.forEach(id => {
    const t = THEMES[id];
    const btn = document.createElement('button');
    btn.className = 'mc-theme-btn' + (id === currentThemeId ? ' on' : '');
    btn.id = 'themeBtn_' + id;
    btn.innerHTML = `<span class="swatch" style="background:${t.oreColor}"></span>${t.label}`;
    btn.addEventListener('click', () => applyTheme(id));
    picker.appendChild(btn);
  });
}

// ═══════════════════════════════════════════
// SHARE — viral loop entry point
// ─────────────────────────────────────────
// Builds a sharable brag message from today's stats and opens either the
// native share sheet (mobile) or a Twitter intent URL (desktop fallback).
// ═══════════════════════════════════════════
function buildShareText() {
  const d = loadDaily();
  const emoji = (THEMES[currentThemeId] && THEMES[currentThemeId].harvestEmoji) || '🍅';
  if (d.sessions === 0) {
    return `Starting my focus session with Pomodoro Craft ${emoji}\nA cute Minecraft-themed pomodoro timer.`;
  }
  const icons = emoji.repeat(Math.min(d.sessions, 5));
  return `${icons} Just harvested ${d.sessions} ${emoji} today with Pomodoro Craft!\n⏱ ${d.focusMin} minutes of focus.\n\nA cozy Minecraft pomodoro timer — try it:`;
}

// ═══════════════════════════════════════════
// MULTIPLAYER API CLIENT
// ─────────────────────────────────────────
// Talks to the Cloudflare Worker at API_BASE_URL for:
//   - Real global "focusing now" count (WebSocket presence)
//   - Global today's harvest counter
//   - Live feed of recent session completions
//
// If API_BASE_URL is not set (or the worker is unreachable), we fall
// back to a time-of-day estimate so the UI still feels alive for solo
// use — but the app will prefer real data whenever it's available.
//
// The API URL can be set three ways (priority high → low):
//   1. ?api=https://... URL param (for testing)
//   2. window.POMODOCRAFT_API global (can be injected in index.html)
//   3. Hardcoded DEFAULT_API below (edit this after wrangler deploy)
// ═══════════════════════════════════════════
const DEFAULT_API = '';  // ← paste wrangler deploy URL here after deployment
const API_BASE_URL = (urlParam('api') || window.POMODOCRAFT_API || DEFAULT_API || '').replace(/\/$/, '');
const HAS_BACKEND = API_BASE_URL.length > 0;

// ── Global live state (populated from server when HAS_BACKEND) ──
let liveOnlineCount = null;     // number | null
let liveTodayHarvest = 0;
let liveFeed = [];              // [{ minutes, theme, nick, at }, ...]
let liveUsers = [];             // [{ id, nick, theme, timerMode, remainingSec, totalSec, country }]
let myUserId = null;            // our own id, so we filter ourselves from the list
let presenceSocket = null;
let stateBroadcastTimer = null; // setInterval handle for periodic state updates

// ── Collective Mountain — global shared counter ──
// When HAS_BACKEND, this comes from the Worker's mountain_stats table.
// Offline/solo fallback: seeded with a welcoming starter value so the
// mountain never looks empty on first visit. Each local focus session
// bumps this too, even without backend, so the "contribution" feels
// real immediately.
let globalMountainBlocks = 180;
let myMountainContribution = 0;  // blocks I've added this session (local)
