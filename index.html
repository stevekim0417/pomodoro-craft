<style>
:root {
  --sky-top: #7EC8E3; --sky-bottom: #B8E4F0;
  --accent: #5B8731; --accent-light: #8DB360;
  --ui-bg: #C6C6C6; --ui-inner: #8B8B8B;
  --ui-light: #FEFEFE; --ui-dark: #373737;
  --text: #3F3F3F; --transition-speed: 1.2s;
}
[data-mode="break"] {
  --sky-top: #0B1026; --sky-bottom: #1B2838;
  --accent: #2C5AA0; --accent-light: #4488CC;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh; display: flex; justify-content: center; align-items: center;
  background: linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
  transition: background var(--transition-speed);
  font-family: 'Press Start 2P', monospace; image-rendering: pixelated; overflow-x: hidden;
}
.stars { position: fixed; inset: 0; pointer-events: none; opacity: 0; transition: opacity var(--transition-speed); z-index: 0; }
[data-mode="break"] .stars { opacity: 1; }
.star { position: absolute; width: 4px; height: 4px; background: #FFF; animation: twinkle 2s infinite alternate; }
@keyframes twinkle { 0%{opacity:.3} 100%{opacity:1} }
@keyframes flicker1 { 0%{opacity:1} 100%{opacity:.4} }
@keyframes flicker2 { 0%{opacity:.4} 100%{opacity:1} }

.app { position: relative; z-index: 1; width: 520px; max-width: 95vw; }
.title { text-align: center; margin-bottom: 20px; color: #FFF; }
.title h1 { font-size: 28px; letter-spacing: 4px; margin-bottom: 10px; text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 0 0 12px rgba(255,215,0,0.3); }
.title .subtitle { font-size: 13px; color: #FFD700; transition: color var(--transition-speed); letter-spacing: 3px; text-shadow: 2px 2px 0 #000, 0 0 8px rgba(255,215,0,0.4); }
[data-mode="break"] .title .subtitle { color: #88BBFF; text-shadow: 2px 2px 0 #000, 0 0 8px rgba(100,160,255,0.4); }
.container { background: var(--ui-bg); border: 4px solid; border-color: var(--ui-light) var(--ui-dark) var(--ui-dark) var(--ui-light); padding: 8px; }
.inner { background: var(--ui-inner); border: 3px solid; border-color: #555 #AAA #AAA #555; padding: 12px; }
.scene-wrap {
  position: relative; width: 100%; aspect-ratio: 2/1; margin-bottom: 12px; overflow: hidden;
  border: 3px solid; border-color: #555 #AAA #AAA #555;
  background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 68%, #5B8731 68.1%, #5B8731 71%, #866043 71.1%, #866043 100%);
  transition: background var(--transition-speed);
}
.scene-wrap svg { width: 100%; height: 100%; display: block; }
.timer-section { text-align: center; padding: 8px 0; }
.mode-label { font-size: 10px; color: var(--accent-light); margin-bottom: 8px; letter-spacing: 2px; transition: color var(--transition-speed); }
.timer-display { font-size: 48px; color: #FFF; text-shadow: 4px 4px 0 #000; letter-spacing: 4px; margin: 4px 0; font-variant-numeric: tabular-nums; }
.progress-bar { display: flex; gap: 3px; margin: 12px 0; justify-content: center; }
.progress-block { width: 20px; height: 20px; border: 2px solid; border-color: #AAA #555 #555 #AAA; background: #6B6B6B; transition: background .3s, border-color .3s; }
.progress-block.filled { background: var(--accent); border-color: var(--accent-light) #3A5A1A #3A5A1A var(--accent-light); }
.progress-block.active { animation: blockPulse .6s infinite alternate; }
@keyframes blockPulse { 0%{background:var(--accent)} 100%{background:var(--accent-light)} }
/* Task Input */
.task-input-wrap { display: flex; justify-content: center; margin: 6px 0 8px; }
.task-input {
  font-family: 'Press Start 2P', monospace; font-size: 8px;
  padding: 7px 12px; background: #555; color: #FFF;
  border: 2px solid; border-color: #2A2A2A #7A7A7A #7A7A7A #2A2A2A;
  width: 85%; outline: none; text-align: center;
  text-shadow: 1px 1px 0 #000;
}
.task-input::placeholder { color: #999; }
.task-input:focus { border-color: #4488CC #2A5A8A #2A5A8A #4488CC; background: #4A4A4A; }

/* Session Log */
.session-log {
  margin-top: 6px; max-height: 0; overflow: hidden;
  transition: max-height .35s ease;
}
.session-log.open { max-height: 300px; }
.session-log-inner {
  max-height: 140px; overflow-y: auto; padding: 4px;
  scrollbar-width: thin; scrollbar-color: #666 #444;
}
.session-log-inner::-webkit-scrollbar { width: 6px; }
.session-log-inner::-webkit-scrollbar-track { background: #444; }
.session-log-inner::-webkit-scrollbar-thumb { background: #888; }
.log-entry {
  display: flex; gap: 8px; padding: 3px 6px; font-size: 6px;
  color: #CCC; text-shadow: 1px 1px 0 #000; align-items: center;
}
.log-entry:nth-child(even) { background: rgba(0,0,0,0.15); }
.log-time { color: #999; min-width: 40px; }
.log-type { min-width: 45px; font-weight: bold; }
.log-type.focus { color: #8DB360; }
.log-type.break { color: #4488CC; }
.log-type.longbreak { color: #CC88FF; }
.log-task { color: #FFF; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.log-dur { color: #AAA; min-width: 30px; text-align: right; }
.log-toggle {
  text-align: center; padding: 4px; margin-top: 4px;
  font-family: 'Press Start 2P', monospace; font-size: 6px;
  color: #999; cursor: pointer; text-shadow: 1px 1px 0 #000;
}
.log-toggle:hover { color: #FFF; }
.log-empty { text-align: center; padding: 8px; font-size: 6px; color: #888; }

.controls { display: flex; gap: 8px; justify-content: center; margin: 12px 0; }
.mc-btn {
  font-family: 'Press Start 2P', monospace; font-size: 11px; padding: 10px 20px;
  background: #8B8B8B; border: 3px solid; border-color: #C6C6C6 #555 #555 #C6C6C6;
  color: var(--text); cursor: pointer; text-shadow: 1px 1px 0 #C6C6C6;
  letter-spacing: 1px; transition: filter .1s; white-space: nowrap;
}
.mc-btn:hover { filter: brightness(1.15); }
.mc-btn:active { border-color: #555 #C6C6C6 #C6C6C6 #555; padding: 11px 19px 9px 21px; }
.mc-btn.primary { background: #5A8B3A; border-color: #8DB360 #2D5A1A #2D5A1A #8DB360; color: #FFF; text-shadow: 1px 1px 0 #2D5A1A; }
.mc-btn.primary:active { border-color: #2D5A1A #8DB360 #8DB360 #2D5A1A; }
.mc-btn.danger { background: #8B3A3A; border-color: #B36060 #5A1A1A #5A1A1A #B36060; color: #FFF; text-shadow: 1px 1px 0 #5A1A1A; }
.settings { display: flex; justify-content: center; gap: 20px; margin: 12px 0; flex-wrap: wrap; }
.setting { flex-direction: column; align-items: center; gap: 4px; }
.setting-label { font-size: 8px; color: #DDD; text-shadow: 1px 1px 0 #000; letter-spacing: 1px; }
.setting-controls { display: flex; align-items: center; gap: 4px; }
.session-indicator { font-size: 9px; color: #FFD700; letter-spacing: 1px; text-shadow: 1px 1px 0 #000; margin-bottom: 4px; }
[data-mode="break"] .session-indicator { color: #88BBFF; }
.setting { display: flex; align-items: center; gap: 6px; }
.setting label { font-size: 8px; color: #DDD; text-shadow: 1px 1px 0 #000; }
.setting .value { font-size: 14px; color: #FFF; text-shadow: 2px 2px 0 #000; min-width: 36px; text-align: center; }
.mc-btn-sm {
  font-family: 'Press Start 2P', monospace; font-size: 10px; width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  background: #8B8B8B; border: 2px solid; border-color: #C6C6C6 #555 #555 #C6C6C6;
  color: var(--text); cursor: pointer; padding: 0;
}
.mc-btn-sm:active { border-color: #555 #C6C6C6 #C6C6C6 #555; }
.hotbar { display: flex; justify-content: center; gap: 4px; margin-top: 12px; }
.hotbar-slot {
  width: 36px; height: 36px; background: #555; border: 2px solid;
  border-color: #2A2A2A #7A7A7A #7A7A7A #2A2A2A;
  display: flex; align-items: center; justify-content: center;
}
.hotbar-slot.active { border-color: #FFF #AAA #AAA #FFF; background: #666; }
.hotbar-slot svg { width: 24px; height: 24px; }

/* Daily Stats */
.daily-stats {
  margin-top: 10px; padding: 8px 12px;
  background: #555; border: 2px solid; border-color: #2A2A2A #7A7A7A #7A7A7A #2A2A2A;
  display: flex; flex-wrap: wrap; gap: 6px 16px; justify-content: center; align-items: center;
}
.daily-stats .stat-date { font-size: 7px; color: #AAA; text-shadow: 1px 1px 0 #000; width: 100%; text-align: center; margin-bottom: 2px; }
.daily-stats .stat { font-size: 7px; color: #DDD; text-shadow: 1px 1px 0 #000; white-space: nowrap; }
.daily-stats .stat b { color: #FFF; }
.daily-stats .harvest-row {
  width: 100%; margin-top: 6px; padding-top: 6px;
  border-top: 1px dashed #777;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-size: 7px; color: #DDD; text-shadow: 1px 1px 0 #000;
  letter-spacing: 1px;
}
.daily-stats .harvest-icons {
  font-size: 14px; letter-spacing: 2px;
  filter: drop-shadow(1px 1px 0 #000);
}
.daily-stats .harvest-empty { font-size: 6px; color: #888; letter-spacing: 1px; }

/* Share button — kicks off the viral loop */
.share-wrap { display: flex; justify-content: center; margin: 8px 0 4px; }
.share-btn {
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  padding: 7px 14px; background: #3A6B8B;
  border: 2px solid; border-color: #6090B0 #1A3A5A #1A3A5A #6090B0;
  color: #FFF; cursor: pointer; letter-spacing: 1px;
  text-shadow: 1px 1px 0 #000; transition: filter .1s;
}
.share-btn:hover { filter: brightness(1.15); }
.share-btn:active { border-color: #1A3A5A #6090B0 #6090B0 #1A3A5A; }
.share-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Social proof — "X focusing now" line below the progress bar */
.social-proof {
  text-align: center;
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  color: #8DB360; text-shadow: 1px 1px 0 #000;
  letter-spacing: 1px; margin: 2px 0 6px;
  transition: color .3s;
}
[data-mode="break"] .social-proof { color: #88BBFF; }

/* Sound Settings */
.sound-settings {
  display: flex; justify-content: center; gap: 6px; margin: 10px 0 4px;
  flex-wrap: wrap; align-items: center;
}
.mc-toggle {
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  padding: 5px 10px; background: #6B3A3A;
  border: 2px solid; border-color: #996060 #4A1A1A #4A1A1A #996060;
  color: #CCC; cursor: pointer; white-space: nowrap;
  text-shadow: 1px 1px 0 #000; transition: filter .1s;
}
.mc-toggle.on {
  background: #3A6B3A; border-color: #60996D #1A4A1A #1A4A1A #60996D; color: #FFF;
}
.mc-toggle:hover { filter: brightness(1.15); }
.mc-toggle:active { border-color: #555 #AAA #AAA #555; }
.lofi-url-wrap {
  display: none; justify-content: center; gap: 4px; margin: 4px 0;
}
.lofi-url-wrap.show { display: flex; }
.lofi-url-input {
  font-family: 'Press Start 2P', monospace; font-size: 6px;
  padding: 4px 6px; background: #444; color: #DDD;
  border: 2px solid; border-color: #2A2A2A #7A7A7A #7A7A7A #2A2A2A;
  width: 200px; outline: none;
}
.lofi-url-input::placeholder { color: #888; }

/* Lofi Player */
.lofi-player { display: none; margin: 8px 0; }
.lofi-player.active { display: block; }
.lofi-player iframe {
  width: 100%; height: 80px;
  border: 2px solid; border-color: #555 #AAA #AAA #555;
}
.lofi-link {
  display: block; text-align: center; margin-top: 4px;
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  color: var(--accent-light); text-decoration: none;
  text-shadow: 1px 1px 0 #000;
}
.lofi-link:hover { color: #FFF; }

/* Footer Links */
.footer-links {
  display: flex; justify-content: center; align-items: center;
  gap: 8px; margin-top: 12px; flex-wrap: wrap;
}
.footer-links a {
  font-family: 'Press Start 2P', monospace; font-size: 8px;
  color: #FFF; text-decoration: none; letter-spacing: 1px;
  text-shadow: 1px 1px 0 #000;
  opacity: 0.85; transition: opacity .3s;
}
.footer-links a:hover { opacity: 1; }
.footer-dot { color: #FFF; opacity: 0.4; text-shadow: 1px 1px 0 #000; }

/* Settings Drawer */
.settings-drawer-tab {
  text-align: center; padding: 6px; margin-top: 8px;
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  color: #BBB; cursor: pointer; letter-spacing: 1px;
  text-shadow: 1px 1px 0 #000;
  transition: color .2s;
}
.settings-drawer-tab:hover { color: #FFF; }
.settings-drawer-tab .arrow {
  display: inline-block; transition: transform .3s;
  font-size: 6px; margin-left: 4px;
}
.settings-drawer-tab.open .arrow { transform: rotate(180deg); }
.settings-drawer {
  max-height: 0; overflow: hidden;
  transition: max-height .35s ease, padding .35s ease;
  padding: 0 8px;
}
.settings-drawer.open {
  max-height: 320px;
  padding: 8px;
}
.drawer-toggles {
  display: flex; justify-content: center; gap: 6px;
  flex-wrap: wrap;
}
.drawer-section-label {
  text-align: center; margin: 12px 0 6px;
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  color: #AAA; letter-spacing: 2px; text-shadow: 1px 1px 0 #000;
}
.drawer-theme-picker {
  display: flex; justify-content: center; gap: 5px; flex-wrap: wrap;
}
.mc-theme-btn {
  font-family: 'Press Start 2P', monospace; font-size: 7px;
  padding: 5px 8px; background: #6B3A3A;
  border: 2px solid; border-color: #996060 #4A1A1A #4A1A1A #996060;
  color: #CCC; cursor: pointer; white-space: nowrap;
  text-shadow: 1px 1px 0 #000; transition: filter .1s;
  display: inline-flex; align-items: center; gap: 5px;
}
.mc-theme-btn.on {
  background: #3A6B3A; border-color: #60996D #1A4A1A #1A4A1A #60996D; color: #FFF;
}
.mc-theme-btn:hover { filter: brightness(1.15); }
.mc-theme-btn:active { border-color: #555 #AAA #AAA #555; }
.mc-theme-btn .swatch {
  width: 10px; height: 10px; display: inline-block;
  border: 1px solid #000;
}

/* ══════════════════════════════════════════════
   Focus Companion Mode — stream/overlay layout.
   Activated by ?mode=companion URL param.
   Hides controls/settings/stats, keeps only the
   scene + a subtle timer overlay. Perfect as an
   OBS browser source or a YouTube live background.
   ══════════════════════════════════════════════ */
body[data-layout="companion"] { background: transparent; }
body[data-layout="companion"] .title,
body[data-layout="companion"] .task-input-wrap,
body[data-layout="companion"] .controls,
body[data-layout="companion"] .settings,
body[data-layout="companion"] .hotbar,
body[data-layout="companion"] .daily-stats,
body[data-layout="companion"] .log-toggle,
body[data-layout="companion"] .session-log,
body[data-layout="companion"] .settings-drawer-tab,
body[data-layout="companion"] .settings-drawer,
body[data-layout="companion"] .footer-links,
body[data-layout="companion"] .progress-bar,
body[data-layout="companion"] .share-wrap,
body[data-layout="companion"] .social-proof { display: none !important; }
body[data-layout="companion"] .app { width: 100vw; max-width: 100vw; padding: 0; }
body[data-layout="companion"] .container { border: 0; padding: 0; background: transparent; }
body[data-layout="companion"] .inner { border: 0; padding: 0; background: transparent; }
body[data-layout="companion"] .scene-wrap {
  border: 0;
  height: 100vh; aspect-ratio: auto;
}
body[data-layout="companion"] .timer-section {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.4);
  padding: 12px 24px;
  border: 3px solid #FFF;
  z-index: 10;
}
body[data-layout="companion"] .timer-display { font-size: 36px; }
body[data-layout="companion"] .mode-label,
body[data-layout="companion"] .session-indicator { font-size: 9px; }

@media (max-width: 540px) {
  .timer-display { font-size: 36px; }
  .title h1 { font-size: 20px; }
  .title .subtitle { font-size: 11px; }
  .settings { gap: 12px; }
  .mc-btn { font-size: 9px; padding: 8px 14px; }
  .daily-stats { gap: 4px 10px; }
  .lofi-url-input { width: 150px; }
}
</style>

<body data-mode="focus">
<div class="stars" id="stars"></div>
<div class="app">
  <div class="title">
    <h1>POMODORO CRAFT</h1>
    <div class="subtitle" id="subtitleText">FOCUS TIME</div>
  </div>
  <div class="container">
    <div class="inner">
      <div class="scene-wrap">
        <svg id="scene" viewBox="0 0 480 240" preserveAspectRatio="xMidYMid slice"></svg>
      </div>
      <div class="timer-section">
        <div class="mode-label" id="modeLabel">FOCUS</div>
        <div class="session-indicator" id="sessionIndicator"></div>
        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="social-proof" id="socialProof">🌱 ··· focusing now</div>
      <div class="task-input-wrap">
        <input class="task-input" id="taskInput" placeholder="What are you working on?" maxlength="50">
      </div>
      <div class="controls">
        <button class="mc-btn primary" id="startBtn">START</button>
        <button class="mc-btn" id="skipBtn">SKIP</button>
        <button class="mc-btn danger" id="resetBtn">RESET</button>
      </div>
      <div class="settings">
        <div class="setting">
          <div class="setting-label">FOCUS</div>
          <div class="setting-controls">
            <button class="mc-btn-sm" onclick="adjustTime('focus',-5)">-</button>
            <span class="value" id="focusValue">25</span>
            <button class="mc-btn-sm" onclick="adjustTime('focus',5)">+</button>
          </div>
        </div>
        <div class="setting">
          <div class="setting-label">BREAK</div>
          <div class="setting-controls">
            <button class="mc-btn-sm" onclick="adjustTime('break',-1)">-</button>
            <span class="value" id="breakValue">5</span>
            <button class="mc-btn-sm" onclick="adjustTime('break',1)">+</button>
          </div>
        </div>
        <div class="setting">
          <div class="setting-label">LONG</div>
          <div class="setting-controls">
            <button class="mc-btn-sm" onclick="adjustTime('long',-5)">-</button>
            <span class="value" id="longBreakValue">15</span>
            <button class="mc-btn-sm" onclick="adjustTime('long',5)">+</button>
          </div>
        </div>

//   ?mode=companion                           — stream/overlay layout
//   ?focus=25 &break=5 &long=15               — timer preset in minutes
//   ?autostart=1                              — start the focus timer on load
// These let creators embed links with presets in videos/descriptions.
// ═══════════════════════════════════════════
const urlParams = new URLSearchParams(window.location.search);
const urlParam = (k) => urlParams.get(k);
const urlInt = (k, min, max) => {
  const n = parseInt(urlParam(k), 10);
  return (Number.isFinite(n) && n >= min && n <= max) ? n : null;
};

// ═══════════════════════════════════════════

// ═══════════════════════════════════════════

let breakMin = urlInt('break', 1, 60) || saved.breakMin || 5;
let longBreakMin = urlInt('long', 1, 120) || saved.longBreakMin || 15;
let completedSessions = saved.sessions || 0;
let blocksMined = 0;
let alarmEnabled = saved.alarmEnabled !== false;
let lofiEnabled = saved.lofiEnabled !== false;
const lofiUrl = 'https://youtu.be/BrG_9l_fD-I';
let autoBreak = saved.autoBreak !== false;
let autoFocus = saved.autoFocus !== false;
// Theme always resets to tomato on page load — tomato is the app's identity.
// Mid-session switches still work, but a fresh load always starts fresh.
// URL ?theme=X overrides for creator-embedded links.
const urlTheme = urlParam('theme');
let currentThemeId = (urlTheme && ['tomato','diamond','emerald','gold','ruby'].includes(urlTheme))
  ? urlTheme : 'tomato';
const isCompanionMode = urlParam('mode') === 'companion';

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function loadDaily() {
  const d = JSON.parse(localStorage.getItem('pomodocraft_daily') || '{}');
  if (d.date !== todayKey()) return { date: todayKey(), sessions: 0, focusMin: 0, breakMin: 0, blocks: 0, log: [] };
  if (!d.log) d.log = [];
  return d;
}
function saveDaily(data) {
  data.date = todayKey();
  localStorage.setItem('pomodocraft_daily', JSON.stringify(data));
}
let daily = loadDaily();

function recordSession(type, minutes) {
  daily = loadDaily();
  if (type === 'focus') { daily.sessions++; daily.focusMin += minutes; }
  else { daily.breakMin += minutes; }
  // Add to session log
  const now = new Date();
  const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const task = document.getElementById('taskInput').value.trim();
  daily.log.push({ time: timeStr, type, duration: minutes, task: task || '' });
  saveDaily(daily);
  renderDailyStats();
  renderSessionLog();
}
function recordBlocks(count) {
  daily = loadDaily();
  daily.blocks += count;
  saveDaily(daily);
  renderDailyStats();
}

function renderDailyStats() {
  const el = document.getElementById('dailyStats');
  const d = loadDaily();
  const dateStr = d.date.replace(/-/g, '.');
  const emoji = (THEMES[currentThemeId] && THEMES[currentThemeId].harvestEmoji) || '🍅';
  // Render up to 10 harvest icons inline, then "× N" if more.
  const iconsToShow = Math.min(d.sessions, 10);
  const harvestIcons = iconsToShow > 0
    ? emoji.repeat(iconsToShow) + (d.sessions > 10 ? ` ×${d.sessions}` : '')
    : '<span class="harvest-empty">— no harvest yet —</span>';
  el.innerHTML = `
    <div class="stat-date">TODAY ${dateStr}</div>
    <div class="stat">SESSIONS <b>${d.sessions}</b></div>
    <div class="stat">FOCUS <b>${d.focusMin}</b>M</div>
    <div class="stat">BREAK <b>${d.breakMin}</b>M</div>
    <div class="stat">BLOCKS <b>${d.blocks}</b></div>
    <div class="harvest-row">HARVEST <span class="harvest-icons">${harvestIcons}</span></div>
  `;
}

function saveState() {
  localStorage.setItem('pomodocraft', JSON.stringify({
    focusMin, breakMin, longBreakMin, sessions: completedSessions,
    alarmEnabled, lofiEnabled,
    autoBreak, autoFocus,

}

const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs={}) { const e = document.createElementNS(NS, tag); for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v); return e; }
function rect(x,y,w,h,fill,parent) { const r = el('rect',{x,y,width:w,height:h,fill}); if(parent) parent.appendChild(r); return r; }
function renderSprite(data, colorMap, ox, oy, scale, parent) {
  const g = el('g', { transform:`translate(${ox},${oy})` });
  data.forEach((row,ry) => [...row].forEach((ch,rx) => {
    if (ch==='.' || !colorMap[ch]) return;
    rect(rx*scale, ry*scale, scale, scale, colorMap[ch], g);
  }));
  if (parent) parent.appendChild(g);
  return g;
}

// ═══════════════════════════════════════════
// PROCEDURAL HILL GROWTH SYSTEM
// ═══════════════════════════════════════════
const HILL_SLOPE = 0.55;      // pyramid angle (lower = wider)
const HILL_MAX_HEIGHT = 25;
const DIG_BLOCK_INTERVAL = 2.0; // seconds between hill block additions
let digBlockAccumulator = 0;

const hillGrid = {};
let hillCurrentLayer = 0;
let hillLayerQueue = [];

function hillKey(c,r) { return `${c},${r}`; }
function hillHas(c,r) { return hillGrid[hillKey(c,r)] === true; }
function hillSupport(c,r) { return r === 0 || hillHas(c, r-1); }

function hillMaxWidthAt(row, baseHW) {
  return Math.max(1, Math.floor(baseHW - row * HILL_SLOPE));
}

function hillTargetBaseHW() {
  return Math.floor(2 + hillCurrentLayer / HILL_SLOPE);
}

function hillGenPositions() {
  const hw = hillTargetBaseHW();
  const pos = [];
  for (let row = 0; row <= hillCurrentLayer; row++) {
    const maxW = hillMaxWidthAt(row, hw);
    for (let dist = 0; dist <= maxW; dist++) {
      const cols = dist === 0 ? [0] : [-dist, dist];
      for (const col of cols) {
        const px = HILL_BASE_X + col * P;
        if (px >= 0 && px < SVG_W && !hillHas(col, row) && hillSupport(col, row)) {
          pos.push([col, row]);
        }
      }
    }
  }
  return pos;
}

// Delegate to the active theme so each biome paints its hill differently.
function hillBlockColor(col, row) {
  return THEMES[currentThemeId].hillBlockColor(col, row, hillCurrentLayer);
}

function addHillBlock() {
  if (hillLayerQueue.length === 0) {
    hillLayerQueue = hillGenPositions();
    if (hillLayerQueue.length === 0) {
      hillCurrentLayer = Math.min(hillCurrentLayer + 1, HILL_MAX_HEIGHT);
      hillLayerQueue = hillGenPositions();
    }
  }
  if (hillLayerQueue.length === 0) return;

  const [col, row] = hillLayerQueue.shift();
  const bx = HILL_BASE_X + col * P;
  const by = HILL_BASE_Y - (row + 1) * P;

  // Fling dirt from Steve to hill target
  flingDirt(steveX + 5*P, GROUND_Y - 6*P, bx, by, col, row);
}

function flingDirt(sx, sy, ex, ey, col, row) {
  const theme = THEMES[currentThemeId];
  const [mainColor, topColor] = theme.chunkColors;
  const chunk = el('g');
  // Small themed chunk (e.g. dirt, tomato-leaf, cave rock, sand, etc.)
  rect(0, 0, P, P, Math.random() > .5 ? mainColor : topColor, chunk);
  rect(0, 0, P, 2, topColor, chunk);
  svg.appendChild(chunk);

  // Parabolic arc: midpoint high above
  const mx = (sx + ex) / 2;
  const my = Math.min(sy, ey) - 40 - Math.random() * 30;
  const dur = 500 + Math.random() * 200;

  chunk.animate([
    { transform: `translate(${sx}px,${sy}px) scale(0.8)`, opacity: 1 },
    { transform: `translate(${mx}px,${my}px) scale(1.1) rotate(180deg)`, opacity: 1 },
    { transform: `translate(${ex}px,${ey}px) scale(1) rotate(360deg)`, opacity: 1 },
  ], { duration: dur, easing: 'ease-in', fill: 'forwards' });

  // Place actual hill block when dirt lands
  setTimeout(() => {
    chunk.remove();
    hillGrid[hillKey(col, row)] = true;
    hillBlockCount++;
    rect(ex, ey, P, P, hillBlockColor(col, row), hillG);
    if (!hillHas(col, row + 1)) {
      rect(ex, ey, P, 2, topColor, hillG);
    }
    // Landing particles (themed)
    spawnParticles(ex + P/2, ey + P/2, theme.landParticles, 3);
  }, dur);
}

function resetHill() {
  for (const k in hillGrid) delete hillGrid[k];
  hillBlockCount = 0;
  hillCurrentLayer = 0;
  hillLayerQueue = [];
  digBlockAccumulator = 0;

}

      + `<polygon points="8,1 11,6 8,10 5,6" fill="${C.emeraldLight}" opacity="0.5"/>`
      + `</svg>`,
  },
  gold: {
    label: 'GOLD',
    harvestEmoji: '🟡',
    oreColor: C.goldOre,
    particleColors: [C.stone, C.stoneDark, C.goldOre, C.goldLight, '#FFF'],
    dropSprite: GOLD_ITEM,
    dropColors: GOLD_COLORS,
    // Desert sand hill with gold nuggets — a gold rush dune
    digParticles: [C.sand, C.sandLight, C.goldOre, C.goldLight],
    chunkColors: [C.sand, C.goldOre],
    landParticles: [C.sand, C.sandDark],
    hillBlockColor: (col, row, layer) => {
      if (row >= layer) return Math.random() < 0.5 ? C.sandLight : C.sand;
      if (row >= layer - 1) return C.sand;
      return Math.random() < 0.15 ? C.goldOre : (Math.random() < 0.4 ? C.sandDark : C.sand);
    },
    hotbarSVG:
      `<svg viewBox="0 0 16 16">`
      + `<ellipse cx="8" cy="9" rx="6" ry="5" fill="${C.goldOre}" stroke="${C.goldDark}" stroke-width="1"/>`
      + `<ellipse cx="6" cy="7" rx="2.5" ry="1.5" fill="${C.goldLight}" opacity="0.8"/>`
      + `<circle cx="10" cy="11" r="0.8" fill="${C.goldDark}" opacity="0.5"/>`
      + `</svg>`,
  },
  ruby: {
    label: 'RUBY',
    harvestEmoji: '❤️',
    oreColor: C.rubyOre,
    particleColors: [C.stone, C.stoneDark, C.rubyOre, C.rubyLight, '#FFF'],
    dropSprite: RUBY_ITEM,
    dropColors: RUBY_COLORS,
    // Dark volcanic cave pile with ruby veins — feels like netherrack
    digParticles: [C.cave, C.caveLight, C.rubyOre, C.rubyLight],
    chunkColors: [C.cave, C.rubyOre],
    landParticles: [C.cave, C.caveDark],
    hillBlockColor: (col, row, layer) => {
      if (row >= layer) return Math.random() < 0.5 ? C.caveLight : C.cave;
      if (row >= layer - 1) return C.caveDark;
      return Math.random() < 0.15 ? C.rubyOre : (Math.random() < 0.4 ? C.cave : C.caveDark);
    },
    hotbarSVG:
      `<svg viewBox="0 0 16 16">`
      + `<polygon points="8,1 15,6 8,15 1,6" fill="${C.rubyOre}" stroke="${C.rubyDark}" stroke-width="1"/>`
      + `<polygon points="8,1 11,6 8,10 5,6" fill="${C.rubyLight}" opacity="0.6"/>`
      + `</svg>`,
  },
};
const THEME_ORDER = ['tomato', 'diamond', 'emerald', 'gold', 'ruby'];

const CREEPER = ['GGGGGG','GGGGGG','GEEGEG','GGGGGG','GGMEGG','GGMMGG','GGGGGG','.GGGG.'];
const CREEPER_COLORS = { G:C.creeperG, E:'#000', M:'#000' };

const CHICKEN_R = ['..WW..', '.WRWW.', '.WWWW.', '..WW..', '..YY..', '.Y..Y.'];
const CHICKEN_COLORS = { W:C.chickenW, R:C.chickenR, Y:C.chickenY };

const WOLF1 = ['.WW.WW','WWWWWW','WEWWEW','.WWWW.','.GWWG.','.WWWW.','.WW.WW'];
const WOLF2 = ['.WW.WW','WWWWWW','WEWWEW','.WWWW.','.GWWG.','WWWWW.','.WW.WW'];  // tail wag
const WOLF_COLORS = { W:C.wolfW, G:C.wolfG, E:C.wolfE };

// ═══════════════════════════════════════════
// SCENE STATE
// ═══════════════════════════════════════════
const svg = document.getElementById('scene');
let sceneMode = 'idle';

// Element refs
let steveGroup, steveBodyG, steveLegsG, steveArmG;
let oreBlockG, crackOverlayG, blockShakeG;
let hillG;
let sunG, moonG, focusLayerG, breakLayerG;
let campfireG, wolfG, chickenG, creeperG;
let particleLayer, itemLayer;

// Animation state
let animRunning = false, lastFrameTime = 0;
let swingTime = 0, swingActive = false, swingSpeed = 3.5;
let blockHP = HITS_TO_BREAK, prevSwingHalf = 0;
let walkPhase = 0, walkTime = 0;
let steveX = 200, steveJumpY = 0;
let blinkTimer = 0, isBlinking = false;
let jumpTimer = 0, isJumping = false, jumpVelocity = 0;
let celebrateTimer = -1;

const STEVE_MINE_X = 220, STEVE_IDLE_X = 200, ORE_X = 296, ORE_Y = GROUND_Y - 8*P;
const STEVE_DIG_X = 170, HILL_BASE_X = 300, HILL_BASE_Y = GROUND_Y;

// Break state
let chickenX = -40, chickenDir = 1, chickenVisible = false;
let creeperPeekTime = 0, creeperVisible = false;
let zzzTime = 0, wolfFrame = 0, wolfTimer = 0;
let fireflyList = [];
let stretchTimer = 0, isStretching = false;
let sessionBlocksMined = 0;  // blocks mined in current focus session

// ═══════════════════════════════════════════
// BUILD SCENE
// ═══════════════════════════════════════════
function buildScene() {
  svg.innerHTML = '';
  const bgLayer = el('g');
  svg.appendChild(bgLayer);

  // Ground
  for (let x = 0; x < SVG_W; x += P) {
    rect(x, GROUND_Y, P, P, (x/P)%7===0 ? C.grassSide : C.grassTop, bgLayer);
    for (let row = 1; row < 12; row++)
      rect(x, GROUND_Y+row*P, P, P, (x+row*3)%5===0 ? C.dirtDark : C.dirt, bgLayer);
  }

  // Clouds
  buildCloud(bgLayer, 60, 25, 50);
  buildCloud(bgLayer, 280, 18, 70);

  // Sun — round 8x8 sprite centered at (400, 40)
  sunG = el('g');
  const sunPx = [
    '..YYYY..',
    '.YYYYYY.',
    'YYYYYYYY',
    'YYYYYYYY',
    'YYYYYYYY',
    'YYYYYYYY',
    '.YYYYYY.',
    '..YYYY..',
  ];
  renderSprite(sunPx, {Y:'#FFD700'}, 380, 20, 5, sunG);
  // Eight radiating rays (E, W, N, S + four diagonals)
  [
    [424, 37, 10, 4],  // east
    [366, 37, 10, 4],  // west
    [398,  6,  4, 10], // north
    [398, 64,  4, 10], // south
    [422, 13,  5, 5],  // northeast
    [373, 13,  5, 5],  // northwest
    [422, 62,  5, 5],  // southeast
    [373, 62,  5, 5],  // southwest
  ].forEach(([rx,ry,rw,rh]) => rect(rx,ry,rw,rh,'#FFD700',sunG));
  svg.appendChild(sunG);

  // Moon
  moonG = el('g', {opacity:0});
  renderSprite(['..MM..','.MMMM.','MMMMMM','MMmmMM','.MmMM.','..MM..'], {M:C.moon,m:C.moonDark}, 100, 25, 7, moonG);
  svg.appendChild(moonG);

  // Trees
  buildTree(bgLayer, 30);
  buildTree(bgLayer, 410);

  // Focus layer
  focusLayerG = el('g');
  svg.appendChild(focusLayerG);
  blockShakeG = el('g');
  oreBlockG = renderSprite(ORE_BLOCK, ORE_COLORS, ORE_X, ORE_Y, P, blockShakeG);
  crackOverlayG = el('g');
  blockShakeG.appendChild(crackOverlayG);
  focusLayerG.appendChild(blockShakeG);

  // Hill (grows as Steve digs)
  hillG = el('g');
  focusLayerG.appendChild(hillG);

  // Creeper
  creeperG = el('g', {opacity:0});
  renderSprite(CREEPER, CREEPER_COLORS, 428, GROUND_Y-8*P, 5, creeperG);
  focusLayerG.appendChild(creeperG);

  // Break layer
  breakLayerG = el('g', {opacity:0});
  svg.appendChild(breakLayerG);
  campfireG = el('g');
  buildCampfire(campfireG, 290, GROUND_Y-4*P);
  breakLayerG.appendChild(campfireG);

  // Wolf
  wolfG = el('g');
  renderSprite(WOLF1, WOLF_COLORS, 0, 0, 6, wolfG);
  wolfG.setAttribute('transform', `translate(350,${GROUND_Y-7*P})`);
  breakLayerG.appendChild(wolfG);

  // Chicken
  chickenG = el('g', {opacity:0});
  renderSprite(CHICKEN_R, CHICKEN_COLORS, 0, 0, 5, chickenG);
  breakLayerG.appendChild(chickenG);

  // Steve (composite)
  steveGroup = el('g');
  svg.appendChild(steveGroup);
  steveBodyG = el('g');
  renderSprite(STEVE_BODY, CHAR, 0, 0, P, steveBodyG);
  steveGroup.appendChild(steveBodyG);
  steveLegsG = el('g');
  renderSprite(LEG_STAND, CHAR, 0, STEVE_BODY.length*P, P, steveLegsG);
  steveGroup.appendChild(steveLegsG);
  steveArmG = el('g', {opacity:0});
  renderSprite(PICK_HANDLE, PICK_COLORS, 0, 0, P, steveArmG);
  steveGroup.appendChild(steveArmG);

  positionSteve();

  // Effect layers
  itemLayer = el('g'); svg.appendChild(itemLayer);
  particleLayer = el('g'); svg.appendChild(particleLayer);

  updateSceneMode(sceneMode);
}

function buildCloud(parent, x, y, w) {
  const g = el('g', {opacity:'0.85'});
  [[Math.floor(w*.2),w*.6],[0,w],[Math.floor(w*.1),w*.8]].forEach(([ox,rw],i) =>
    rect(x+ox, y+i*6, rw, 6, '#FFF', g));
  g.appendChild(el('animateTransform', {
    attributeName:'transform', type:'translate', from:'0,0', to:'-480,0',
    dur:`${80+x*.2}s`, repeatCount:'indefinite'
  }));
  parent.appendChild(g);
}

function buildTree(parent, x) {
  const g = el('g');
  // Taller trunk (5 blocks)
  for (let i=0;i<5;i++) rect(x+P, GROUND_Y-(i+1)*P, P, P, i%2===0?C.wood:C.woodLight, g);
  // Fuller, rounder canopy
  const leafRows = [[1,3],[0,5],[0,5],[-1,6],[0,5],[0,5],[1,3]];
  leafRows.forEach(([s,cnt],row) => {
    for (let i=0;i<cnt;i++) {
      const lx = x + (s+i-1)*P;
      const ly = GROUND_Y - (12-row)*P;
      const bright = (row+i)%4===0 || (row===0&&i>0&&i<cnt-1);
      rect(lx, ly, P, P, bright?C.leavesBright:C.leaves, g);
    }
  });
  parent.appendChild(g);
}

function buildCampfire(parent, x, y) {
  [[0,0,C.wood],[1,0,C.woodLight],[2,0,C.wood],[3,0,C.woodDark],
   [0,1,C.woodLight],[1,1,C.wood],[2,1,C.woodDark],[3,1,C.wood]].forEach(([bx,by,c]) =>
    rect(x+bx*P, y+by*P, P, P, c, parent));
  // Base flames
  [[0.5,-1,C.fire1],[1.5,-1,C.fire3],[2.5,-1,C.fire1],
   [1,-2,C.fire2],[2,-2,C.fire2],[1.5,-3,C.fire3]].forEach(([fx,fy,fc]) => {
    const f = rect(x+fx*P, y+fy*P, P, P, fc, parent);
    f.style.animation = `${Math.random()>.5?'flicker1':'flicker2'} ${.3+Math.random()*.3}s infinite alternate`;
  });
}

// ═══════════════════════════════════════════
// SCENE MODE
// ═══════════════════════════════════════════
function updateSceneMode(mode) {
  sceneMode = mode;
  if (mode === 'break') {
    sunG.setAttribute('opacity', 0);
    moonG.setAttribute('opacity', 1);
    focusLayerG.setAttribute('opacity', 0);
    breakLayerG.setAttribute('opacity', 1);
    steveArmG.setAttribute('opacity', 0);
    steveX = 180;
    updateSteveSprite('sit');
    chickenX = -40; chickenVisible = false;
    wolfFrame = 0; fireflyList = [];
    startAnimLoop();
  } else {
    sunG.setAttribute('opacity', 1);
    moonG.setAttribute('opacity', 0);
    focusLayerG.setAttribute('opacity', 1);
    breakLayerG.setAttribute('opacity', 0);
    if (mode === 'focus') {
      // Digging mode
      steveX = STEVE_DIG_X;
      steveArmG.setAttribute('opacity', 1);
      oreBlockG.setAttribute('opacity', 0);
      crackOverlayG.innerHTML = '';
      resetHill();
      swingActive = true;
      sessionBlocksMined = 0;
      updateSteveSprite('stand');
    } else {
      steveX = STEVE_IDLE_X;
      steveArmG.setAttribute('opacity', 0);
      oreBlockG.setAttribute('opacity', 0);
      resetHill();
      swingActive = false;
      stopAnimLoop();
      updateSteveSprite('stand');
    }
  }
  positionSteve();
}

// ═══════════════════════════════════════════
// STEVE RENDERING
// ═══════════════════════════════════════════
let currentPose = 'stand';

function updateSteveSprite(pose) {
  currentPose = pose;
  steveBodyG.innerHTML = '';
  steveLegsG.innerHTML = '';
  if (pose === 'sit' || pose === 'stretch') {
    const body = pose === 'stretch' ? [
      '..hHHHh.', '.HHHHHHH', '.HSSSSsH', '..SESES.',
      '..SSSSS.', '..SSSSS.', // arms raised
      'S.TTTTT.S', '.STTTTS.',
      '..TTTT..', '..tTTt..',
    ] : STEVE_SIT_BODY;
    renderSprite(body, CHAR, 0, 0, P, steveBodyG);
    renderSprite(STEVE_SIT_LEGS, CHAR, 0, body.length*P, P, steveLegsG);
  } else if (pose === 'blink') {
    renderSprite(STEVE_BLINK_BODY, CHAR, 0, 0, P, steveBodyG);
    renderSprite(LEG_STAND, CHAR, 0, STEVE_BODY.length*P, P, steveLegsG);
  } else {
    renderSprite(STEVE_BODY, CHAR, 0, 0, P, steveBodyG);
    const legData = pose==='walk1'?LEG_WALK1:pose==='walk2'?LEG_WALK2:LEG_STAND;
    renderSprite(legData, CHAR, 0, STEVE_BODY.length*P, P, steveLegsG);
  }
}

function positionSteve() {
  const bodyH = (currentPose==='sit'||currentPose==='stretch') ? 13 : (STEVE_BODY.length+2);
  steveGroup.setAttribute('transform', `translate(${steveX},${GROUND_Y - bodyH*P - steveJumpY})`);
}

// ═══════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════
function startAnimLoop() { if (animRunning) return; animRunning = true; lastFrameTime = performance.now(); requestAnimationFrame(animTick); }
function stopAnimLoop() { animRunning = false; }

function animTick(now) {
  if (!animRunning) return;
  const dt = Math.min((now - lastFrameTime) / 1000, 0.1);
  lastFrameTime = now;

  if (sceneMode === 'focus') {
    updateDigging(dt);
    updateCreeper(dt);
    updateSteveJump(dt);
    updateSteveBlink(dt);
  } else if (sceneMode === 'break') {
    updateBreakScene(dt);
    updateRain(dt);
    updateSteveBlink(dt);
  }
  requestAnimationFrame(animTick);
}

// ═══════════════════════════════════════════
// STEVE: BLINK
// ═══════════════════════════════════════════
function updateSteveBlink(dt) {
  blinkTimer += dt;
  if (!isBlinking && blinkTimer > 3 + Math.random() * 4) {
    isBlinking = true;
    blinkTimer = 0;
    if (currentPose === 'stand' || currentPose === 'walk1' || currentPose === 'walk2') {
      updateSteveSprite('blink');
    }
  }
  if (isBlinking && blinkTimer > 0.15) {
    isBlinking = false;
    blinkTimer = 0;
    if (currentPose === 'blink') updateSteveSprite('stand');
  }
}

// ═══════════════════════════════════════════
// STEVE: JUMP (during mining)
// ═══════════════════════════════════════════
function triggerJump(force = 120) {
  if (isJumping) return;
  isJumping = true;
  jumpVelocity = force;
}

function updateSteveJump(dt) {
  jumpTimer += dt;

  // Randomly jump every ~7 seconds during mining
  if (!isJumping && swingActive && jumpTimer > 6 + Math.random() * 4) {
    triggerJump(100);
    jumpTimer = 0;
  }

  if (isJumping) {
    steveJumpY += jumpVelocity * dt;
    jumpVelocity -= 400 * dt; // gravity
    if (steveJumpY <= 0) {
      steveJumpY = 0;
      isJumping = false;
      jumpVelocity = 0;
      // Land particles
      spawnParticles(steveX + 28, GROUND_Y - 4, [C.grassTop, C.dirt, C.grassSide], 4);
    }
    positionSteve();
  }
}

// ═══════════════════════════════════════════
// STUDYING SYSTEM
// ═══════════════════════════════════════════
function updateDigging(dt) {
  if (!swingActive) return;
  if (celebrateTimer > 0) { celebrateTimer -= dt; return; }

  swingTime += dt;

  // Digging swing: arm goes from raised (-40°) to ground impact (+70°)
  const cycle = swingTime * swingSpeed;
  const sinVal = Math.sin(cycle * Math.PI * 2);
  const angle = 15 + sinVal * 55; // -40 (raised) to +70 (ground hit)

  const currentHalf = sinVal > 0 ? 1 : 0;
  if (currentHalf === 1 && prevSwingHalf === 0) onPickaxeHit();
  prevSwingHalf = currentHalf;

  // Arm pivot at shoulder
  const pivotX = 6*P, pivotY = 7*P;
  steveArmG.setAttribute('transform', `translate(${pivotX},${pivotY}) rotate(${angle})`);

  // Body lean forward on downswing (max ~8° tilt)
  const lean = Math.max(0, sinVal) * 8;
  const bounce = Math.abs(sinVal) * 4;
  if (!isJumping) {
    steveJumpY = bounce;
    // Apply lean rotation from feet (bottom-center pivot)
    const bodyH = (STEVE_BODY.length + 2) * P;
    steveGroup.setAttribute('transform',
      `translate(${steveX},${GROUND_Y - bodyH - steveJumpY}) rotate(${lean},${4*P},${bodyH})`);
  }

  // Leg animation
  walkTime += dt;
  const newPhase = Math.floor(walkTime * 3) % 2;
  if (newPhase !== walkPhase && !isBlinking) {
    walkPhase = newPhase;
    steveLegsG.innerHTML = '';
    renderSprite(walkPhase===0 ? LEG_WALK1 : LEG_WALK2, CHAR, 0, STEVE_BODY.length*P, P, steveLegsG);
  }
}

// ═══════════════════════════════════════════
// RAIN EFFECT (break mode)
// ═══════════════════════════════════════════
function updateRain(dt) {
  if (Math.random() < dt * 25) {
    const x = Math.random() * SVG_W;
    const drop = el('rect', {x, y: -8, width: 2, height: 8, fill: C.rain, rx: 1});
    svg.insertBefore(drop, particleLayer);
    drop.animate([
      {transform: 'translateY(0)'},
      {transform: `translateY(${GROUND_Y + 20}px)`}
    ], {duration: 500 + Math.random() * 300, fill: 'forwards'});
    setTimeout(() => drop.remove(), 900);
  }
}

// ═══════════════════════════════════════════
// MINING SYSTEM (legacy)
// ═══════════════════════════════════════════
function updateMining(dt) {
  if (!swingActive) return;

  // Celebration pause after block break
  if (celebrateTimer > 0) {
    celebrateTimer -= dt;
    if (celebrateTimer <= 0) {
      celebrateTimer = -1;
      blockHP = HITS_TO_BREAK;
      oreBlockG.setAttribute('opacity', 1);
      updateCrack();
    }
    return;
  }

  swingTime += dt;
  const cycle = swingTime * swingSpeed;
  const sinVal = Math.sin(cycle * Math.PI * 2);
  const angle = -27.5 + sinVal * 42.5;
  const currentHalf = sinVal > 0 ? 1 : 0;

  if (currentHalf === 1 && prevSwingHalf === 0) onPickaxeHit();
  prevSwingHalf = currentHalf;

  // Arm rotation
  const pivotX = 6*P, pivotY = 7*P;
  steveArmG.setAttribute('transform', `translate(${pivotX},${pivotY}) rotate(${angle})`);

  // Body bounce
  const bounce = Math.abs(sinVal) * 3;
  if (!isJumping) {
    steveJumpY = bounce;
    positionSteve();
  }

  // Leg animation
  walkTime += dt;
  const newPhase = Math.floor(walkTime * 3) % 2;
  if (newPhase !== walkPhase && !isBlinking) {
    walkPhase = newPhase;
    steveLegsG.innerHTML = '';
    renderSprite(walkPhase===0 ? LEG_WALK1 : LEG_WALK2, CHAR, 0, STEVE_BODY.length*P, P, steveLegsG);
  }
}

function onPickaxeHit() {
  // Per-theme particles every swing (visual feedback)
  spawnParticles(steveX+4*P, GROUND_Y-P, THEMES[currentThemeId].digParticles, 4);

  // Accumulate time — add hill block every DIG_BLOCK_INTERVAL seconds
  digBlockAccumulator += 1.0 / swingSpeed;
  if (digBlockAccumulator >= DIG_BLOCK_INTERVAL) {
    digBlockAccumulator -= DIG_BLOCK_INTERVAL;
    addHillBlock();

    // Increment counters on block placement
    blocksMined++;
    sessionBlocksMined++;
    if (sessionBlocksMined % 10 === 0) recordBlocks(10);
  }
}

function onBlockBreak() {
  // Big explosion
  spawnParticles(ORE_X+32, ORE_Y+32, THEMES[currentThemeId].particleColors, 20);
  dropItem(ORE_X+24, ORE_Y);

  oreBlockG.setAttribute('opacity', 0);
  crackOverlayG.innerHTML = '';

  blocksMined++;
  sessionBlocksMined++;

  // Update daily record every 10 blocks
  if (sessionBlocksMined % 10 === 0) recordBlocks(10);

  // Celebration: Steve jumps!
  triggerJump(150);
  // Star sparkles around Steve
  spawnStars(steveX + 30, GROUND_Y - 80, 6);

  celebrateTimer = 1.2;
}

function updateCrack() {
  crackOverlayG.innerHTML = '';
  const stage = HITS_TO_BREAK - blockHP;
  if (stage > 0 && stage <= CRACK_STAGES.length)
    renderSprite(CRACK_STAGES[stage-1], CRACK_COLORS, ORE_X, ORE_Y, P, crackOverlayG);
}

// ═══════════════════════════════════════════
// PARTICLES & ITEMS
// ═══════════════════════════════════════════
function spawnParticles(cx, cy, colors, count) {
  for (let i = 0; i < count; i++) {
    const p = el('rect', { x:cx, y:cy, width:5, height:5, fill:colors[i%colors.length] });
    const dx = (Math.random()-.5) * 80, dy = -Math.random()*50 - 10;
    p.animate([
      {transform:'translate(0,0)',opacity:1},
      {transform:`translate(${dx}px,${dy}px)`,opacity:0}
    ], {duration:600+Math.random()*300, fill:'forwards'});
    particleLayer.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

function spawnStars(cx, cy, count) {
  for (let i = 0; i < count; i++) {
    const s = el('text', {
      x: cx + (Math.random()-.5)*50, y: cy + (Math.random()-.5)*40,
      fill: C.star, 'font-size': 8 + Math.random()*6, 'font-family':'Press Start 2P'
    });
    s.textContent = '✦';
    const dx = (Math.random()-.5)*30, dy = -20 - Math.random()*30;
    s.animate([
      {transform:'translate(0,0) scale(1)',opacity:1},
      {transform:`translate(${dx}px,${dy}px) scale(0.3)`,opacity:0}
    ], {duration:800+Math.random()*400, fill:'forwards'});
    particleLayer.appendChild(s);
    setTimeout(() => s.remove(), 1300);
  }
}

function dropItem(x, y) {
  const item = el('g');
  const theme = THEMES[currentThemeId];
  renderSprite(theme.dropSprite, theme.dropColors, 0, 0, 5, item);
  itemLayer.appendChild(item);
  const endY = GROUND_Y - 20;
  let t = 0;
  const anim = () => {
    t += 0.03;
    if (t > 3) { item.animate([{opacity:1},{opacity:0}],{duration:300,fill:'forwards'}); setTimeout(()=>item.remove(),400); return; }
    if (t > 1.5) {
      item.setAttribute('transform',`translate(${x},${endY+Math.sin(t*4)*5-5})`);
    } else {
      const p = Math.min(t,1);
      const by = y + (endY-y)*p - Math.abs(Math.sin(p*Math.PI*2))*30*(1-p);
      item.setAttribute('transform',`translate(${x},${by})`);
    }
    requestAnimationFrame(anim);
  };
  anim();
}

function updateBreakScene(dt) {

function updateCampfireEffects(dt) {

    ],{duration:400+Math.random()*400,fill:'forwards'});

  }
  if (Math.random() < dt*2) {

      Math.random()>.5?C.fire3:C.fire2, breakLayerG);
    ember.animate([
      {transform:'translate(0,0)',opacity:.8},

function updateZzz(dt) {
  zzzTime += dt;
  if (zzzTime > 2.5) {
    zzzTime = 0;
    const t = el('text', {
      x:steveX+8*P, y:GROUND_Y-14*P, fill:'#AAF',
      'font-size':'12', 'font-family':'Press Start 2P', opacity:.8
    });
    t.textContent = 'z';
    svg.appendChild(t);
    t.animate([
      {transform:'translate(0,0) scale(1)',opacity:.8},
      {transform:`translate(${10+Math.random()*15}px,-40px) scale(1.5)`,opacity:0}
    ],{duration:2000,fill:'forwards'});
    setTimeout(()=>t.remove(),2100);

}

function updateChicken(dt) {
  if (!chickenVisible) {
    if (Math.random() < dt*.12) {
      chickenVisible = true;
      chickenDir = Math.random()>.5 ? 1 : -1;
      chickenX = chickenDir>0 ? -30 : SVG_W+30;
      chickenG.setAttribute('opacity',1);
    }
    return;
  }
  chickenX += chickenDir * 35 * dt;
  const bob = Math.sin(chickenX*.3) * 3;
  chickenG.setAttribute('transform',`translate(${chickenX},${GROUND_Y-5*P+bob}) scale(${chickenDir>0?1:-1},1)`);
  if ((chickenDir>0 && chickenX>SVG_W+40) || (chickenDir<0 && chickenX<-40)) {
    chickenVisible = false; chickenG.setAttribute('opacity',0);
  }
}

function updateWolf(dt) {
  wolfTimer += dt;
  if (wolfTimer > 0.8) {
    wolfTimer = 0;
    wolfFrame = 1 - wolfFrame;
    wolfG.innerHTML = '';
    renderSprite(wolfFrame===0 ? WOLF1 : WOLF2, WOLF_COLORS, 0, 0, 6, wolfG);
    wolfG.setAttribute('transform', `translate(350,${GROUND_Y-7*P})`);
  }
}

function updateFireflies(dt) {
  // Spawn fireflies
  if (fireflyList.length < 5 && Math.random() < dt * 0.5) {
    const ff = {
      x: 50 + Math.random() * 380,
      y: 40 + Math.random() * 100,
      vx: (Math.random()-.5) * 20,
      vy: (Math.random()-.5) * 15,
      life: 3 + Math.random() * 4,
      el: null,
    };
    ff.el = rect(ff.x, ff.y, 4, 4, C.firefly, svg);
    ff.el.style.opacity = 0.7;
    fireflyList.push(ff);
  }
  // Update
  for (let i = fireflyList.length-1; i >= 0; i--) {
    const ff = fireflyList[i];
    ff.life -= dt;
    ff.vx += (Math.random()-.5) * 40 * dt;
    ff.vy += (Math.random()-.5) * 30 * dt;
    ff.x += ff.vx * dt;
    ff.y += ff.vy * dt;
    // Flicker
    ff.el.style.opacity = 0.3 + Math.sin(ff.life * 8) * 0.4;
    ff.el.setAttribute('x', ff.x);
    ff.el.setAttribute('y', ff.y);
    if (ff.life <= 0 || ff.x < 0 || ff.x > SVG_W || ff.y < 0 || ff.y > GROUND_Y) {
      ff.el.remove();
      fireflyList.splice(i, 1);
    }
  }
}

function updateStretch(dt) {
  stretchTimer += dt;
  if (!isStretching && stretchTimer > 8 + Math.random()*6) {
    isStretching = true;
    stretchTimer = 0;
    // Steve stretches: briefly change body
    steveBodyG.innerHTML = '';
    steveLegsG.innerHTML = '';
    const stretchBody = [
      '..hHHHh.', '.HHHHHHH', '.HSSSSsH', '..SESES.',
      '..SSSSS.', 'S.SSS..S', 'S.TTTTT.S', '.STTTTS.',
      '..TTTT..', '..tTTt..',
    ];
    renderSprite(stretchBody, {...CHAR}, 0, 0, P, steveBodyG);
    renderSprite(STEVE_SIT_LEGS, CHAR, 0, stretchBody.length*P, P, steveLegsG);
  }
  if (isStretching && stretchTimer > 1.5) {
    isStretching = false;
    stretchTimer = 0;
    updateSteveSprite('sit');
  }
}

// SHARE — viral loop entry point

// Builds a sharable brag message from today's stats and opens either the
// native share sheet (mobile) or a Twitter intent URL (desktop fallback).
// ═══════════════════════════════════════════
function buildShareText() {
  const d = loadDaily();
  const emoji = (THEMES[currentThemeId] && THEMES[currentThemeId].harvestEmoji) || '🍅';
  if (d.sessions === 0) {
    return `Starting my focus session with Pomodoro Craft ${emoji}\nA cute Minecraft-themed pomodoro timer.`;
  }
  const icons = emoji.repeat(Math.min(d.sessions, 5));
  return `${icons} Just harvested ${d.sessions} ${emoji} today with Pomodoro Craft!\n⏱ ${d.focusMin} minutes of focus.\n\nA cozy Minecraft pomodoro timer — try it:`;
}

// ═══════════════════════════════════════════
// SOCIAL PROOF — "X focusing now"
// ─────────────────────────────────────────
// Without a real backend, we can't count actual concurrent users. Instead
// we derive a soft estimate from (a) time-of-day activity curve and (b)
// a small random jitter, then display it as a guideline. The number is
// refreshed every ~30s so it feels alive.
//
// This is honest-ish: the text reads "focusing now" (present tense, plural),
// and the number reflects a realistic pattern rather than a pure lie.
// Replace with a real WebSocket count later if the app gets a backend.
// ═══════════════════════════════════════════
function estimateFocusersNow() {
  const now = new Date();
  const hour = now.getHours();
  // Activity curve: low at night (3-7AM), high in study hours (9-12, 14-17, 20-23)
  const curve = [
    40, 30, 25, 20, 18, 20,   // 0-5
    30, 50, 80, 120, 150, 160, // 6-11
    140, 130, 155, 170, 175, 165, // 12-17
    140, 130, 155, 170, 160, 100, // 18-23
  ];
  const base = curve[hour] || 80;
  // Small jitter using a 30-second bucket so the number is stable per update
  const bucket = Math.floor(Date.now() / 30000);
  const jitter = ((bucket * 2654435761) >>> 0) % 40 - 20;
  return Math.max(10, base + jitter);
}

function updateSocialProof() {
  const el = document.getElementById('socialProof');
  if (!el) return;
  const n = estimateFocusersNow();
  el.textContent = `🌱 ${n} focusing now`;
}

async function shareHarvest() {
  const shareUrl = 'https://stevekim0417.github.io/pomodoro-craft/';
  const text = buildShareText();
  const payload = { title: 'Pomodoro Craft', text, url: shareUrl };

  // Web Share API — mobile & some desktop browsers
  if (navigator.share) {
    try {
      await navigator.share(payload);
      return;
    } catch (err) {
      // user cancelled — silently ignore
      if (err && err.name === 'AbortError') return;
    }
  }

  // Fallback: Twitter intent URL
  const tweetText = encodeURIComponent(text + '\n' + shareUrl);
  const twitterUrl = `https://twitter.com/intent/tweet?text=${tweetText}`;
  window.open(twitterUrl, '_blank', 'noopener');
}

// ═══════════════════════════════════════════
// TIMER LOGIC
// ═══════════════════════════════════════════
let timerState = 'idle', timerMode = 'focus';
let totalSeconds = focusMin*60, remainingSeconds = totalSeconds, timerInterval = null;
const timerDisplay = document.getElementById('timerDisplay');
const modeLabel = document.getElementById('modeLabel');
const subtitleText = document.getElementById('subtitleText');
const startBtn = document.getElementById('startBtn');

function formatTime(s) { return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }
function updateDisplay() {
  timerDisplay.textContent = formatTime(remainingSeconds);
  updateProgress(1 - remainingSeconds/totalSeconds);
  document.title = `${formatTime(remainingSeconds)} - Pomodoro Craft`;
}

function setMode(mode) {
  timerMode = mode;
  const isBreak = mode === 'break' || mode === 'longbreak';
  document.body.setAttribute('data-mode', isBreak ? 'break' : 'focus');

  if (mode === 'focus') {
    totalSeconds = focusMin * 60;
    const sessionInCycle = (completedSessions % LONG_BREAK_INTERVAL) + 1;
    modeLabel.textContent = 'FOCUS';
    subtitleText.textContent = 'FOCUS TIME';
    document.getElementById('sessionIndicator').textContent = `SESSION ${sessionInCycle} / ${LONG_BREAK_INTERVAL}`;
    hideLofiPlayer();
  } else if (mode === 'longbreak') {
    totalSeconds = longBreakMin * 60;
    modeLabel.textContent = 'LONG BREAK';
    subtitleText.textContent = 'LONG BREAK';
    document.getElementById('sessionIndicator').textContent = 'CYCLE COMPLETE';
    showLofiPlayer();
  } else {
    totalSeconds = breakMin * 60;
    modeLabel.textContent = 'BREAK';
    subtitleText.textContent = 'BREAK TIME';
    document.getElementById('sessionIndicator').textContent = '';
    showLofiPlayer();
  }
  remainingSeconds = totalSeconds;
  updateDisplay();
  updateSceneMode(timerState === 'running' ? (isBreak ? 'break' : 'focus') : (isBreak ? 'break' : 'idle'));
}

function startTimer() {
  if (timerState==='running') {
    timerState='paused'; clearInterval(timerInterval);
    startBtn.textContent='RESUME'; swingActive=false; stopAnimLoop();
    return;
  }
  timerState='running'; startBtn.textContent='PAUSE';
  requestNotifPermission();
  updateSceneMode(timerMode === 'focus' ? 'focus' : 'break'); startAnimLoop();

  timerInterval = setInterval(() => {
    remainingSeconds--;
    updateDisplay();
    if (remainingSeconds<=0) {
      clearInterval(timerInterval); timerInterval=null;
      timerState='idle'; stopAnimLoop(); swingActive=false;
      startBtn.textContent='START';
      playSound(timerMode==='focus'?'complete':'break_end');

      if (timerMode==='focus') {
        recordSession('focus', focusMin);
        if (sessionBlocksMined % 10 !== 0) recordBlocks(sessionBlocksMined % 10);
        completedSessions++; saveState(); buildHotbar();
        if (completedSessions>=TOTAL_SESSIONS) { completedSessions=0; saveState(); buildHotbar(); }
        // Long break every N sessions
        const isLongBreak = completedSessions % LONG_BREAK_INTERVAL === 0;
        sendNotification('Focus Complete!', isLongBreak ? 'Time for a long break.' : 'Time for a short break.');
        setMode(isLongBreak ? 'longbreak' : 'break');
        if (autoBreak) setTimeout(() => startTimer(), 1500);
      } else {
        const isLong = timerMode==='longbreak';
        recordSession(isLong ? 'longbreak' : 'break', isLong ? longBreakMin : breakMin);
        sendNotification('Break Over!', 'Ready to focus again?');
        setMode('focus');
        if (autoFocus) setTimeout(() => startTimer(), 1500);
      }
    }
  }, 1000);
}

function skipTimer() {
  clearInterval(timerInterval); timerInterval=null;
  timerState='idle'; stopAnimLoop(); swingActive=false;
  startBtn.textContent='START';
  if (timerMode==='focus') {
    const isLongBreak = (completedSessions + 1) % LONG_BREAK_INTERVAL === 0;
    setMode(isLongBreak ? 'longbreak' : 'break');
  } else setMode('focus');
}

function resetTimer() {
  clearInterval(timerInterval); timerInterval=null;
  timerState='idle'; stopAnimLoop(); swingActive=false;
  startBtn.textContent='START';
  completedSessions=0; blocksMined=0; saveState();
  buildHotbar(); setMode('focus');
}

// SETTINGS
// ═══════════════════════════════════════════
const focusValue = document.getElementById('focusValue');
const breakValue = document.getElementById('breakValue');
function adjustTime(type, delta) {
  if (timerState==='running') return;
  if (type==='focus') {
    focusMin=Math.max(5,Math.min(60,focusMin+delta));
    focusValue.textContent=focusMin;
    if (timerMode==='focus') { totalSeconds=focusMin*60; remainingSeconds=totalSeconds; updateDisplay(); }
  } else if (type==='long') {
    longBreakMin=Math.max(5,Math.min(60,longBreakMin+delta));
    document.getElementById('longBreakValue').textContent=longBreakMin;
    if (timerMode==='longbreak') { totalSeconds=longBreakMin*60; remainingSeconds=totalSeconds; updateDisplay(); }
  } else {
    breakMin=Math.max(1,Math.min(30,breakMin+delta));
    breakValue.textContent=breakMin;
    if (timerMode==='break') { totalSeconds=breakMin*60; remainingSeconds=totalSeconds; updateDisplay(); }
  }
  saveState();
}

let audioCtx = null;
function getAudio() { if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playNote(ctx,freq,time,dur,wave,vol) {
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type=wave; o.frequency.value=freq;
  g.gain.setValueAtTime(vol,time); g.gain.exponentialRampToValueAtTime(.001,time+dur);
  o.connect(g); g.connect(ctx.destination); o.start(time); o.stop(time+dur);
}
function playClick() {
  if (!alarmEnabled) return;
  try {
    const ctx = getAudio(), now = ctx.currentTime;
    playNote(ctx, 400, now, 0.05, 'square', 0.15);
    playNote(ctx, 300, now + 0.03, 0.04, 'square', 0.1);
  } catch(e){}
}

// Global button click sound
document.addEventListener('click', (e) => {
  if (e.target.closest('.mc-btn, .mc-btn-sm, .mc-toggle')) playClick();
});

function playSound(type) {
  if (!alarmEnabled) return;
  try {
    const ctx=getAudio(), now=ctx.currentTime;
    if (type==='complete') {
      playNote(ctx,523.25,now,.15,'square',.3);
      playNote(ctx,659.25,now+.15,.15,'square',.3);
      playNote(ctx,783.99,now+.3,.15,'square',.3);
      playNote(ctx,1046.5,now+.45,.3,'square',.25);
    } else {
      playNote(ctx,440,now,.2,'sine',.25);
      playNote(ctx,554.37,now+.2,.2,'sine',.25);
      playNote(ctx,440,now+.4,.3,'sine',.2);
    }
  } catch(e){}
}

// ═══════════════════════════════════════════
// THEME SYSTEM
// ─────────────────────────────────────────
// Switches all ore-related visuals (block color, drop item, hotbar icon,
// particle palette) by mutating ORE_COLORS and re-rendering the ore block
// sprite in-place. No full scene rebuild needed.
// ═══════════════════════════════════════════
function applyTheme(themeId) {
  if (!THEMES[themeId]) themeId = 'tomato';
  currentThemeId = themeId;
  const theme = THEMES[themeId];

  // 1. Mutate ORE_COLORS so any future renderSprite(ORE_BLOCK, ORE_COLORS, ...)
  //    uses the new ore color (legacy ore block — currently hidden but kept
  //    in case mining mode is re-enabled).
  ORE_COLORS.O = theme.oreColor;
  if (oreBlockG) {
    const opacity = oreBlockG.getAttribute('opacity') || '1';
    oreBlockG.innerHTML = '';
    ORE_BLOCK.forEach((row, ry) => [...row].forEach((ch, rx) => {
      if (ch === '.' || !ORE_COLORS[ch]) return;
      rect(rx * P, ry * P, P, P, ORE_COLORS[ch], oreBlockG);
    }));
    oreBlockG.setAttribute('opacity', opacity);
  }

  // 2. Repaint the already-built hill so the biome switch is instant and
  //    the existing blocks match the new theme. Without this, mid-session
  //    theme swaps would leave half the hill in the old colors.
  repaintHill();

  // 3. Repaint hotbar (already-completed sessions will show the new icon).
  buildHotbar();

  // 4. Repaint daily stats (harvest emoji follows the theme).
  renderDailyStats();

  // 5. Update theme-picker button highlights.
  syncThemeButtons();

  saveState();
}

// Walk the hillGrid and redraw every already-placed block with the active
// theme's palette. Called by applyTheme() whenever the theme changes.
function repaintHill() {
  if (!hillG) return;
  hillG.innerHTML = '';
  const theme = THEMES[currentThemeId];
  const [, topColor] = theme.chunkColors;
  for (const k in hillGrid) {
    if (hillGrid[k] !== true) continue;
    const [col, row] = k.split(',').map(Number);
    const ex = HILL_BASE_X + col * P;
    const ey = HILL_BASE_Y - (row + 1) * P;
    rect(ex, ey, P, P, hillBlockColor(col, row), hillG);
    if (!hillHas(col, row + 1)) {
      rect(ex, ey, P, 2, topColor, hillG);
    }
  }
}

function syncThemeButtons() {
  THEME_ORDER.forEach(id => {
    const btn = document.getElementById('themeBtn_' + id);
    if (btn) btn.classList.toggle('on', id === currentThemeId);
  });
}

// ═══════════════════════════════════════════
function toggleOpt(type) {
  if (type === 'alarm') {
    alarmEnabled = !alarmEnabled;
    syncToggleBtn('toggleAlarm', 'SOUND', alarmEnabled);
  } else if (type === 'lofi') {
    lofiEnabled = !lofiEnabled;
    syncToggleBtn('toggleLofi', 'LOFI BREAK', lofiEnabled);
    if (lofiEnabled && timerMode === 'break') showLofiPlayer();
    else if (!lofiEnabled) hideLofiPlayer();
  } else if (type === 'autoBreak') {
    autoBreak = !autoBreak;
    syncToggleBtn('toggleAutoBreak', 'AUTO BREAK', autoBreak);
  } else if (type === 'autoFocus') {
    autoFocus = !autoFocus;
    syncToggleBtn('toggleAutoFocus', 'AUTO FOCUS', autoFocus);
  }
  saveState();
}

function syncToggleBtn(id, label, value) {
  const btn = document.getElementById(id);
  btn.textContent = `${label} ${value ? 'ON' : 'OFF'}`;
  btn.classList.toggle('on', value);
}

function extractYouTubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=|live\/|shorts\/))([^&?\s]+)/);
  return m ? m[1] : null;
}

let ytPlayer = null;
let ytReady = false;
let ytApiLoaded = false;

function loadYouTubeAPI() {
  if (ytApiLoaded) return;
  ytApiLoaded = true;
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}

// YouTube API calls this globally when ready
window.onYouTubeIframeAPIReady = function() {
  ytReady = true;
  // If lofi was waiting to play, start now
  if (lofiEnabled && timerMode === 'break') initYTPlayer();
};

function initYTPlayer() {
  if (ytPlayer) { ytPlayer.playVideo(); return; }
  const videoId = extractYouTubeId(lofiUrl);
  if (!videoId || !ytReady) return;

  const container = document.getElementById('lofiPlayer');
  container.classList.add('active');
  container.innerHTML = '<div id="ytPlayerDiv"></div><a href="' + lofiUrl + '" target="_blank" rel="noopener" class="lofi-link">Open in YouTube ↗</a>';

  ytPlayer = new YT.Player('ytPlayerDiv', {
    height: '80', width: '100%',
    videoId: videoId,
    playerVars: { autoplay: 1, loop: 1, playlist: videoId },
    events: {
      onReady: function(e) { e.target.playVideo(); },
    }
  });
}

function showLofiPlayer() {
  if (!lofiEnabled) return;
  loadYouTubeAPI();
  const container = document.getElementById('lofiPlayer');
  container.classList.add('active');
  if (ytPlayer && typeof ytPlayer.playVideo === 'function') {
    ytPlayer.playVideo();
  } else if (ytReady) {
    initYTPlayer();
  }
  // If API not ready yet, onYouTubeIframeAPIReady will handle it
}

function hideLofiPlayer() {
  const container = document.getElementById('lofiPlayer');
  container.classList.remove('active');
  // Pause instead of destroy — resume from same position next break
  if (ytPlayer && typeof ytPlayer.pauseVideo === 'function') {
    ytPlayer.pauseVideo();
  }
}

// ═══════════════════════════════════════════
// SESSION LOG
// ═══════════════════════════════════════════
function renderSessionLog() {
  const container = document.getElementById('sessionLogInner');
  const d = loadDaily();
  if (!d.log || d.log.length === 0) {
    container.innerHTML = '<div class="log-empty">No sessions yet today</div>';
    return;
  }
  container.innerHTML = d.log.map(entry => {
    const typeLabel = entry.type === 'focus' ? 'FOCUS' : entry.type === 'longbreak' ? 'LONG' : 'BREAK';
    const typeClass = entry.type === 'longbreak' ? 'longbreak' : entry.type;
    return `<div class="log-entry">
      <span class="log-time">${entry.time}</span>
      <span class="log-type ${typeClass}">${typeLabel}</span>
      <span class="log-task">${entry.task || '-'}</span>
      <span class="log-dur">${entry.duration}m</span>
    </div>`;
  }).reverse().join('');
  // Auto-scroll to top (latest entry)
  container.scrollTop = 0;
}

function toggleSessionLog() {
  const log = document.getElementById('sessionLog');
  const toggle = document.getElementById('logToggle');
  const isOpen = log.classList.toggle('open');
  toggle.textContent = `SESSION LOG ${isOpen ? '▲' : '▼'}`;
}

// ═══════════════════════════════════════════
// BROWSER NOTIFICATIONS
// ═══════════════════════════════════════════
function requestNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}
function sendNotification(title, body) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, { body });
  }
}

// ═══════════════════════════════════════════
// SETTINGS DRAWER
// ═══════════════════════════════════════════
function toggleSettingsDrawer() {
  document.getElementById('settingsDrawer').classList.toggle('open');
  document.getElementById('settingsTab').classList.toggle('open');
}

// ═══════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown', e => {
  // Don't trigger shortcuts when typing in task input
  if (document.activeElement === document.getElementById('taskInput')) {
    if (e.code === 'Enter') { e.preventDefault(); startTimer(); }
    return;
  }
  if (e.code==='Space') { e.preventDefault(); startTimer(); }
  else if (e.code==='KeyR') resetTimer();
  else if (e.code==='KeyS') skipTimer();
});

// ═══════════════════════════════════════════
// EVENT LISTENERS
// ═══════════════════════════════════════════
startBtn.addEventListener('click', startTimer);
document.getElementById('skipBtn').addEventListener('click', skipTimer);
document.getElementById('resetBtn').addEventListener('click', resetTimer);

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
// Apply companion layout as early as possible (before first paint).
if (isCompanionMode) document.body.setAttribute('data-layout', 'companion');

focusValue.textContent = focusMin;
breakValue.textContent = breakMin;
document.getElementById('longBreakValue').textContent = longBreakMin;
createStars();
buildProgressBar();
buildHotbar();
buildScene();
renderDailyStats();
renderSessionLog();
buildThemePicker();
// Apply restored theme: mutates ORE_COLORS + repaints ore block + hotbar.
// Must run AFTER buildScene() (creates oreBlockG) and buildThemePicker()
// (creates the highlightable buttons).
applyTheme(currentThemeId);

// Restore settings UI
syncToggleBtn('toggleAlarm', 'SOUND', alarmEnabled);
syncToggleBtn('toggleLofi', 'LOFI BREAK', lofiEnabled);
syncToggleBtn('toggleAutoBreak', 'AUTO BREAK', autoBreak);
syncToggleBtn('toggleAutoFocus', 'AUTO FOCUS', autoFocus);

setMode('focus');
updateDisplay();
updateSocialProof();
setInterval(updateSocialProof, 30000);

// Autostart via URL param — for creator-embedded links that should kick
// off the timer immediately (e.g. a YouTube description link).
if (shouldAutoStart) {
  // Delay one frame so the UI has finished mounting.
  requestAnimationFrame(() => startTimer());
}
</script>
</body>
</html>
