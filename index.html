  { id: 'demo5', nick: 'priya',    country: 'IN', theme: 'diamond', timerMode: 'break', remainingSec:  120, totalSec:  300 },
  { id: 'demo6', nick: 'bruno',    country: 'BR', theme: 'tomato',  timerMode: 'focus', remainingSec:  540, totalSec: 1500 },
  { id: 'demo7', nick: 'zara',     country: 'VN', theme: 'emerald', timerMode: 'focus', remainingSec:  900, totalSec: 1500 },
  { id: 'demo8', nick: 'devsteve', country: 'GB', theme: 'gold',    timerMode: 'idle',  remainingSec:    0, totalSec:    0 },
];

// Decide which list to actually render — real users if we have any,
// otherwise the demo fallback so the scene stays populated.
function getEffectiveUsers() {
  return (liveUsers && liveUsers.length > 0) ? liveUsers : DEMO_USERS;
}

// Tick demo users forward by 1 second. Switches mode at 0 for that
// natural "sessions changing over" feel. Only runs while liveUsers
// is empty (real users take precedence).
function tickDemoUsers() {
  if (liveUsers && liveUsers.length > 0) return;  // real users present
  let changed = false;
  DEMO_USERS.forEach((u) => {
    if (u.timerMode === 'focus') {
      u.remainingSec = Math.max(0, u.remainingSec - 1);
      changed = true;
      if (u.remainingSec === 0) {
        // Session complete → short break
        u.timerMode = 'break';
        u.remainingSec = 300;
        u.totalSec = 300;
      }
    } else if (u.timerMode === 'break' || u.timerMode === 'longbreak') {
      u.remainingSec = Math.max(0, u.remainingSec - 1);
      changed = true;
      if (u.remainingSec === 0) {
        // Break over → new focus session (1500s = 25min)
        u.timerMode = 'focus';
        u.remainingSec = 1500;
        u.totalSec = 1500;
      }
    } else if (u.timerMode === 'idle') {
      // Occasionally transition an idle user into focus
      if (Math.random() < 0.008) {
        u.timerMode = 'focus';
        u.remainingSec = 1500;
        u.totalSec = 1500;
        changed = true;
      }
    }
  });
  if (changed) renderRemoteUsers();
}

function estimateFocusersNow() {
  // Fallback for when the backend isn't configured
  const hour = new Date().getHours();
  const curve = [
    40, 30, 25, 20, 18, 20,   // 0-5
    30, 50, 80, 120, 150, 160, // 6-11
    140, 130, 155, 170, 175, 165, // 12-17
    140, 130, 155, 170, 160, 100, // 18-23
  ];
  const base = curve[hour] || 80;
  const bucket = Math.floor(Date.now() / 30000);
  const jitter = ((bucket * 2654435761) >>> 0) % 40 - 20;
  return Math.max(10, base + jitter);
}

async function fetchGlobalStats() {
  if (!HAS_BACKEND) return null;
  try {
    const res = await fetch(`${API_BASE_URL}/api/stats`, { cache: 'no-store' });
    if (!res.ok) return null;
    const data = await res.json();
    liveOnlineCount = data.onlineNow;
    liveTodayHarvest = (data.today && data.today.sessions) || 0;
    liveFeed = data.feed || [];
    liveUsers = data.users || [];
    if (data.mountain && typeof data.mountain.blocks === 'number') {
      globalMountainBlocks = data.mountain.blocks;
      renderMountain();
      renderMountainBadge();
    }
    renderRemoteUsers();
    return data;
  } catch (e) {
    return null;
  }
}

async function recordGlobalSession(minutes, theme, nick = null) {
  if (!HAS_BACKEND) return;
  try {
    await fetch(`${API_BASE_URL}/api/session`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ minutes, theme, nick }),
    });
  } catch (e) { /* silent — local record still works */ }
}

function connectPresence() {
  if (!HAS_BACKEND) return;
  try {
    const wsUrl = API_BASE_URL.replace(/^http/, 'ws') + '/api/presence';
    presenceSocket = new WebSocket(wsUrl);

    presenceSocket.addEventListener('open', () => {
      // Identify ourselves immediately
      sendPresenceMessage({
        type: 'hello',
        nick: currentNick,
        theme: currentThemeId,
      });
      // Start broadcasting our timer state every 5s
      if (stateBroadcastTimer) clearInterval(stateBroadcastTimer);
      stateBroadcastTimer = setInterval(broadcastMyState, 5000);
      // And send one immediately so we appear to others right away
      broadcastMyState();
    });

    presenceSocket.addEventListener('message', (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        if (msg.type === 'welcome') {
          myUserId = msg.yourId;
          liveUsers = msg.users || [];
          liveOnlineCount = liveUsers.length;
          updateSocialProof();
          renderRemoteUsers();
        } else if (msg.type === 'users') {
          liveUsers = msg.users || [];
          liveOnlineCount = liveUsers.length;
          updateSocialProof();
          renderRemoteUsers();
        } else if (msg.type === 'session') {
          liveFeed = [msg.session, ...liveFeed].slice(0, 10);
          liveTodayHarvest++;
          if (msg.mountain && typeof msg.mountain.blocks === 'number') {
            const delta = msg.mountain.blocks - globalMountainBlocks;
            globalMountainBlocks = msg.mountain.blocks;
            renderMountain();
            renderMountainBadge();
            // Animate a block flying toward the mountain from the
            // contributing user's slot (if we can find it).
            if (msg.session && delta > 0) {
              flyContributionBlock(msg.session);
            }
          }
          renderLiveFeed();
          updateSocialProof();
        } else if (msg.type === 'pong') {
          /* keep-alive ack */
        }
      } catch (e) { /* ignore malformed */ }
    });

    presenceSocket.addEventListener('close', () => {
      presenceSocket = null;
      if (stateBroadcastTimer) {
        clearInterval(stateBroadcastTimer);
        stateBroadcastTimer = null;
      }
      // Clear remote users — we no longer know who's online
      liveUsers = [];
      liveOnlineCount = null;
      renderRemoteUsers();
      updateSocialProof();
      // Reconnect after 5s
      setTimeout(connectPresence, 5000);
    });

    presenceSocket.addEventListener('error', () => {
      try { presenceSocket.close(); } catch (e) {}
    });
  } catch (e) { /* silent */ }
}

function sendPresenceMessage(obj) {
  if (!presenceSocket || presenceSocket.readyState !== WebSocket.OPEN) return;
  try { presenceSocket.send(JSON.stringify(obj)); } catch (e) {}
}

// Called periodically and on any timer state change.
// Sends this user's current timer state so other clients can render
// them with the correct mode + remaining seconds above their head.
function broadcastMyState() {
  if (!HAS_BACKEND) return;
  sendPresenceMessage({
    type: 'state',
    timerMode: (timerState === 'running' || timerState === 'paused') ? timerMode : 'idle',
    remainingSec: Math.max(0, remainingSeconds || 0),
    totalSec: Math.max(0, totalSeconds || 0),
    theme: currentThemeId,
  });
}

function disconnectPresence() {
  if (presenceSocket) {
    try { presenceSocket.close(); } catch (e) {}
    presenceSocket = null;
  }
  if (stateBroadcastTimer) {
    clearInterval(stateBroadcastTimer);
    stateBroadcastTimer = null;
  }
}

function updateSocialProof() {
  const el = document.getElementById('socialProof');
  if (!el) return;

  // Real backend data takes precedence — otherwise fall back to the
  // time-of-day estimate so the app doesn't feel dead during local use.
  const isReal = liveOnlineCount != null;
  const n = isReal ? liveOnlineCount : estimateFocusersNow();

  let label;
  if (isReal) {
    // Honest messages tuned for the low-traffic reality: most of the
    // time the user will be alone (n=1). The copy celebrates rather
    // than apologizes for that, and ramps up naturally as more
    // people join.
    if (n === 0) {
      // Shouldn't happen (we count ourselves) but cover the edge case
      label = '🌱 Be the first one focusing today';
    } else if (n === 1) {
      // It's just the user themselves
      label = `🌱 You're focused alone · be the first today ✨`;
    } else if (n === 2) {
      // Magical moment — exactly one other person is here!
      label = `🌱 You're focused with 1 other right now · LIVE`;
    } else if (n <= 5) {
      label = `🌱 You're focused with ${n - 1} others right now · LIVE`;
    } else {
      label = `🌱 Join ${n - 1} others focusing right now · LIVE`;
    }
  } else {
    // Solo/offline mode — use the fake estimate
    label = `🌱 Join ${n} others focusing right now`;
  }
  el.textContent = label;
  el.classList.toggle('live', isReal);
  // Extra highlight for the "alone" state so it feels intentional
  el.classList.toggle('alone', isReal && n <= 1);
}

// ═══════════════════════════════════════════
// LIVE FEED — recent sessions scrolling ticker
// ═══════════════════════════════════════════
function timeAgo(ts) {
  const s = Math.max(1, Math.round((Date.now() - ts) / 1000));
  if (s < 60) return `${s}s ago`;
  const m = Math.round(s / 60);
  if (m < 60) return `${m}m ago`;
  const h = Math.round(m / 60);
  return `${h}h ago`;
}

function renderLiveFeed() {
  const el = document.getElementById('liveFeed');
  if (!el) return;
  if (!HAS_BACKEND || liveFeed.length === 0) {
    el.innerHTML = '<span class="feed-empty">— connect to see live sessions —</span>';
    return;
  }
  const items = liveFeed.slice(0, 5).map(s => {
    const emoji = (THEMES[s.theme] && THEMES[s.theme].harvestEmoji) || '🍅';
    const nick = s.nick || 'someone';
    return `<div class="feed-item">${emoji} <b>${escapeHtml(nick)}</b> harvested · ${s.minutes}m · <span class="feed-time">${timeAgo(s.at)}</span></div>`;
  }).join('');
  el.innerHTML = items;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

// ═══════════════════════════════════════════
// REMOTE USERS — render other connected users as mini Steves
// ─────────────────────────────────────────
// Each remote user gets one of 8 fixed slots in the scene so layout
// is stable and predictable. Mini Steves are drawn at half the main
// scale (P=3) with a hat matching their current theme, a nickname
// above, and their timer state below. State updates trigger a full
// re-render of the remoteUsersG layer — cheap because there are at
// most ~8 users and updates happen every 5s.
// ═══════════════════════════════════════════
const REMOTE_P = 3;  // pixel size — half of main scale P=6

// ═══════════════════════════════════════════
// PLOT SLOTS — Horizontal Village layout
// ─────────────────────────────────────────
// 8 neighbor plots + 1 main plot = 9 visible slots.
//   Left 4 plots:   x=0~480, each 120px wide
//   Main plot:      x=480~720, 240px wide (not a "slot" — fixed)
//   Right 4 plots:  x=720~1200, each 120px wide
// PLOT_SLOTS contains the CENTER x of each neighbor plot.
// Ordered left→right for predictable placement.
// ═══════════════════════════════════════════
const PLOT_W = 120;
const PLOT_SLOTS = [
  { centerX:  60, side: 'L' }, // L4 (far left)
  { centerX: 180, side: 'L' }, // L3
  { centerX: 300, side: 'L' }, // L2
  { centerX: 420, side: 'L' }, // L1 (closest to main on left)
  { centerX: 780, side: 'R' }, // R1 (closest to main on right)
  { centerX: 900, side: 'R' }, // R2
  { centerX:1020, side: 'R' }, // R3
  { centerX:1140, side: 'R' }, // R4 (far right)
];
const PLOT_GROUND_Y = GROUND_Y;  // share the world ground line
// Mini Steve sits on the ground. Height = 14 rows × REMOTE_P = 42px.
// Top-left of the mini Steve sprite relative to plot center:
const MINI_STEVE_OFFSET_X = -4 * REMOTE_P;  // sprite is 8 cols wide
const MINI_STEVE_OFFSET_Y = -14 * REMOTE_P - 2;  // sprite is 14 rows tall

// Hat color per theme — used to tint the mini Steve's cap
function remoteHatColors(themeId) {
  const t = THEMES[themeId] || THEMES.tomato;
  // Extract hat colors from current theme fallback (we reuse the
  // main cap which is red — future: let each user pick a hat).
  return { J: C.hat, j: C.hatDark, K: C.hatBand };
}

// Convert ISO country code to flag emoji
// (e.g. "KR" → "🇰🇷"). Uses Unicode Regional Indicator Symbols.
// Returns '' for unknown ("ZZ") or invalid codes.
function countryCodeToFlag(code) {
  if (!code || typeof code !== 'string' || code.length !== 2) return '';
  if (code === 'ZZ' || code === 'T1' /* Tor exit */) return '🏳️';
  const A = 'A'.charCodeAt(0);
  const base = 0x1F1E6;
  try {
    const codePoints = code.toUpperCase().split('').map(c => base + (c.charCodeAt(0) - A));
    return String.fromCodePoint(...codePoints);
  } catch (e) {
    return '';
  }
}

// ═══════════════════════════════════════════
// HAT COLOR PALETTE — per-user cap tint
// ─────────────────────────────────────────
// Each user gets a deterministic hat color based on their nick, so
// visiting the same person multiple times shows them in the same
// color. 12 distinct hats cover 99% of visible combinations.
//
// Color keys used by STEVE_BODY sprite:
//   J = hat dome main color
//   j = hat visor / darker trim
//   K = white logo / band
// ═══════════════════════════════════════════
const HAT_PALETTE = [
  { J: '#D83030', j: '#7A1515', K: '#FFFFFF' }, // 0 — red (Mario)
  { J: '#3D6DCC', j: '#1E4A8E', K: '#FFFFFF' }, // 1 — blue (baseball)
  { J: '#3A8B3A', j: '#1F4A1F', K: '#FFFFFF' }, // 2 — forest green
  { J: '#F1C40F', j: '#B7950B', K: '#000000' }, // 3 — yellow
  { J: '#8E44AD', j: '#5A2676', K: '#FFFFFF' }, // 4 — purple
  { J: '#E67E22', j: '#9E4A05', K: '#FFFFFF' }, // 5 — orange
  { J: '#EC407A', j: '#AD1457', K: '#FFFFFF' }, // 6 — pink
  { J: '#26A69A', j: '#00766C', K: '#FFFFFF' }, // 7 — teal
  { J: '#5D4037', j: '#2E1C18', K: '#FFE082' }, // 8 — brown (cowboy)
  { J: '#455A64', j: '#1C313A', K: '#FFFFFF' }, // 9 — slate
  { J: '#000000', j: '#202020', K: '#FFFFFF' }, //10 — black
  { J: '#F4F4F4', j: '#A0A0A0', K: '#E63946' }, //11 — white
];

// Deterministic hash → pick a hat index from nick.
// Djb2-like hash — simple, fast, stable across runs.
function hatIndexForNick(nick) {
  const seed = String(nick || '').trim() || 'guest';
  let hash = 5381;
  for (let i = 0; i < seed.length; i++) {
    hash = ((hash << 5) + hash + seed.charCodeAt(i)) | 0;
  }
  return Math.abs(hash) % HAT_PALETTE.length;
}

// Build a CHAR map for a given user (overrides hat colors).
// Falls back to the default palette[0] if nick is missing.
function charForUser(user) {
  const hat = HAT_PALETTE[hatIndexForNick(user && user.nick)] || HAT_PALETTE[0];
  return Object.assign({}, CHAR, { J: hat.J, j: hat.j, K: hat.K });
}

// The main user's CHAR map — rebuilt when currentNick changes so
// the main Steve also gets a personalized hat color.
function buildMyCharMap() {
  const hat = HAT_PALETTE[hatIndexForNick(currentNick)] || HAT_PALETTE[0];
  return Object.assign({}, CHAR, { J: hat.J, j: hat.j, K: hat.K });
}
let myCharMap = null;  // initialized after currentNick is loaded

function renderRemoteUsers() {
  if (!remoteUsersG) return;
  remoteUsersG.innerHTML = '';

  // Use real users when available, otherwise fall back to DEMO_USERS
  // so the scene stays populated (8 demo characters) even in solo mode.
  const others = getEffectiveUsers().filter(u => u.id !== myUserId);
  const maxSlots = CHAR_SLOTS.length;

  // Sort: occupy back row first (farther = less central), then mid, then front.
  // This ensures that as users join, they fill from the back forward,
  // keeping main Steve visually dominant until the space fills up.
  others.slice(0, maxSlots).forEach((user, i) => {
    const slot = CHAR_SLOTS[i];
    drawRemoteSteveInSlot(remoteUsersG, slot, user);
  });

  // Overflow indicator — "+N more" text at the top-right corner
  if (others.length > maxSlots) {
    const overflow = others.length - maxSlots;
    const t = el('text', {
      x: SVG_W - 20, y: 30,
      fill: '#FFF',
      'font-size': 12,
      'font-family': 'Press Start 2P, monospace',
      'text-anchor': 'end',
      'stroke': '#000', 'stroke-width': 2,
      'paint-order': 'stroke',
    });
    t.textContent = `+${overflow} more`;
    remoteUsersG.appendChild(t);
  }
}

// Draw one remote user at a CHAR_SLOT position. The slot's `scale`
// determines the mini Steve's pixel size, so back-row characters are
// naturally smaller than mid/front-row ones — creating depth.
function drawRemoteSteveInSlot(parent, slot, user) {
  const scale = slot.scale;  // 3 (back), 4 (mid), 5 (front)
  const bodyW = 8 * scale;
  const bodyH = 14 * scale;  // 12 body + 2 legs

  // Opacity varies slightly by row for atmospheric depth
  const opacity = slot.row === 'back' ? 0.85 : (slot.row === 'mid' ? 0.92 : 1.0);

  // Top-left of the sprite: slot.x,y is the feet position, so subtract body height
  const ox = slot.x - bodyW / 2;
  const oy = slot.y - bodyH;
  const g = el('g', { transform: `translate(${ox},${oy})`, opacity });

  const isBreak = user.timerMode === 'break' || user.timerMode === 'longbreak';
  const isFocus = user.timerMode === 'focus';

  // Per-user CHAR map with their unique hat color
  const userChar = charForUser(user);

  // Body + legs (sit vs stand)
  if (isBreak) {
    renderSprite(STEVE_SIT_BODY, userChar, 0, 0, scale, g);
    renderSprite(STEVE_SIT_LEGS, userChar, 0, STEVE_SIT_BODY.length * scale, scale, g);
  } else {
    renderSprite(STEVE_BODY, userChar, 0, 0, scale, g);
    renderSprite(LEG_STAND, userChar, 0, STEVE_BODY.length * scale, scale, g);
  }

  // Focus mode: pickaxe beside the body (tilted -20°)
  if (isFocus) {
    const pickG = el('g', {
      transform: `translate(${7 * scale}, ${7 * scale}) rotate(-20)`,
    });
    renderSprite(PICK_HANDLE, PICK_COLORS, 0, 0, Math.max(2, scale - 1), pickG);
    g.appendChild(pickG);
  }

  // Break mode: 💤 above head
  if (isBreak) {
    const zzz = el('text', {
      x: 5 * scale, y: -Math.max(6, scale * 1.5),
      fill: '#88BBFF',
      'font-size': Math.max(10, scale * 2.5),
      'font-family': 'sans-serif',
      'text-anchor': 'middle',
    });
    zzz.textContent = '💤';
    g.appendChild(zzz);
  }

  // ── Flag (BIG, separate from nickname) ──
  const flag = countryCodeToFlag(user.country);
  const flagSize = slot.row === 'back' ? 14 : (slot.row === 'mid' ? 16 : 18);
  if (flag) {
    const flagText = el('text', {
      x: 4 * scale,
      y: -(scale * 3 + 8),  // sits above nickname
      'font-size': flagSize,
      'font-family': '"Apple Color Emoji", "Segoe UI Emoji", sans-serif',
      'text-anchor': 'middle',
    });
    flagText.textContent = flag;
    g.appendChild(flagText);
  }

  // ── Nickname below the flag, smaller ──
  const nick = (user.nick || 'guest').slice(0, 10);
  const labelFontSize = slot.row === 'back' ? 6 : (slot.row === 'mid' ? 7 : 8);
  const nickText = el('text', {
    x: 4 * scale,
    y: -3,
    fill: '#FFF',
    'font-size': labelFontSize,
    'font-family': 'Press Start 2P, monospace',
    'text-anchor': 'middle',
    'stroke': '#000',
    'stroke-width': 1,
    'paint-order': 'stroke',
  });
  nickText.textContent = nick;
  g.appendChild(nickText);

  // Timer state below feet
  const stateFontSize = slot.row === 'back' ? 6 : 7;
  const stateText = el('text', {
    x: 4 * scale,
    y: bodyH + 10,
    fill: '#FFD700',
    'font-size': stateFontSize,
    'font-family': 'Press Start 2P, monospace',
    'text-anchor': 'middle',
    'stroke': '#000',
    'stroke-width': 1,
    'paint-order': 'stroke',
  });
  if (isFocus) {
    const mins = Math.floor((user.remainingSec || 0) / 60);
    const secs = (user.remainingSec || 0) % 60;
    stateText.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    stateText.setAttribute('fill', '#8DB360');
  } else if (isBreak) {
    stateText.textContent = 'BREAK';
    stateText.setAttribute('fill', '#88BBFF');
  } else {
    stateText.textContent = 'IDLE';
    stateText.setAttribute('fill', '#888');
  }
  g.appendChild(stateText);

  // Theme color dot just above the nickname
  const themeColor = (THEMES[user.theme] && THEMES[user.theme].oreColor) || C.tomatoRed;
  rect(4 * scale - 2, -11, 4, 4, themeColor, g);

  parent.appendChild(g);
}

// Draw one remote user at a given slot. Pose varies by timer mode:
//   - focus:  standing + pickaxe beside them (implies active work)
//   - break:  sitting sprite (implies rest)
//   - idle:   standing sprite, no pickaxe
// Also renders flag emoji + nickname above, timer text below.
function drawRemoteSteve(parent, x, y, user) {
  const g = el('g', { transform: `translate(${x},${y})`, opacity: 0.9 });

  const isBreak = user.timerMode === 'break' || user.timerMode === 'longbreak';
  const isFocus = user.timerMode === 'focus';

  // ── Body sprite — different pose for break mode ──
  if (isBreak) {
    // Sitting pose — reuses the existing sit sprites from main Steve
    renderSprite(STEVE_SIT_BODY, CHAR, 0, 0, REMOTE_P, g);
    renderSprite(STEVE_SIT_LEGS, CHAR, 0, STEVE_SIT_BODY.length * REMOTE_P, REMOTE_P, g);
  } else {
    // Standing pose (focus or idle)
    renderSprite(STEVE_BODY, CHAR, 0, 0, REMOTE_P, g);
    renderSprite(LEG_STAND, CHAR, 0, STEVE_BODY.length * REMOTE_P, REMOTE_P, g);
  }

  // ── Focus: pickaxe beside the body (to the right) ──
  if (isFocus) {
    const pickG = el('g', {
      transform: `translate(${7 * REMOTE_P}, ${7 * REMOTE_P}) rotate(-20)`,
    });
    // Scale pickaxe slightly smaller than body so it doesn't dominate
    renderSprite(PICK_HANDLE, PICK_COLORS, 0, 0, REMOTE_P - 1, pickG);
    g.appendChild(pickG);
  }

  // ── Break: floating Z bubble above head ──
  if (isBreak) {
    const zzz = el('text', {
      x: 6 * REMOTE_P,
      y: -6,
      fill: '#88BBFF',
      'font-size': 8,
      'font-family': 'Press Start 2P, monospace',
      'text-anchor': 'middle',
      'stroke': '#000',
      'stroke-width': 0.8,
      'paint-order': 'stroke',
    });
    zzz.textContent = '💤';
    g.appendChild(zzz);
  }

  // ── Flag + nickname label above the head ──
  const flag = countryCodeToFlag(user.country);
  const shortNick = (user.nick || 'guest').slice(0, 10);
  const nickText = el('text', {
    x: 4 * REMOTE_P,
    y: -2,
    fill: '#FFF',
    'font-size': 5,
    'font-family': 'Press Start 2P, monospace',
    'text-anchor': 'middle',
    'stroke': '#000',
    'stroke-width': 0.8,
    'paint-order': 'stroke',
  });
  nickText.textContent = flag ? `${flag} ${shortNick}` : shortNick;
  g.appendChild(nickText);

  // ── State label below the feet ──
  const bodyHeight = isBreak ? (STEVE_SIT_BODY.length + 3) : (STEVE_BODY.length + 2);
  const stateText = el('text', {
    x: 4 * REMOTE_P,
    y: bodyHeight * REMOTE_P + 8,
    fill: '#FFD700',
    'font-size': 5,
    'font-family': 'Press Start 2P, monospace',
    'text-anchor': 'middle',
    'stroke': '#000',
    'stroke-width': 0.8,
    'paint-order': 'stroke',
  });
  if (isFocus) {
    const mins = Math.floor((user.remainingSec || 0) / 60);
    const secs = (user.remainingSec || 0) % 60;
    stateText.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    stateText.setAttribute('fill', '#8DB360');  // green when focusing
  } else if (isBreak) {
    stateText.textContent = 'BREAK';
    stateText.setAttribute('fill', '#88BBFF');
  } else {
    stateText.textContent = 'IDLE';
    stateText.setAttribute('fill', '#888');
  }
  g.appendChild(stateText);

  // ── Theme indicator — small colored dot ──
  const themeColor = (THEMES[user.theme] && THEMES[user.theme].oreColor) || C.tomatoRed;
  rect(4 * REMOTE_P - 2, -9, 4, 4, themeColor, g);

  parent.appendChild(g);
}

// ═══════════════════════════════════════════
// CANVAS SHARE CARD — "pixel art you can't help but screenshot"
// ─────────────────────────────────────────
// Renders a 1080x1080 Instagram-ready PNG using the same pixel sprite
// data as the scene. Inspired by Duolingo's screenshot-tracking strategy:
// design moments worth sharing and let the image itself do the marketing.
//
// The card contains:
//   - Large pixel Steve (standing)
//   - Today's harvest (emoji row)
//   - Focus minutes
//   - Streak flame
//   - pomodorocraft.com watermark
// ═══════════════════════════════════════════
function drawSpriteToCanvas(ctx, spriteData, colorMap, ox, oy, scale) {
  spriteData.forEach((row, ry) => {
    [...row].forEach((ch, rx) => {
      if (ch === '.' || !colorMap[ch]) return;
      ctx.fillStyle = colorMap[ch];
      ctx.fillRect(ox + rx * scale, oy + ry * scale, scale, scale);
    });
  });
}

async function ensureFontLoaded() {
  // Wait for Press Start 2P to be ready; ignore failure (fallback is monospace)
  if (document.fonts && document.fonts.load) {
    try { await document.fonts.load('48px "Press Start 2P"'); } catch(e) {}
  }
}

async function generateShareCard() {
  await ensureFontLoaded();

  const W = 1080, H = 1080;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;  // keep pixel-art crisp

  const theme = THEMES[currentThemeId];
  const d = loadDaily();
  const streak = getStreak();
  const life = getLifetime();
  const emoji = theme.harvestEmoji || '🍅';

  // ── Sky gradient (matches in-app background) ───────────────
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#7EC8E3');
  sky.addColorStop(1, '#B8E4F0');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // ── Pixel clouds (decorative) ──────────────────────────────
  ctx.fillStyle = '#FFFFFF';
  [[120, 140, 220], [760, 180, 180], [400, 90, 160]].forEach(([x, y, w]) => {
    ctx.fillRect(x, y, w, 24);
    ctx.fillRect(x + 20, y - 20, w - 40, 20);
    ctx.fillRect(x + 10, y + 24, w - 20, 20);
  });

  // ── Sun ────────────────────────────────────────────────────
  ctx.fillStyle = '#FFD700';
  const sunCx = 880, sunCy = 160;
  // Round sun 8x8 pattern at scale 14
  const sunSprite = ['..YYYY..','.YYYYYY.','YYYYYYYY','YYYYYYYY','YYYYYYYY','YYYYYYYY','.YYYYYY.','..YYYY..'];
  drawSpriteToCanvas(ctx, sunSprite, { Y: '#FFD700' }, sunCx - 56, sunCy - 56, 14);
  // Rays
  [[sunCx + 80, sunCy - 6, 30, 12], [sunCx - 110, sunCy - 6, 30, 12],
   [sunCx - 6, sunCy - 110, 12, 30], [sunCx - 6, sunCy + 80, 12, 30]]
    .forEach(([x, y, w, h]) => ctx.fillRect(x, y, w, h));

  // ── Ground band ────────────────────────────────────────────
  ctx.fillStyle = '#5B8731';  // grass top
  ctx.fillRect(0, 780, W, 30);
  ctx.fillStyle = '#866043';  // dirt
  ctx.fillRect(0, 810, W, 30);
  ctx.fillStyle = '#6B4423';  // dirt dark
  ctx.fillRect(0, 840, W, 20);

  // ── Big Steve (scaled sprite) ──────────────────────────────
  // Steve body 8 cols × 12 rows at scale 24 = 192x288 sprite area
  const steveScale = 24;
  const steveW = 8 * steveScale;
  const steveOx = (W - steveW) / 2;
  const steveOy = 780 - 12 * steveScale;  // feet on ground line
  drawSpriteToCanvas(ctx, STEVE_BODY, CHAR, steveOx, steveOy, steveScale);
  drawSpriteToCanvas(ctx, LEG_STAND, CHAR,
    steveOx, steveOy + STEVE_BODY.length * steveScale, steveScale);

  // ── Title with pixel stroke ────────────────────────────────
  ctx.font = 'bold 64px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const title = 'POMODORO CRAFT';
  // Stroke (multiple offsets for pixel outline look)
  ctx.fillStyle = '#000';
  [[-4,0],[4,0],[0,-4],[0,4],[-4,-4],[4,4],[-4,4],[4,-4]].forEach(([dx,dy]) => {
    ctx.fillText(title, W/2 + dx, 90 + dy);
  });
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText(title, W/2, 90);

  // ── Stats card (semi-transparent panel at bottom) ─────────
  const cardX = 80, cardY = 900, cardW = W - 160, cardH = 130;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(cardX, cardY, cardW, cardH);
  // Border (pixel style)
  ctx.strokeStyle = '#FFFFFF';
  ctx.lineWidth = 3;
  ctx.strokeRect(cardX, cardY, cardW, cardH);

  // ── Harvest row (big emojis) ──────────────────────────────
  ctx.font = '52px "Apple Color Emoji", "Segoe UI Emoji", sans-serif';
  ctx.textBaseline = 'middle';
  const iconsToShow = Math.min(d.sessions, 8);
  if (iconsToShow > 0) {
    let emojis = emoji.repeat(iconsToShow);
    if (d.sessions > 8) emojis += ` ×${d.sessions}`;
    ctx.fillStyle = '#FFFFFF';
    ctx.fillText(emojis, W/2, cardY + 45);
  } else {
    ctx.font = '28px "Press Start 2P", monospace';
    ctx.fillStyle = '#BBB';
    ctx.fillText('READY TO HARVEST', W/2, cardY + 45);
  }

  // ── Stats line (focus minutes, streak) ────────────────────
  ctx.font = '22px "Press Start 2P", monospace';
  ctx.fillStyle = '#FFD700';
  const statsParts = [];
  statsParts.push(`${d.focusMin} MIN FOCUSED`);
  if (streak.current > 0) statsParts.push(`🔥 ${streak.current} DAY STREAK`);
  if (life.totalMinutes > 0) statsParts.push(`${life.totalMinutes}M LIFETIME`);
  ctx.fillText(statsParts.join('  ·  '), W/2, cardY + 100);

  // ── URL watermark ─────────────────────────────────────────
  ctx.font = '18px "Press Start 2P", monospace';
  ctx.fillStyle = '#333333';
  ctx.textBaseline = 'alphabetic';
  // Subtle shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillText('pomodorocraft.com', W/2 + 2, H - 30 + 2);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText('pomodorocraft.com', W/2, H - 30);

  return new Promise(resolve => canvas.toBlob(resolve, 'image/png', 0.95));
}

// ═══════════════════════════════════════════
// SHARE FLOW — generate card → native share → fallback download
// ═══════════════════════════════════════════
async function shareHarvest() {
  const shareUrl = 'https://stevekim0417.github.io/pomodoro-craft/';
  const text = buildShareText();

  // Show loading state on button
  const btn = document.getElementById('shareBtn');
  const original = btn ? btn.textContent : null;
  if (btn) { btn.textContent = '🎨 Generating...'; btn.disabled = true; }

  try {
    const blob = await generateShareCard();
    const file = new File([blob], 'pomodoro-harvest.png', { type: 'image/png' });

    // Try Web Share API with file attachment (mobile, PWA)
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: 'Pomodoro Craft',
          text,
          url: shareUrl,
        });
        return;
      } catch (err) {
        if (err && err.name === 'AbortError') return;
        // fall through to download
      }
    }

    // Fallback 1: download the PNG so the user can manually attach it
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pomodoro-craft-${todayKey()}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    // Fallback 2: also open a tweet pre-filled so desktop users have
    // a one-click path even without file upload support.
    const tweetText = encodeURIComponent(text + '\n' + shareUrl);
    const twitterUrl = `https://twitter.com/intent/tweet?text=${tweetText}`;
    window.open(twitterUrl, '_blank', 'noopener');
  } catch (e) {
    // As a last resort, fall back to the old text-only share
    if (navigator.share) {
      try {
        await navigator.share({ title: 'Pomodoro Craft', text, url: shareUrl });
      } catch (err) { /* ignore */ }
    } else {
      const tweetText = encodeURIComponent(text + '\n' + shareUrl);
      window.open(`https://twitter.com/intent/tweet?text=${tweetText}`, '_blank', 'noopener');
    }
  } finally {
    if (btn) { btn.textContent = original; btn.disabled = false; }
  }
}

// ═══════════════════════════════════════════
// TIMER LOGIC
// ═══════════════════════════════════════════
let timerState = 'idle', timerMode = 'focus';
let totalSeconds = focusMin*60, remainingSeconds = totalSeconds, timerInterval = null;
const timerDisplay = document.getElementById('timerDisplay');
const modeLabel = document.getElementById('modeLabel');
const subtitleText = document.getElementById('subtitleText');
const startBtn = document.getElementById('startBtn');

function formatTime(s) { return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }
function updateDisplay() {
  timerDisplay.textContent = formatTime(remainingSeconds);
  updateProgress(1 - remainingSeconds/totalSeconds);
  document.title = `${formatTime(remainingSeconds)} - Pomodoro Craft`;
}

function setMode(mode) {
  timerMode = mode;
  const isBreak = mode === 'break' || mode === 'longbreak';
  document.body.setAttribute('data-mode', isBreak ? 'break' : 'focus');

  if (mode === 'focus') {
    totalSeconds = focusMin * 60;
    const sessionInCycle = (completedSessions % LONG_BREAK_INTERVAL) + 1;
    modeLabel.textContent = 'FOCUS';
    subtitleText.textContent = 'FOCUS TIME';
    document.getElementById('sessionIndicator').textContent = `SESSION ${sessionInCycle} / ${LONG_BREAK_INTERVAL}`;
    hideLofiPlayer();
  } else if (mode === 'longbreak') {
    totalSeconds = longBreakMin * 60;
    modeLabel.textContent = 'LONG BREAK';
    subtitleText.textContent = 'LONG BREAK';
    document.getElementById('sessionIndicator').textContent = 'CYCLE COMPLETE';
    showLofiPlayer();
  } else {
    totalSeconds = breakMin * 60;
    modeLabel.textContent = 'BREAK';
    subtitleText.textContent = 'BREAK TIME';
    document.getElementById('sessionIndicator').textContent = '';
    showLofiPlayer();
  }
  remainingSeconds = totalSeconds;
  updateDisplay();
  updateSceneMode(timerState === 'running' ? (isBreak ? 'break' : 'focus') : (isBreak ? 'break' : 'idle'));
}

function startTimer() {
  if (timerState==='running') {
    timerState='paused'; clearInterval(timerInterval);
    startBtn.textContent='RESUME'; swingActive=false; stopAnimLoop();
    broadcastMyState();
    return;
  }
  timerState='running'; startBtn.textContent='PAUSE';
  requestNotifPermission();
  updateSceneMode(timerMode === 'focus' ? 'focus' : 'break'); startAnimLoop();
  broadcastMyState();

  timerInterval = setInterval(() => {
    remainingSeconds--;
    updateDisplay();
    if (remainingSeconds<=0) {
      clearInterval(timerInterval); timerInterval=null;
      timerState='idle'; stopAnimLoop(); swingActive=false;
      startBtn.textContent='START';
      playSound(timerMode==='focus'?'complete':'break_end');

      if (timerMode==='focus') {
        recordSession('focus', focusMin);
        if (sessionBlocksMined % 10 !== 0) recordBlocks(sessionBlocksMined % 10);
        completedSessions++; saveState(); buildHotbar();
        if (completedSessions>=TOTAL_SESSIONS) { completedSessions=0; saveState(); buildHotbar(); }
        // Long break every N sessions
        const isLongBreak = completedSessions % LONG_BREAK_INTERVAL === 0;
        sendNotification('Focus Complete!', isLongBreak ? 'Time for a long break.' : 'Time for a short break.');
        setMode(isLongBreak ? 'longbreak' : 'break');
        if (autoBreak) setTimeout(() => startTimer(), 1500);
      } else {
        const isLong = timerMode==='longbreak';
        recordSession(isLong ? 'longbreak' : 'break', isLong ? longBreakMin : breakMin);
        sendNotification('Break Over!', 'Ready to focus again?');
        setMode('focus');
        if (autoFocus) setTimeout(() => startTimer(), 1500);
      }
      // Notify other users that we're now idle/transitioning
      broadcastMyState();
    }
  }, 1000);
}

function skipTimer() {
  clearInterval(timerInterval); timerInterval=null;
  timerState='idle'; stopAnimLoop(); swingActive=false;
  startBtn.textContent='START';
  if (timerMode==='focus') {
    const isLongBreak = (completedSessions + 1) % LONG_BREAK_INTERVAL === 0;
    setMode(isLongBreak ? 'longbreak' : 'break');
  } else setMode('focus');
  broadcastMyState();
}

function resetTimer() {
  clearInterval(timerInterval); timerInterval=null;
  timerState='idle'; stopAnimLoop(); swingActive=false;
  startBtn.textContent='START';
  completedSessions=0; blocksMined=0; saveState();
  buildHotbar(); setMode('focus');
  broadcastMyState();
}

// ═══════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════
const focusValue = document.getElementById('focusValue');
const breakValue = document.getElementById('breakValue');
function adjustTime(type, delta) {
  if (timerState==='running') return;
  if (type==='focus') {
    focusMin=Math.max(5,Math.min(60,focusMin+delta));
    focusValue.textContent=focusMin;
    if (timerMode==='focus') { totalSeconds=focusMin*60; remainingSeconds=totalSeconds; updateDisplay(); }
  } else if (type==='long') {
    longBreakMin=Math.max(5,Math.min(60,longBreakMin+delta));
    document.getElementById('longBreakValue').textContent=longBreakMin;
    if (timerMode==='longbreak') { totalSeconds=longBreakMin*60; remainingSeconds=totalSeconds; updateDisplay(); }
  } else {
    breakMin=Math.max(1,Math.min(30,breakMin+delta));
    breakValue.textContent=breakMin;
    if (timerMode==='break') { totalSeconds=breakMin*60; remainingSeconds=totalSeconds; updateDisplay(); }
  }
  saveState();
}

// SOUND
// ═══════════════════════════════════════════
let audioCtx = null;
function getAudio() { if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function playNote(ctx,freq,time,dur,wave,vol) {
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type=wave; o.frequency.value=freq;
  g.gain.setValueAtTime(vol,time); g.gain.exponentialRampToValueAtTime(.001,time+dur);
  o.connect(g); g.connect(ctx.destination); o.start(time); o.stop(time+dur);
}
function playClick() {
  if (!alarmEnabled) return;
  try {
    const ctx = getAudio(), now = ctx.currentTime;
    playNote(ctx, 400, now, 0.05, 'square', 0.15);
    playNote(ctx, 300, now + 0.03, 0.04, 'square', 0.1);
  } catch(e){}
}

// Global button click sound
document.addEventListener('click', (e) => {
  if (e.target.closest('.mc-btn, .mc-btn-sm, .mc-toggle')) playClick();
});

function playSound(type) {
  if (!alarmEnabled) return;
  try {
    const ctx=getAudio(), now=ctx.currentTime;
    if (type==='complete') {
      playNote(ctx,523.25,now,.15,'square',.3);
      playNote(ctx,659.25,now+.15,.15,'square',.3);
      playNote(ctx,783.99,now+.3,.15,'square',.3);
      playNote(ctx,1046.5,now+.45,.3,'square',.25);
    } else {
      playNote(ctx,440,now,.2,'sine',.25);
      playNote(ctx,554.37,now+.2,.2,'sine',.25);
      playNote(ctx,440,now+.4,.3,'sine',.2);
    }
  } catch(e){}
}

// ═══════════════════════════════════════════
// THEME SYSTEM
// ─────────────────────────────────────────
// Switches all ore-related visuals (block color, drop item, hotbar icon,
// particle palette) by mutating ORE_COLORS and re-rendering the ore block
// sprite in-place. No full scene rebuild needed.
// ═══════════════════════════════════════════
function applyTheme(themeId) {
  if (!THEMES[themeId]) themeId = 'tomato';
  currentThemeId = themeId;
  const theme = THEMES[themeId];

  // 1. Mutate ORE_COLORS so any future renderSprite(ORE_BLOCK, ORE_COLORS, ...)
  //    uses the new ore color (legacy ore block — currently hidden but kept
  //    in case mining mode is re-enabled).
  ORE_COLORS.O = theme.oreColor;
  if (oreBlockG) {
    const opacity = oreBlockG.getAttribute('opacity') || '1';
    oreBlockG.innerHTML = '';
    ORE_BLOCK.forEach((row, ry) => [...row].forEach((ch, rx) => {
      if (ch === '.' || !ORE_COLORS[ch]) return;
      rect(rx * P, ry * P, P, P, ORE_COLORS[ch], oreBlockG);
    }));
    oreBlockG.setAttribute('opacity', opacity);
  }

  // 2. Repaint the already-built hill so the biome switch is instant and
  //    the existing blocks match the new theme. Without this, mid-session
  //    theme swaps would leave half the hill in the old colors.
  repaintHill();

  // 3. Repaint hotbar (already-completed sessions will show the new icon).
  buildHotbar();

  // 4. Repaint daily stats (harvest emoji follows the theme).
  renderDailyStats();

  // 5. Update theme-picker button highlights.
  syncThemeButtons();

  // 6. Tell other connected users about our new theme so their
  //    remote-user renders show the updated hat color immediately.
  if (typeof broadcastMyState === 'function') broadcastMyState();

  saveState();
}

// Walk the hillGrid and redraw every already-placed block with the active
// theme's palette. Called by applyTheme() whenever the theme changes.
function repaintHill() {
  if (!hillG) return;
  hillG.innerHTML = '';
  const theme = THEMES[currentThemeId];
  const [, topColor] = theme.chunkColors;
  for (const k in hillGrid) {
    if (hillGrid[k] !== true) continue;
    const [col, row] = k.split(',').map(Number);
    const ex = HILL_BASE_X + col * P;
    const ey = HILL_BASE_Y - (row + 1) * P;
    rect(ex, ey, P, P, hillBlockColor(col, row), hillG);
    if (!hillHas(col, row + 1)) {
      rect(ex, ey, P, 2, topColor, hillG);
    }
  }
}

function syncThemeButtons() {
  THEME_ORDER.forEach(id => {
    const btn = document.getElementById('themeBtn_' + id);
    if (btn) btn.classList.toggle('on', id === currentThemeId);
  });
}

// ═══════════════════════════════════════════
// SOUND & LOFI TOGGLES
// ═══════════════════════════════════════════
function toggleOpt(type) {
  if (type === 'alarm') {
    alarmEnabled = !alarmEnabled;
    syncToggleBtn('toggleAlarm', 'SOUND', alarmEnabled);
  } else if (type === 'lofi') {
    lofiEnabled = !lofiEnabled;
    syncToggleBtn('toggleLofi', 'LOFI BREAK', lofiEnabled);
    if (lofiEnabled && timerMode === 'break') showLofiPlayer();
    else if (!lofiEnabled) hideLofiPlayer();
  } else if (type === 'autoBreak') {
    autoBreak = !autoBreak;
    syncToggleBtn('toggleAutoBreak', 'AUTO BREAK', autoBreak);
  } else if (type === 'autoFocus') {
    autoFocus = !autoFocus;
    syncToggleBtn('toggleAutoFocus', 'AUTO FOCUS', autoFocus);
  }
  saveState();
}

function syncToggleBtn(id, label, value) {
  const btn = document.getElementById(id);
  btn.textContent = `${label} ${value ? 'ON' : 'OFF'}`;
  btn.classList.toggle('on', value);
}

function extractYouTubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=|live\/|shorts\/))([^&?\s]+)/);
  return m ? m[1] : null;
}

let ytPlayer = null;
let ytReady = false;
let ytApiLoaded = false;

function loadYouTubeAPI() {
  if (ytApiLoaded) return;
  ytApiLoaded = true;
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}

// YouTube API calls this globally when ready
window.onYouTubeIframeAPIReady = function() {
  ytReady = true;
  // If lofi was waiting to play, start now
  if (lofiEnabled && timerMode === 'break') initYTPlayer();
};

function initYTPlayer() {
  if (ytPlayer) { ytPlayer.playVideo(); return; }
  const videoId = extractYouTubeId(lofiUrl);
  if (!videoId || !ytReady) return;

  const container = document.getElementById('lofiPlayer');
  container.classList.add('active');
  container.innerHTML = '<div id="ytPlayerDiv"></div><a href="' + lofiUrl + '" target="_blank" rel="noopener" class="lofi-link">Open in YouTube ↗</a>';

  ytPlayer = new YT.Player('ytPlayerDiv', {
    height: '80', width: '100%',
    videoId: videoId,
    playerVars: { autoplay: 1, loop: 1, playlist: videoId },
    events: {
      onReady: function(e) { e.target.playVideo(); },
    }
  });
}

function showLofiPlayer() {
  if (!lofiEnabled) return;
  loadYouTubeAPI();
  const container = document.getElementById('lofiPlayer');
  container.classList.add('active');
  if (ytPlayer && typeof ytPlayer.playVideo === 'function') {
    ytPlayer.playVideo();
  } else if (ytReady) {
    initYTPlayer();
  }
  // If API not ready yet, onYouTubeIframeAPIReady will handle it
}

function hideLofiPlayer() {
  const container = document.getElementById('lofiPlayer');
  container.classList.remove('active');
  // Pause instead of destroy — resume from same position next break
  if (ytPlayer && typeof ytPlayer.pauseVideo === 'function') {
    ytPlayer.pauseVideo();
  }
}

function renderSessionLog() {
  const container = document.getElementById('sessionLogInner');
  const d = loadDaily();
  if (!d.log || d.log.length === 0) {
    container.innerHTML = '<div class="log-empty">No sessions yet today</div>';
    return;
  }
  container.innerHTML = d.log.map(entry => {
    const typeLabel = entry.type === 'focus' ? 'FOCUS' : entry.type === 'longbreak' ? 'LONG' : 'BREAK';
    const typeClass = entry.type === 'longbreak' ? 'longbreak' : entry.type;
    return `<div class="log-entry">
      <span class="log-time">${entry.time}</span>
      <span class="log-type ${typeClass}">${typeLabel}</span>
      <span class="log-task">${entry.task || '-'}</span>
      <span class="log-dur">${entry.duration}m</span>
    </div>`;
  }).reverse().join('');
  // Auto-scroll to top (latest entry)
  container.scrollTop = 0;
}

function toggleSessionLog() {
  const log = document.getElementById('sessionLog');
  const toggle = document.getElementById('logToggle');
  const isOpen = log.classList.toggle('open');

// ═══════════════════════════════════════════
// BROWSER NOTIFICATIONS
// ═══════════════════════════════════════════
function requestNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}
function sendNotification(title, body) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, { body });
  }
}

// ═══════════════════════════════════════════
// SETTINGS DRAWER
// ═══════════════════════════════════════════
function toggleSettingsDrawer() {
  document.getElementById('settingsDrawer').classList.toggle('open');
  document.getElementById('settingsTab').classList.toggle('open');
}

// ═══════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown', e => {
  // Don't trigger shortcuts when typing in task input
  if (document.activeElement === document.getElementById('taskInput')) {
    if (e.code === 'Enter') { e.preventDefault(); startTimer(); }
    return;
  }
  if (e.code==='Space') { e.preventDefault(); startTimer(); }
  else if (e.code==='KeyR') resetTimer();
  else if (e.code==='KeyS') skipTimer();
});

// ═══════════════════════════════════════════
// EVENT LISTENERS
// ═══════════════════════════════════════════
startBtn.addEventListener('click', startTimer);
document.getElementById('skipBtn').addEventListener('click', skipTimer);
document.getElementById('resetBtn').addEventListener('click', resetTimer);

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
// Apply companion layout as early as possible (before first paint).
if (isCompanionMode) document.body.setAttribute('data-layout', 'companion');

// Wire up the nickname input in the settings drawer
const nickInput = document.getElementById('nickInput');
const nickHint = document.getElementById('nickHint');
if (nickInput) {
  nickInput.value = currentNick;
  const commitNick = () => {
    const before = currentNick;
    currentNick = saveNick(nickInput.value);
    nickInput.value = currentNick;
    if (before !== currentNick) {
      // Rebuild our hat color map based on new nick, then repaint main Steve
      myCharMap = buildMyCharMap();
      updateSteveSprite(currentPose || 'stand');
      // Tell the server our new identity so other users see it
      sendPresenceMessage({
        type: 'hello',
        nick: currentNick,
        theme: currentThemeId,
      });
      if (nickHint) {
        nickHint.textContent = 'saved ✓';
        nickHint.classList.add('saved');
        setTimeout(() => {
          nickHint.textContent = '';
          nickHint.classList.remove('saved');
        }, 1500);
      }
    }
  };
  nickInput.addEventListener('blur', commitNick);
  nickInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); nickInput.blur(); }
  });
}

focusValue.textContent = focusMin;
breakValue.textContent = breakMin;
document.getElementById('longBreakValue').textContent = longBreakMin;
createStars();
buildProgressBar();
buildHotbar();
buildScene();
// Paint the initial village state — empty plots with small trees even
// when we have no live users yet, so the scene never looks broken.
renderRemoteUsers();
renderMountainBadge();
renderDailyStats();
renderSessionLog();
buildThemePicker();
// Apply restored theme: mutates ORE_COLORS + repaints ore block + hotbar.
// Must run AFTER buildScene() (creates oreBlockG) and buildThemePicker()
// (creates the highlightable buttons).
applyTheme(currentThemeId);

// Restore settings UI
syncToggleBtn('toggleAlarm', 'SOUND', alarmEnabled);
syncToggleBtn('toggleLofi', 'LOFI BREAK', lofiEnabled);
syncToggleBtn('toggleAutoBreak', 'AUTO BREAK', autoBreak);
syncToggleBtn('toggleAutoFocus', 'AUTO FOCUS', autoFocus);

setMode('focus');
updateDisplay();
updateSocialProof();

// Start the demo-user tick — ticks down their timers once per second
// so the village feels alive whenever real users aren't present.
setInterval(tickDemoUsers, 1000);

// ── Multiplayer bootstrap (runs only if API_BASE_URL is configured) ──
if (HAS_BACKEND) {
  // Initial stats fetch + live WebSocket connection
  fetchGlobalStats().then(() => {
    updateSocialProof();
    renderLiveFeed();
  });
  connectPresence();
  // Refresh stats every 20s as a belt-and-suspenders fallback
  setInterval(() => {
    fetchGlobalStats().then(() => {
      updateSocialProof();
      renderLiveFeed();
    });
  }, 20000);
} else {
  // Solo mode — just tick the fake counter
  setInterval(updateSocialProof, 30000);
}

// Autostart via URL param — for creator-embedded links that should kick
// off the timer immediately (e.g. a YouTube description link).
if (shouldAutoStart) {
  // Delay one frame so the UI has finished mounting.
  requestAnimationFrame(() => startTimer());
}
</script>
</body>
</html>
